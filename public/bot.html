<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>VORTEX ISLANDS — BOT SIMULATOR</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a12;
  --panel:#101018;
  --border:#39ff14;
  --gold:#ffd700;
  --green:#39ff14;
  --red:#ff1744;
  --cyan:#00c8ff;
  --orange:#ff9800;
  --font:'Press Start 2P',monospace;
}
html,body{min-height:100%;width:100%;overflow-x:hidden;}
body{
  background:var(--bg);
  background-image:
    repeating-linear-gradient(0deg, rgba(57,255,20,.015) 0, rgba(57,255,20,.015) 1px, transparent 1px, transparent 24px),
    repeating-linear-gradient(90deg, rgba(57,255,20,.015) 0, rgba(57,255,20,.015) 1px, transparent 1px, transparent 24px);
  font-family:var(--font);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  color:#ccc;
  padding: clamp(10px,3vw,20px);
  gap: clamp(10px,2.5vw,16px);
}

/* ── HEADER ── */
header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:10px;
  border-bottom:2px solid rgba(57,255,20,.2);
  padding-bottom:12px;
}
header h1{
  font-size: clamp(9px,3vw,14px);
  color:var(--green);
  text-shadow:0 0 12px var(--green);
  letter-spacing:2px;
}
header span{
  font-size: clamp(5px,1.5vw,7px);
  color:#444;
  letter-spacing:1px;
}

/* ── LAYOUT ── */
#layout{
  display:grid;
  grid-template-columns: minmax(0,1fr) minmax(0,1fr);
  gap: clamp(10px,2vw,16px);
  flex:1;
}
@media(max-width:700px){
  #layout{grid-template-columns:1fr;}
}

/* ── PANELS ── */
.panel{
  background:var(--panel);
  border:2px solid rgba(57,255,20,.18);
  padding: clamp(10px,2vw,16px);
  display:flex;
  flex-direction:column;
  gap:10px;
}
.panel-title{
  font-size: clamp(6px,1.6vw,8px);
  color:var(--green);
  letter-spacing:2px;
  border-bottom:1px solid rgba(57,255,20,.15);
  padding-bottom:8px;
}

/* ── CONTROLS ── */
.ctrl-row{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  align-items:center;
}
.ctrl-label{font-size: clamp(5px,1.3vw,7px); color:#555; min-width:80px; letter-spacing:1px;}

input[type="text"],input[type="number"],select{
  background:#060610;
  border:2px solid #222;
  color:#ccc;
  font-family:var(--font);
  font-size: clamp(7px,1.8vw,8px);
  padding: 7px 10px;
  outline:none;
  transition:border-color .15s;
  width:100%;
}
input:focus,select:focus{border-color:var(--green);}
select{appearance:none;-webkit-appearance:none;cursor:pointer;}

/* ── BUTTONS ── */
button{
  font-family:var(--font);
  font-size: clamp(6px,1.6vw,8px);
  cursor:pointer;
  border:none;
  padding: clamp(8px,2vw,11px) clamp(10px,2.5vw,14px);
  text-transform:uppercase;
  letter-spacing:1px;
  box-shadow:3px 3px 0 #000;
  transition:transform .05s,box-shadow .05s,filter .1s;
}
button:hover:not(:disabled){filter:brightness(1.12);}
button:active:not(:disabled){transform:translate(2px,2px);box-shadow:1px 1px 0 #000;}
button:disabled{opacity:.35;cursor:not-allowed;box-shadow:none;}
.btn-green{background:#006618;color:var(--green);border:1px solid var(--green);}
.btn-red{background:#5a0a0a;color:var(--red);border:1px solid var(--red);}
.btn-yellow{background:#4a3a00;color:var(--gold);border:1px solid var(--gold);}
.btn-cyan{background:#003a50;color:var(--cyan);border:1px solid var(--cyan);}
.btn-gray{background:#1a1a1a;color:#555;border:1px solid #333;}
.btn-orange{background:#3a2000;color:var(--orange);border:1px solid var(--orange);}

/* ── ISLANDS GRID ── */
#islands-grid{
  display:flex;
  flex-wrap:wrap;
  gap: clamp(8px,2vw,12px);
  justify-content:flex-start;
}
.bot-island{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  cursor:pointer;
  transition:opacity .2s;
}
.bot-island.dead{opacity:.25;filter:grayscale(1);}
.bot-island:hover:not(.dead) canvas{box-shadow:0 0 10px rgba(57,255,20,0.3);}
.bot-name{
  font-size: clamp(5px,1.2vw,6px);
  color:var(--gold);
  letter-spacing:1px;
  max-width:100%;
  overflow:hidden;
  text-overflow:ellipsis;
}
.bot-name.me-tag{color:var(--green);}
.bot-stats{
  font-size: clamp(4px,1.1vw,6px);
  color:#555;
  text-align:center;
  line-height:2;
}

/* ── BATTLE LOG ── */
#battle-log{
  flex:1;
  overflow-y:auto;
  font-size: clamp(5px,1.3vw,6px);
  color:#555;
  line-height:2.6;
  scrollbar-width:thin;
  scrollbar-color:#222 transparent;
  max-height: clamp(200px,35vh,400px);
}
#battle-log p{
  border-bottom:1px solid #0d0d0d;
  padding:1px 0;
}
#battle-log p.ev-win{color:var(--gold);}
#battle-log p.ev-dmg{color:var(--red);}
#battle-log p.ev-shield{color:var(--cyan);}
#battle-log p.ev-rps{color:#888;}
#battle-log p.ev-elim{color:var(--red);font-weight:bold;}

/* ── STATUS ── */
#status-row{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  font-size: clamp(5px,1.4vw,7px);
}
.status-pill{
  padding:4px 9px;
  background:#0a0a0a;
  border:1px solid #222;
  color:#555;
  letter-spacing:1px;
}
.status-pill.active{border-color:var(--green);color:var(--green);}
.status-pill.paused{border-color:var(--gold);color:var(--gold);}
.status-pill.over{border-color:var(--red);color:var(--red);}

/* ── PLAYER SETUP ── */
#player-list{display:flex;flex-direction:column;gap:6px;}
.player-row{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  background:#080810;border:1px solid #1a1a1a;padding:7px 10px;
}
.player-row input{flex:1;min-width:80px;}
.player-row .pr-type{width:100px;}
.player-row .btn-rm{min-width:0;padding:5px 8px;font-size:6px;}

/* ── ROUND DISPLAY ── */
#round-display{
  font-size: clamp(9px,3vw,16px);
  color:var(--gold);
  text-shadow:0 0 12px rgba(255,215,0,0.4);
  letter-spacing:3px;
  text-align:center;
}
.rps-result{
  font-size: clamp(7px,2vw,10px);
  text-align:center;
  letter-spacing:1px;
  min-height:20px;
}
.rps-choices{
  display:flex;gap:8px;flex-wrap:wrap;justify-content:center;
  font-size: clamp(5px,1.3vw,7px);
}
.rps-chip{
  padding:4px 9px;
  background:#0d0d0d;
  border:1px solid #2a2a2a;
  color:#666;
}
.rps-chip.winner{border-color:var(--gold);color:var(--gold);}

/* ── OVERLAY ── */
#gameover-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.97);
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:16px;
  z-index:200;
  padding:20px;
}
#gameover-overlay.show{display:flex;}
#go-title{
  font-size: clamp(14px,5vw,24px);
  color:var(--gold);
  text-shadow:4px 4px 0 #5a3a00, 0 0 30px var(--gold);
  text-align:center;
}
#go-scores{
  font-size: clamp(6px,1.8vw,8px);
  color:#ccc;
  text-align:center;
  line-height:3;
}

/* ── SPEED SLIDER ── */
input[type="range"]{
  accent-color:var(--green);
  width:100%;
}
</style>
</head>
<body>

<header>
  <h1>🤖 BOT SIMULATOR</h1>
  <span>VORTEX ISLANDS — FAKE GAME TESTER</span>
</header>

<div id="layout">

  <!-- LEFT: Setup + Control -->
  <div class="panel">
    <div class="panel-title">⚙ GAME SETUP</div>

    <!-- Players list -->
    <div id="player-list"></div>
    <div class="ctrl-row">
      <button class="btn-green" id="add-player-btn">+ ADD PLAYER</button>
      <button class="btn-gray" id="reset-players-btn">RESET</button>
    </div>

    <div class="panel-title" style="margin-top:4px;">▸ SIMULATION SPEED</div>
    <div class="ctrl-row" style="flex-direction:column;align-items:flex-start;">
      <label style="font-size:clamp(5px,1.3vw,7px);color:#555;margin-bottom:4px;">
        ROUND DELAY: <span id="speed-label">1.2s</span>
      </label>
      <input type="range" id="speed-slider" min="200" max="3000" value="1200" step="100"/>
    </div>

    <div class="ctrl-row" style="margin-top:4px;">
      <button class="btn-green" id="start-btn" style="flex:1;">▶ START SIM</button>
      <button class="btn-yellow" id="pause-btn" disabled>⏸ PAUSE</button>
      <button class="btn-red" id="stop-btn" disabled>■ STOP</button>
    </div>
    <div class="ctrl-row">
      <button class="btn-cyan" id="step-btn" disabled>STEP 1 ROUND</button>
      <button class="btn-orange" id="export-btn" disabled>EXPORT LOG</button>
    </div>

    <!-- Status -->
    <div id="status-row">
      <div class="status-pill" id="pill-state">IDLE</div>
      <div class="status-pill" id="pill-round">ROUND 0</div>
      <div class="status-pill" id="pill-alive">0 ALIVE</div>
    </div>

    <!-- Round info -->
    <div id="round-display">ROUND 0</div>
    <div class="rps-result" id="rps-result-text">—</div>
    <div class="rps-choices" id="rps-choices-row"></div>
  </div>

  <!-- RIGHT: Islands + Log -->
  <div class="panel">
    <div class="panel-title">🏝 ISLANDS</div>
    <div id="islands-grid"></div>

    <div class="panel-title" style="margin-top:4px;">📜 BATTLE LOG</div>
    <div id="battle-log"><p>⬛ SIM READY — ADD PLAYERS & START</p></div>
  </div>

</div>

<!-- Game Over Overlay -->
<div id="gameover-overlay">
  <div id="go-title">🏆 GAME OVER</div>
  <div id="go-scores"></div>
  <button class="btn-yellow" onclick="resetAll()" style="margin-top:8px;">↩ NEW GAME</button>
</div>

<script>
// ══════════════════════════════════════════════════════
// VORTEX ISLANDS — BOT SIMULATOR ENGINE
// ══════════════════════════════════════════════════════

const CELL_TYPES = ['grass','grass','grass','dark_grass','stone','dirt','sand','sea','sea'];
const CELL_COLORS = {sea:'#1a6fad',grass:'#5aad3e',dark_grass:'#3a8a28',stone:'#8a9aa0',dirt:'#9a6b3e',sand:'#d4b06a'};
const RPS_MOVES = ['rock','paper','scissors'];
const RPS_WIN = { rock:'scissors', paper:'rock', scissors:'paper' };
const BOT_NAMES = ['ALPHA','BRAVO','DELTA','ECHO','FOXTROT','GAMMA','HYDRA','INDIGO'];
const BOT_TYPES = ['aggressive','defensive','balanced','random'];
const GW = 20, GH = 10;

let players = [];
let gameState = null;
let simInterval = null;
let isPaused = false;
let roundDelay = 1200;
let logLines = [];

// ── Player management ─────────────────────────────────
function mkPlayer(name, type, isHuman) {
  return {
    name, type, isHuman,
    alive: true,
    quadrants: [1,2,3,4],
    shields: 0,
    score: 0,
    inventory: { cannons:0, slicers:0 },
    grid: generateGrid()
  };
}

function generateGrid() {
  const g = [];
  for (let r = 0; r < GH; r++) {
    const row = [];
    for (let c = 0; c < GW; c++) {
      // sea border, land middle
      const distX = Math.min(c, GW - 1 - c);
      const distY = Math.min(r, GH - 1 - r);
      const edge = Math.min(distX, distY);
      if (edge === 0) { row.push('sea'); continue; }
      row.push(CELL_TYPES[Math.floor(Math.random() * CELL_TYPES.length)]);
    }
    g.push(row);
  }
  return g;
}

// ── UI helpers ────────────────────────────────────────
function getIslandSize() {
  const vw = window.innerWidth;
  if (vw >= 900) return { w:180, h:90 };
  if (vw >= 600) return { w:140, h:70 };
  return { w:110, h:55 };
}

function renderIsland(canvas, player) {
  const sz = getIslandSize();
  canvas.width = sz.w; canvas.height = sz.h;
  const CW = sz.w / GW, CH = sz.h / GH;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, sz.w, sz.h);
  ctx.fillStyle = CELL_COLORS.sea;
  ctx.fillRect(0, 0, sz.w, sz.h);

  player.grid.forEach((row, r) => row.forEach((cell, c) => {
    ctx.fillStyle = CELL_COLORS[cell] || CELL_COLORS.sea;
    ctx.fillRect(c * CW, r * CH, CW, CH);
  }));

  // Quadrant dividers
  ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 1;
  ctx.setLineDash([2,3]);
  ctx.beginPath();
  ctx.moveTo(sz.w/2,0); ctx.lineTo(sz.w/2,sz.h);
  ctx.moveTo(0,sz.h/2); ctx.lineTo(sz.w,sz.h/2);
  ctx.stroke(); ctx.setLineDash([]);

  // Shield rings
  if (player.shields > 0) {
    const cols = ['rgba(0,168,255,0.9)','rgba(0,230,255,0.7)','rgba(180,245,255,0.55)'];
    ctx.shadowBlur = 10;
    for (let s = 0; s < player.shields; s++) {
      const ins = (player.shields - s) * Math.max(2, Math.floor(CW * 0.3));
      ctx.strokeStyle = cols[s]; ctx.lineWidth = 2; ctx.shadowColor = cols[s];
      ctx.strokeRect(ins, ins, sz.w - ins*2, sz.h - ins*2);
    }
    ctx.shadowBlur = 0;
  }

  // Dead overlay
  if (!player.alive) {
    ctx.fillStyle = 'rgba(180,0,0,0.35)';
    ctx.fillRect(0,0,sz.w,sz.h);
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0,0,sz.w,sz.h);
  }
}

function renderAllIslands() {
  const grid = document.getElementById('islands-grid');
  grid.innerHTML = '';
  if (!players.length) return;
  players.forEach(p => {
    const div = document.createElement('div');
    div.className = 'bot-island' + (p.alive ? '' : ' dead');
    div.id = 'island-' + p.name;
    const name = document.createElement('div');
    name.className = 'bot-name' + (p.isHuman ? ' me-tag' : '');
    name.textContent = p.name + (p.isHuman ? ' 👤' : ' 🤖');
    const canvas = document.createElement('canvas');
    renderIsland(canvas, p);
    const stats = document.createElement('div');
    stats.className = 'bot-stats';
    stats.id = 'stats-' + p.name;
    updatePlayerStatsEl(stats, p);
    div.appendChild(name);
    div.appendChild(canvas);
    div.appendChild(stats);
    grid.appendChild(div);
  });
}

function refreshIslands() {
  players.forEach(p => {
    const panel = document.getElementById('island-' + p.name);
    if (!panel) return;
    if (p.alive) panel.classList.remove('dead');
    else panel.classList.add('dead');
    const canvas = panel.querySelector('canvas');
    if (canvas) renderIsland(canvas, p);
    const stats = document.getElementById('stats-' + p.name);
    if (stats) updatePlayerStatsEl(stats, p);
  });
}

function updatePlayerStatsEl(el, p) {
  if (!p.alive) { el.innerHTML = '<span style="color:#ff1744;">💀 ELIMINATED</span>'; return; }
  el.innerHTML = `❤ ${p.quadrants.length}/4 🛡 ${p.shields}/3 🏆 ${p.score}`;
}

function addLog(msg, cls = '') {
  const log = document.getElementById('battle-log');
  const p = document.createElement('p');
  if (cls) p.className = cls;
  p.textContent = '> ' + msg;
  log.prepend(p);
  logLines.push(msg);
  // trim to 200
  while (log.children.length > 200) log.removeChild(log.lastChild);
}

function setStatus(state, round, alive) {
  const ps = document.getElementById('pill-state');
  const pr = document.getElementById('pill-round');
  const pa = document.getElementById('pill-alive');
  ps.textContent = state.toUpperCase();
  ps.className = 'status-pill ' + ({ running:'active', paused:'paused', over:'over' }[state] || '');
  pr.textContent = `ROUND ${round}`;
  pa.textContent = `${alive} ALIVE`;
}

// ── Bot AI ────────────────────────────────────────────
function botRPS(player) {
  if (player.type === 'random') return RPS_MOVES[Math.floor(Math.random() * 3)];
  return RPS_MOVES[Math.floor(Math.random() * 3)];
}

function botAction(winner, state) {
  const enemies = state.alive.filter(p => p.name !== winner.name);
  switch (winner.type) {
    case 'aggressive': {
      if (winner.inventory.cannons > 0 && enemies.length) {
        return { action:'cannon', target: enemies[Math.floor(Math.random()*enemies.length)], fromInv:true };
      }
      if (enemies.length) return { action:'cannon', target: enemies[Math.floor(Math.random()*enemies.length)], fromInv:false };
      return { action:'shield', target:null };
    }
    case 'defensive': {
      if (winner.shields < 3) return { action:'shield', target:null };
      return { action:'store', target:null };
    }
    case 'balanced': {
      const r = Math.random();
      if (r < 0.35 && enemies.length) return { action:'cannon', target: enemies[0], fromInv:false };
      if (r < 0.55 && enemies.length) return { action:'slicer', target: enemies[0], fromInv:false };
      if (r < 0.75) return { action:'shield', target:null };
      return { action:'store', target:null };
    }
    default: {
      const acts = ['cannon','slicer','shield','store'];
      const act = acts[Math.floor(Math.random()*acts.length)];
      const tgt = enemies.length ? enemies[Math.floor(Math.random()*enemies.length)] : null;
      return { action:act, target:tgt, fromInv:false };
    }
  }
}

// ── Game logic ────────────────────────────────────────
function resolveRPS(moves) {
  // moves: [{player, choice}]
  let winners = [];
  for (let i = 0; i < moves.length; i++) {
    let w = true;
    for (let j = 0; j < moves.length; j++) {
      if (i === j) continue;
      if (RPS_WIN[moves[i].choice] !== moves[j].choice) { w = false; break; }
    }
    if (w) winners.push(moves[i].player);
  }
  if (winners.length === 1) return winners[0];
  // All same or 3-way tie → random alive player wins
  const r = moves[Math.floor(Math.random() * moves.length)];
  return r.player;
}

function applyCannon(attacker, target) {
  if (target.shields > 0) {
    target.shields--;
    addLog(`💥 ${attacker.name} CANNON → ${target.name} (shield broken! ${target.shields} left)`, 'ev-shield');
    attacker.score += 1;
  } else if (target.quadrants.length > 0) {
    const q = target.quadrants.splice(0, 1)[0];
    addLog(`💣 ${attacker.name} CANNON → ${target.name} Q${q} DESTROYED!`, 'ev-dmg');
    attacker.score += 3;
    destroyQuadrant(target, q);
    if (target.quadrants.length === 0) {
      target.alive = false;
      addLog(`☠ ${target.name} ELIMINATED!`, 'ev-elim');
      attacker.score += 5;
    }
  }
}

function applySlicer(attacker, target) {
  if (target.shields > 0) {
    addLog(`🛡 ${attacker.name} SLICER → ${target.name} (blocked by shield)`, 'ev-shield');
  } else if (target.quadrants.length > 0) {
    const q = target.quadrants.splice(0, 1)[0];
    addLog(`⚔ ${attacker.name} SLICER → ${target.name} Q${q} CUT!`, 'ev-dmg');
    attacker.score += 2;
    destroyQuadrant(target, q);
    if (target.quadrants.length === 0) {
      target.alive = false;
      addLog(`☠ ${target.name} ELIMINATED!`, 'ev-elim');
      attacker.score += 5;
    }
  }
}

function destroyQuadrant(player, q) {
  // Fill quadrant cells with sea
  const hx = q === 1 || q === 3 ? 0 : Math.floor(GW/2);
  const hy = q === 1 || q === 2 ? 0 : Math.floor(GH/2);
  for (let r = hy; r < hy + Math.floor(GH/2); r++) {
    for (let c = hx; c < hx + Math.floor(GW/2); c++) {
      player.grid[r][c] = 'sea';
    }
  }
}

function applyShield(winner) {
  if (winner.shields < 3) {
    winner.shields++;
    addLog(`🛡 ${winner.name} RAISED SHIELD (${winner.shields}/3)`, 'ev-shield');
    winner.score += 1;
    // Random item
    if (Math.random() < 0.5) {
      winner.inventory.cannons++;
      addLog(`📦 ${winner.name} FOUND A CANNON (${winner.inventory.cannons} stored)`, 'ev-shield');
    }
  } else {
    addLog(`🛡 ${winner.name} MAX SHIELDS — auto-banking instead`, 'ev-shield');
    applyStore(winner);
  }
}

function applyStore(winner) {
  winner.inventory.cannons++;
  winner.inventory.slicers++;
  addLog(`📦 ${winner.name} BANKED WEAPONS (💣×${winner.inventory.cannons} ⚔×${winner.inventory.slicers})`, 'ev-shield');
}

// ── Simulation step ───────────────────────────────────
let roundNum = 0;

function simStep() {
  if (!gameState || gameState.over) return;

  const alive = players.filter(p => p.alive);
  if (alive.length <= 1) { endGame(); return; }

  roundNum++;
  document.getElementById('round-display').textContent = `ROUND ${roundNum}`;
  setStatus('running', roundNum, alive.length);
  addLog(`━━━ ROUND ${roundNum} ━━━ (${alive.length} players alive)`, 'ev-rps');

  // RPS phase
  const moves = alive.map(p => ({
    player: p,
    choice: botRPS(p)
  }));

  // Display RPS choices
  document.getElementById('rps-choices-row').innerHTML = moves.map(m =>
    `<div class="rps-chip">${m.player.name}: ${m.choice.toUpperCase()}</div>`
  ).join('');

  const winner = resolveRPS(moves);
  const winMove = moves.find(m => m.player === winner);

  // Highlight winner chip
  setTimeout(() => {
    document.getElementById('rps-choices-row').querySelectorAll('.rps-chip').forEach(chip => {
      if (chip.textContent.startsWith(winner.name)) chip.classList.add('winner');
    });
    document.getElementById('rps-result-text').innerHTML =
      `<span style="color:var(--gold)">🏆 ${winner.name} WINS RPS</span> <span style="color:#555">(${winMove?.choice.toUpperCase()})</span>`;
    addLog(`🎲 RPS: ${winner.name} WINS (${winMove?.choice})`, 'ev-rps');
  }, 100);

  // Action phase
  const aliveState = { alive };
  const act = botAction(winner, aliveState);

  setTimeout(() => {
    switch (act.action) {
      case 'cannon':
        if (act.target) applyCannon(winner, act.target);
        break;
      case 'slicer':
        if (act.target) applySlicer(winner, act.target);
        break;
      case 'shield':
        applyShield(winner);
        break;
      case 'store':
        applyStore(winner);
        break;
    }

    refreshIslands();

    // Check win
    const stillAlive = players.filter(p => p.alive);
    setStatus('running', roundNum, stillAlive.length);

    if (stillAlive.length <= 1) {
      endGame();
    }
  }, 300);
}

function endGame() {
  if (simInterval) { clearInterval(simInterval); simInterval = null; }
  if (gameState) gameState.over = true;

  const alive = players.filter(p => p.alive);
  const champion = alive[0] || players.reduce((a, b) => a.score > b.score ? a : b);

  addLog(`🏆 GAME OVER — WINNER: ${champion.name} (${champion.score} pts)`, 'ev-win');
  setStatus('over', roundNum, alive.length);

  // Overlay
  document.getElementById('go-title').textContent = `🏆 ${champion.name} WINS!`;
  const sorted = [...players].sort((a, b) => b.score - a.score);
  document.getElementById('go-scores').innerHTML =
    sorted.map((p, i) => `<div>${i+1}. ${p.name}: ${p.score} pts${p.alive?' 👑':' 💀'}</div>`).join('');
  document.getElementById('gameover-overlay').classList.add('show');

  document.getElementById('start-btn').disabled = false;
  document.getElementById('pause-btn').disabled = true;
  document.getElementById('stop-btn').disabled = true;
  document.getElementById('step-btn').disabled = true;
  document.getElementById('export-btn').disabled = false;
}

// ── Player setup UI ───────────────────────────────────
let playerCounter = 0;

function renderPlayerList() {
  const list = document.getElementById('player-list');
  list.innerHTML = '';
  players.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'player-row';
    row.innerHTML = `
      <input type="text" value="${p.name}" placeholder="NAME" maxlength="10"
        onchange="players[${i}].name=this.value;"/>
      <select class="pr-type" onchange="players[${i}].type=this.value;">
        ${BOT_TYPES.map(t => `<option value="${t}"${p.type===t?' selected':''}>${t.toUpperCase()}</option>`).join('')}
      </select>
      <label style="font-size:6px;color:#555;white-space:nowrap;display:flex;align-items:center;gap:5px;">
        <input type="checkbox" ${p.isHuman?'checked':''} onchange="players[${i}].isHuman=this.checked"/>HUMAN
      </label>
      <button class="btn-red btn-rm" onclick="removePlayer(${i})">✕</button>
    `;
    list.appendChild(row);
  });
}

function addPlayer() {
  if (players.length >= 6) return;
  const name = BOT_NAMES[playerCounter % BOT_NAMES.length];
  playerCounter++;
  const type = BOT_TYPES[Math.floor(Math.random() * BOT_TYPES.length)];
  players.push(mkPlayer(name, type, false));
  renderPlayerList();
}

function removePlayer(i) {
  players.splice(i, 1);
  renderPlayerList();
}

function resetPlayers() {
  playerCounter = 0;
  players = [];
  // Add defaults
  ['ALPHA','BRAVO','DELTA'].forEach((n, i) => {
    players.push(mkPlayer(n, BOT_TYPES[i % BOT_TYPES.length], i === 0));
  });
  playerCounter = 3;
  renderPlayerList();
}

// ── Simulation controls ───────────────────────────────
document.getElementById('start-btn').onclick = () => {
  if (players.length < 2) { alert('ADD AT LEAST 2 PLAYERS!'); return; }
  document.getElementById('gameover-overlay').classList.remove('show');

  // Reset player states
  players.forEach(p => {
    p.alive = true;
    p.quadrants = [1,2,3,4];
    p.shields = 0;
    p.score = 0;
    p.inventory = { cannons:0, slicers:0 };
    p.grid = generateGrid();
  });

  roundNum = 0;
  logLines = [];
  document.getElementById('battle-log').innerHTML = '';
  document.getElementById('rps-choices-row').innerHTML = '';
  document.getElementById('rps-result-text').textContent = '—';
  document.getElementById('round-display').textContent = 'ROUND 0';

  renderAllIslands();

  gameState = { over: false };
  isPaused = false;

  document.getElementById('start-btn').disabled = true;
  document.getElementById('pause-btn').disabled = false;
  document.getElementById('stop-btn').disabled = false;
  document.getElementById('step-btn').disabled = false;
  document.getElementById('export-btn').disabled = false;

  setStatus('running', 0, players.length);
  addLog('🚀 SIMULATION STARTED — ' + players.map(p=>p.name).join(', '));

  simInterval = setInterval(() => {
    if (!isPaused) simStep();
  }, roundDelay);
};

document.getElementById('pause-btn').onclick = () => {
  isPaused = !isPaused;
  document.getElementById('pause-btn').textContent = isPaused ? '▶ RESUME' : '⏸ PAUSE';
  setStatus(isPaused ? 'paused' : 'running', roundNum, players.filter(p=>p.alive).length);
};

document.getElementById('stop-btn').onclick = () => {
  if (simInterval) { clearInterval(simInterval); simInterval = null; }
  gameState = null; isPaused = false;
  document.getElementById('start-btn').disabled = false;
  document.getElementById('pause-btn').disabled = true;
  document.getElementById('stop-btn').disabled = true;
  document.getElementById('step-btn').disabled = true;
  document.getElementById('pause-btn').textContent = '⏸ PAUSE';
  setStatus('idle', roundNum, players.filter(p=>p.alive).length);
  addLog('■ SIMULATION STOPPED');
};

document.getElementById('step-btn').onclick = () => {
  if (gameState && !gameState.over) {
    const wasRunning = !isPaused;
    isPaused = true;
    simStep();
    if (wasRunning) {
      setTimeout(() => { isPaused = false; }, roundDelay);
    }
  }
};

document.getElementById('export-btn').onclick = () => {
  const txt = logLines.join('\n');
  const blob = new Blob([txt], { type:'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `vortex-log-round${roundNum}.txt`;
  a.click(); URL.revokeObjectURL(url);
};

document.getElementById('add-player-btn').onclick = addPlayer;
document.getElementById('reset-players-btn').onclick = resetPlayers;

document.getElementById('speed-slider').oninput = function() {
  roundDelay = parseInt(this.value);
  document.getElementById('speed-label').textContent = (roundDelay / 1000).toFixed(1) + 's';
  if (simInterval) {
    clearInterval(simInterval);
    simInterval = setInterval(() => { if (!isPaused) simStep(); }, roundDelay);
  }
};

function resetAll() {
  document.getElementById('gameover-overlay').classList.remove('show');
  if (simInterval) clearInterval(simInterval);
  simInterval = null; gameState = null; isPaused = false;
  document.getElementById('start-btn').disabled = false;
  document.getElementById('pause-btn').disabled = true;
  document.getElementById('stop-btn').disabled = true;
  document.getElementById('step-btn').disabled = true;
  document.getElementById('pause-btn').textContent = '⏸ PAUSE';
  resetPlayers();
  renderAllIslands();
  setStatus('idle', 0, 0);
  document.getElementById('round-display').textContent = 'ROUND 0';
  document.getElementById('rps-choices-row').innerHTML = '';
  document.getElementById('rps-result-text').textContent = '—';
  document.getElementById('battle-log').innerHTML = '<p>⬛ READY FOR NEW GAME</p>';
}

// Resize handler
window.addEventListener('resize', () => { if (players.length) refreshIslands(); });

// Init
resetPlayers();
</script>
</body>
</html>
