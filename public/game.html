<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>VORTEX ISLANDS — BATTLE</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0f1e;--gold:#ffd700;--green:#39ff14;--red:#ff1744;
  --cyan:#00e5ff;--orange:#ff9800;--dark:#05070e;--panel:rgba(5,7,18,0.95);
  --font:'Press Start 2P',monospace;--coin:#ffd700;
  --glow-gold:0 0 20px rgba(255,215,0,0.3);
  --glow-green:0 0 14px rgba(57,255,20,0.3);
  --glow-cyan:0 0 14px rgba(0,229,255,0.3);
}
html,body{min-height:100%;width:100%;overflow-x:hidden;}
body{
  background:var(--bg);
  background-image:
    radial-gradient(ellipse 100% 50% at 50% 0%,#0d2050 0%,transparent 60%),
    radial-gradient(circle 250px at 90% 5%,rgba(255,215,0,0.05) 0%,transparent 60%),
    repeating-linear-gradient(135deg,rgba(255,255,255,0.012) 0,rgba(255,255,255,0.012) 1px,transparent 1px,transparent 50px);
  font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;
}

/* ── TOP BAR ── */
#conn-bar{
  background:rgba(3,5,14,0.98);
  border-bottom:2px solid rgba(255,215,0,0.5);
  padding:clamp(7px,1.8vw,11px) clamp(12px,3vw,20px);
  font-size:clamp(6px,1.8vw,8px);color:var(--gold);
  display:flex;align-items:center;justify-content:space-between;
  letter-spacing:2px;flex-shrink:0;
  box-shadow:0 2px 20px rgba(0,0,0,0.5);
}
#conn-bar.ok{color:var(--green);text-shadow:var(--glow-green);}
#conn-bar.err{color:var(--red);}
#settings-btn{
  font-family:var(--font);font-size:clamp(5px,1.4vw,7px);
  background:rgba(10,12,24,0.8);color:var(--gold);
  border:2px solid rgba(255,215,0,0.25);padding:5px 11px;cursor:pointer;
  letter-spacing:1px;box-shadow:2px 2px 0 rgba(0,0,0,0.5);transition:filter .1s;
}
#settings-btn:hover{filter:brightness(1.2);}
.spinner{display:inline-block;width:8px;height:8px;border:2px solid rgba(255,215,0,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── MAIN LAYOUT ── */
#main{
  display:flex;flex-direction:column;align-items:center;
  padding:clamp(10px,2vw,16px) clamp(8px,1.5vw,14px);
  gap:clamp(10px,2vw,14px);flex:1;
}

/* ── ISLANDS ROW ── */
#islands-row{
  display:flex;gap:clamp(10px,2.5vw,24px);
  flex-wrap:wrap;justify-content:center;width:100%;
}
.island-panel{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  transition:opacity .4s,filter .4s;
}
.island-panel.eliminated{opacity:.18;filter:grayscale(1) brightness(.35);}

.island-name-tag{
  font-size:clamp(5px,1.4vw,7px);
  background:rgba(4,6,16,0.9);
  border:2px solid rgba(255,215,0,0.5);
  padding:4px 10px;color:var(--gold);white-space:nowrap;letter-spacing:1px;
  max-width:100%;overflow:hidden;text-overflow:ellipsis;
  box-shadow:2px 2px 0 rgba(0,0,0,0.5);
}
.island-name-tag.my-tag{
  border-color:var(--green);color:var(--green);
  box-shadow:2px 2px 0 rgba(0,0,0,0.5),var(--glow-green);
}
.island-name-tag.bot-tag{border-color:rgba(0,120,180,0.5);color:var(--cyan);}

.island-canvas{
  display:block;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
  box-shadow:4px 6px 0 rgba(0,0,0,0.6),0 0 0 2px rgba(255,215,0,0.1);
  border-radius:3px;
}
.island-stats{
  font-size:clamp(5px,1.3vw,6px);color:#c0d0f0;
  background:rgba(0,0,0,0.7);padding:4px 10px;text-align:center;
  line-height:2.4;border-radius:2px;white-space:nowrap;
  box-shadow:1px 1px 0 rgba(0,0,0,0.5);
}
.elim-badge{font-size:clamp(5px,1.2vw,6px);background:var(--red);color:#fff;padding:2px 7px;}
.inv-badge{
  font-size:clamp(5px,1.2vw,6px);
  background:rgba(0,0,0,0.8);border:1px solid rgba(255,215,0,0.3);
  color:var(--gold);padding:3px 8px;letter-spacing:1px;border-radius:2px;
}
.coin-badge{
  font-size:clamp(5px,1.2vw,7px);
  background:rgba(0,0,0,0.85);border:2px solid rgba(255,215,0,0.5);
  color:var(--coin);padding:3px 10px;letter-spacing:1px;border-radius:2px;
  text-shadow:0 0 8px rgba(255,215,0,0.4);
}

/* ── CONTROLS PANEL ── */
#controls{
  width:100%;max-width:min(900px,calc(100vw - 16px));
  background:var(--panel);
  border:2px solid rgba(255,215,0,0.45);
  box-shadow:5px 5px 0 rgba(0,0,0,0.7),var(--glow-gold);
  padding:clamp(10px,2.5vw,18px);
  display:flex;flex-direction:column;align-items:center;
  gap:clamp(8px,2vw,14px);
  backdrop-filter:blur(10px);
}
#phase-text{
  font-size:clamp(7px,2vw,10px);text-align:center;letter-spacing:1px;min-height:20px;
}
.text-green{color:var(--green);text-shadow:var(--glow-green);}
.text-yellow{color:var(--gold);text-shadow:var(--glow-gold);}
.text-cyan{color:var(--cyan);text-shadow:var(--glow-cyan);}
.text-red{color:var(--red);}
.text-orange{color:var(--orange);}
.section-label{font-size:clamp(5px,1.3vw,6px);color:#334060;letter-spacing:2px;margin-top:2px;}

/* ── ACTION BUTTONS ── */
.btn-row{display:flex;gap:clamp(6px,1.5vw,10px);flex-wrap:wrap;justify-content:center;}
button.game-btn{
  font-family:var(--font);font-size:clamp(5px,1.4vw,7px);cursor:pointer;border:none;
  padding:0;box-shadow:3px 3px 0 rgba(0,0,0,0.7);text-transform:uppercase;letter-spacing:1px;
  display:flex;flex-direction:column;align-items:center;overflow:hidden;
  transition:transform .05s,box-shadow .06s,filter .1s;
  min-width:clamp(64px,14vw,90px);
  position:relative;
}
button.game-btn::after{content:'';position:absolute;top:0;left:0;right:0;height:40%;background:rgba(255,255,255,0.07);pointer-events:none;}
button.game-btn:hover:not(:disabled){filter:brightness(1.18);}
button.game-btn:active:not(:disabled){transform:translate(2px,2px);box-shadow:1px 1px 0 rgba(0,0,0,0.7);}
button.game-btn:disabled{opacity:.25;cursor:not-allowed;box-shadow:none;}
.btn-icon{width:clamp(30px,7.5vw,48px);height:clamp(30px,7.5vw,48px);image-rendering:pixelated;margin:clamp(5px,1.2vw,8px) auto clamp(3px,1vw,6px);}
.btn-label{font-size:clamp(4px,1.2vw,6px);padding:clamp(3px,.8vw,5px) 4px clamp(4px,1vw,7px);width:100%;text-align:center;}
.btn-label small{display:block;font-size:clamp(3px,.9vw,4px);opacity:.6;margin-top:2px;white-space:normal;line-height:1.6;}

.btn-rps{background:#7a0f0f;}.btn-rps .btn-label{background:#a01818;color:#ffcccc;}
.btn-action{background:#0e1560;}.btn-action .btn-label{background:#1820a0;color:#aaccff;}
.btn-inv{background:#0c4010;}.btn-inv .btn-label{background:#166020;color:#aaffaa;}
.btn-store{background:#2d0860;}.btn-store .btn-label{background:#420e8a;color:#ddaaff;}
.btn-shop{background:#4a2c00;}.btn-shop .btn-label{background:#6a4000;color:var(--gold);}

#flash-msg{font-size:clamp(6px,1.7vw,8px);color:#ff4500;min-height:14px;text-align:center;letter-spacing:1px;}
.rps-waiting-row{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;font-size:clamp(5px,1.3vw,6px);color:#334060;}
.rps-pip{padding:3px 8px;border:1px solid #1a1f30;color:#334;}
.rps-pip.done{border-color:var(--green);color:var(--green);}

/* Target selector */
#target-selector{display:none;flex-direction:column;align-items:center;gap:8px;width:100%;}
#target-selector.visible{display:flex;}
#target-label{font-size:clamp(6px,1.8vw,8px);color:var(--gold);letter-spacing:1px;text-shadow:var(--glow-gold);}
#target-btn-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.target-btn{
  font-family:var(--font);font-size:clamp(6px,1.7vw,7px);cursor:pointer;
  border:2px solid rgba(255,215,0,0.5);background:rgba(8,10,20,0.9);
  color:var(--gold);padding:10px 16px;box-shadow:2px 2px 0 rgba(0,0,0,0.5);
  letter-spacing:1px;transition:background .1s,border-color .1s;
}
.target-btn:hover{background:rgba(20,15,0,0.9);border-color:var(--gold);}

/* Shop */
#shop-section{width:100%;border-top:1px solid #1a1f30;padding-top:10px;display:none;}
#shop-section.visible{display:block;}
.shop-hint{font-size:clamp(5px,1.3vw,6px);color:#5a4a00;text-align:center;margin-bottom:8px;letter-spacing:1px;}

/* Log */
#log-section{width:100%;max-width:min(900px,calc(100vw - 16px));background:rgba(3,5,14,.9);border:2px solid #1a1f30;padding:clamp(8px,2vw,12px);display:none;}
#log-section.visible{display:block;}
#log-title{font-size:clamp(5px,1.4vw,7px);color:var(--gold);margin-bottom:8px;letter-spacing:2px;}
#move-log{max-height:clamp(70px,12vh,100px);overflow-y:auto;font-size:clamp(5px,1.2vw,6px);color:#334060;line-height:2.6;scrollbar-width:thin;scrollbar-color:#222 transparent;}
#move-log p{border-bottom:1px solid #0a0c18;padding:1px 0;}

/* ── GAME OVER ── */
#gameover-overlay{
  position:fixed;inset:0;background:rgba(0,0,6,.97);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:clamp(12px,3vw,22px);z-index:100;padding:20px;
  backdrop-filter:blur(12px);
}
#gameover-overlay.visible{display:flex;}
#gameover-title{font-size:clamp(14px,5vw,28px);text-align:center;}
.win-text{
  color:var(--gold);
  text-shadow:5px 5px 0 #5a3800,var(--glow-gold);
  animation:win-pulse 1.2s ease-in-out infinite alternate;
  font-family:'Orbitron',var(--font);
}
.lose-text{color:var(--red);text-shadow:4px 4px 0 #5a0000;}
@keyframes win-pulse{to{text-shadow:5px 5px 0 #5a3800,0 0 60px rgba(255,215,0,1),0 0 100px rgba(255,170,0,0.5);}}
#gameover-scores{font-size:clamp(6px,1.8vw,9px);color:#9aa0c0;text-align:center;line-height:2.8;}
button.ui-btn{
  font-family:var(--font);font-size:clamp(8px,2.5vw,10px);cursor:pointer;border:none;
  padding:clamp(11px,2.5vw,14px) clamp(16px,4vw,22px);
  box-shadow:4px 4px 0 rgba(0,0,0,0.7);text-transform:uppercase;
  transition:transform .06s,box-shadow .06s,filter .1s;
}
button.ui-btn:active{transform:translate(2px,2px);box-shadow:2px 2px 0 rgba(0,0,0,0.7);}
.btn-yellow-ui{background:linear-gradient(180deg,#e09000,#c07000);color:#0a0500;border-bottom:3px solid #7a4000;}
.btn-yellow-ui:hover{filter:brightness(1.12);}

/* ── SETTINGS OVERLAY ── */
#settings-overlay{
  position:fixed;inset:0;background:rgba(0,0,6,.95);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;z-index:200;padding:20px;backdrop-filter:blur(12px);
}
#settings-overlay.visible{display:flex;}
.settings-card{
  background:rgba(5,7,18,0.98);border:2px solid rgba(255,215,0,0.5);
  box-shadow:6px 6px 0 rgba(0,0,0,0.7),var(--glow-gold);
  padding:clamp(18px,4vw,28px);
  width:100%;max-width:min(420px,calc(100vw - 32px));
}
.settings-title{
  font-size:clamp(9px,2.5vw,12px);color:var(--gold);
  letter-spacing:2px;margin-bottom:18px;text-align:center;
  text-shadow:var(--glow-gold);
}
.settings-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;font-size:clamp(6px,1.6vw,8px);color:#8090b0;}
.toggle-btn{
  font-family:var(--font);font-size:clamp(5px,1.4vw,7px);
  background:#0d0f1e;color:#334060;border:2px solid #1a1f30;
  padding:6px 12px;cursor:pointer;letter-spacing:1px;transition:all .15s;
}
.toggle-btn.on{background:#0a200a;color:var(--green);border-color:rgba(57,255,20,0.3);}
.settings-divider{border:none;border-top:1px solid #1a1f30;margin:14px 0;}
.settings-subtitle{font-size:clamp(6px,1.5vw,7px);color:#2a3050;letter-spacing:2px;margin-bottom:12px;}
.promo-row{display:flex;gap:8px;}
.promo-row input{
  background:rgba(0,2,14,0.9);border:2px solid #1a1f30;color:#fff;
  font-family:var(--font);font-size:clamp(7px,2vw,9px);
  padding:10px;flex:1;outline:none;text-transform:uppercase;letter-spacing:3px;
  transition:border-color .2s;
}
.promo-row input:focus{border-color:var(--gold);}
.promo-row button{
  font-family:var(--font);font-size:clamp(6px,1.6vw,8px);
  background:linear-gradient(180deg,#6a4000,#4a2c00);color:var(--gold);
  border:none;padding:10px 14px;cursor:pointer;
  box-shadow:2px 2px 0 rgba(0,0,0,0.5);letter-spacing:1px;transition:filter .1s;
}
.promo-row button:hover{filter:brightness(1.2);}
#promo-result{font-size:clamp(5px,1.4vw,7px);color:var(--green);min-height:14px;margin-top:6px;letter-spacing:1px;}
#promo-result.err{color:var(--red);}

/* ── CREDITS IN GAME OVER ── */
.gameover-credits{
  font-size:clamp(5px,1.2vw,6px);color:#1a2030;
  letter-spacing:2px;margin-top:4px;text-align:center;
}
.gameover-credits span{color:#2a3050;}

/* Responsive fixes */
@media(max-width:480px){
  #islands-row{gap:8px;}
  .island-name-tag{font-size:5px;padding:3px 7px;}
}
@media(min-width:1200px){
  #islands-row{gap:30px;}
}
@media(prefers-reduced-motion:reduce){
  *{animation-duration:.01ms!important;transition-duration:.01ms!important;}
}
</style>
</head>
<body>
<div id="conn-bar">
  <span id="conn-text"><span class="spinner"></span>LOADING BATTLE...</span>
  <button id="settings-btn" onclick="openSettings()">⚙ SETTINGS</button>
</div>
<div id="main">
  <div id="islands-row"></div>
  <div id="controls">
    <div id="phase-text" class="text-yellow">WAITING...</div>
    <div id="rps-waiting-row" class="rps-waiting-row"></div>
    <div id="flash-msg"></div>
    <div class="section-label">▸ ROCK · PAPER · SCISSORS</div>
    <div class="btn-row" id="rps-btns">
      <button class="game-btn btn-rps" id="btn-rock" disabled onclick="sendRPS('rock')">
        <canvas class="btn-icon" id="icon-rock"></canvas>
        <span class="btn-label">🪨 ROCK</span>
      </button>
      <button class="game-btn btn-rps" id="btn-paper" disabled onclick="sendRPS('paper')">
        <canvas class="btn-icon" id="icon-paper"></canvas>
        <span class="btn-label">📄 PAPER</span>
      </button>
      <button class="game-btn btn-rps" id="btn-scissors" disabled onclick="sendRPS('scissors')">
        <canvas class="btn-icon" id="icon-scissors"></canvas>
        <span class="btn-label">✂ SCISSORS</span>
      </button>
    </div>
    <div id="target-selector">
      <div id="target-label">🎯 SELECT TARGET:</div>
      <div id="target-btn-row"></div>
    </div>
    <div class="section-label" id="action-label" style="display:none;">▸ CHOOSE ACTION</div>
    <div class="btn-row" id="action-btns" style="display:none;">
      <button class="game-btn btn-action" id="btn-cannon" disabled onclick="pickAction('cannon',false)">
        <canvas class="btn-icon" id="icon-cannon"></canvas>
        <span class="btn-label">💣 CANNON<small>Remove shield OR destroy quadrant</small></span>
      </button>
      <button class="game-btn btn-action" id="btn-slicer" disabled onclick="pickAction('slicer',false)">
        <canvas class="btn-icon" id="icon-slicer"></canvas>
        <span class="btn-label">⚔ SLICER<small>Split+delete quadrant (BLOCKED by shield)</small></span>
      </button>
      <button class="game-btn btn-action" id="btn-shield" disabled onclick="sendAction('shield',null,false)">
        <canvas class="btn-icon" id="icon-shield"></canvas>
        <span class="btn-label">🛡 SHIELD<small>Block slicers + get item</small></span>
      </button>
      <button class="game-btn btn-store" id="btn-store" disabled onclick="sendAction('store',null,false)">
        <canvas class="btn-icon" id="icon-store"></canvas>
        <span class="btn-label">📦 BANK IT<small>Store cannon+slicer</small></span>
      </button>
    </div>
    <div class="section-label" id="inv-label" style="display:none;">▸ USE FROM INVENTORY</div>
    <div class="btn-row" id="inv-btns" style="display:none;">
      <button class="game-btn btn-inv" id="btn-inv-cannon" disabled onclick="pickAction('cannon',true)">
        <canvas class="btn-icon" id="icon-inv-cannon"></canvas>
        <span class="btn-label">💣 USE CANNON<small id="inv-cannon-count">×0 stored</small></span>
      </button>
      <button class="game-btn btn-inv" id="btn-inv-slicer" disabled onclick="pickAction('slicer',true)">
        <canvas class="btn-icon" id="icon-inv-slicer"></canvas>
        <span class="btn-label">⚔ USE SLICER<small id="inv-slicer-count">×0 stored</small></span>
      </button>
    </div>
    <!-- COIN SHOP -->
    <div id="shop-section">
      <div class="section-label" style="margin-bottom:8px;">▸ 🪙 COIN SHOP (1 coin each)</div>
      <div class="shop-hint">WIN RPS → EARN COINS → BUY WEAPONS!</div>
      <div class="btn-row">
        <button class="game-btn btn-shop" id="btn-buy-cannon" disabled onclick="buyItem('buy_cannon')">
          <canvas class="btn-icon" id="icon-buy-cannon"></canvas>
          <span class="btn-label">💣 BUY CANNON<small>1 🪙 coin</small></span>
        </button>
        <button class="game-btn btn-shop" id="btn-buy-slicer" disabled onclick="buyItem('buy_slicer')">
          <canvas class="btn-icon" id="icon-buy-slicer"></canvas>
          <span class="btn-label">⚔ BUY SLICER<small>1 🪙 coin</small></span>
        </button>
        <button class="game-btn btn-shop" id="btn-buy-shield" disabled onclick="buyItem('buy_shield')">
          <canvas class="btn-icon" id="icon-buy-shield"></canvas>
          <span class="btn-label">🛡 BUY SHIELD<small>1 🪙 coin</small></span>
        </button>
      </div>
    </div>
  </div>
  <div id="log-section">
    <div id="log-title">📜 BATTLE LOG</div>
    <div id="move-log"><p>▓ GAME STARTING...</p></div>
  </div>
</div>

<!-- GAME OVER -->
<div id="gameover-overlay">
  <div id="gameover-title">...</div>
  <div id="gameover-scores"></div>
  <button class="ui-btn btn-yellow-ui" onclick="location.href='/'">↩ PLAY AGAIN</button>
  <div class="gameover-credits">VORTEX ISLANDS · CREATED BY <span>NETHINDU THAMINDA</span></div>
</div>

<!-- SETTINGS OVERLAY -->
<div id="settings-overlay">
  <div class="settings-card">
    <div class="settings-title">⚙ SETTINGS</div>
    <div class="settings-row">
      <span>📜 BATTLE LOG</span>
      <button class="toggle-btn" id="toggle-log-btn" onclick="toggleLog()">OFF</button>
    </div>
    <hr class="settings-divider"/>
    <div class="settings-subtitle">🎁 PROMO CODE</div>
    <div class="promo-row">
      <input type="text" id="promo-input" placeholder="ENTER CODE" maxlength="16" autocomplete="off"/>
      <button onclick="redeemPromo()">REDEEM</button>
    </div>
    <div id="promo-result"></div>
    <hr class="settings-divider"/>
    <button class="ui-btn" style="background:rgba(10,12,24,0.9);color:#445;border:2px solid #1a1f30;width:100%;font-size:clamp(6px,1.8vw,8px);margin-top:4px;box-shadow:none;" onclick="closeSettings()">✕ CLOSE</button>
  </div>
</div>

<script>
// ══ CELL COLOURS ═══════════════════════════════════════
const CELL_COLORS = {
  sea:'#1060a8', grass:'#58aa3c', dark_grass:'#38881c',
  stone:'#7a8e94', dirt:'#926638', sand:'#ccaa60'
};

// ══ RESPONSIVE ISLAND SIZING — Much larger for all devices ════════════
function getIslandSize() {
  const vw = window.innerWidth;
  const playerCount = document.getElementById('islands-row').children.length || 2;
  // Scale based on viewport AND number of players
  let base;
  if (vw >= 1400) base = playerCount <= 2 ? 600 : playerCount <= 3 ? 500 : 400;
  else if (vw >= 1100) base = playerCount <= 2 ? 480 : playerCount <= 3 ? 400 : 340;
  else if (vw >= 900)  base = playerCount <= 2 ? 380 : playerCount <= 4 ? 300 : 260;
  else if (vw >= 700)  base = playerCount <= 2 ? 320 : playerCount <= 4 ? 240 : 200;
  else if (vw >= 500)  base = playerCount <= 2 ? 260 : playerCount <= 4 ? 200 : 168;
  else if (vw >= 380)  base = playerCount <= 2 ? 200 : playerCount <= 4 ? 160 : 136;
  else                  base = playerCount <= 2 ? 168 : 128;
  // Always 2:1 ratio (32×16 grid)
  const w = base, h = base / 2;
  return { w, h, cw: w/32, ch: h/16 };
}
const GW = 32, GH = 16;

// ══ CANNON SPAWN ON ISLAND ════════════════════════════
// Finds a land cell in a quadrant and draws cannon there
function drawCannonOnIsland(ctx, grid, CW, CH, targetQuadrant) {
  const H = grid.length, W = grid[0].length;
  const midR = Math.floor(H/2), midC = Math.floor(W/2);
  // Find all land cells in the targeted quadrant
  const landCells = [];
  grid.forEach((row, r) => row.forEach((cell, c) => {
    if (cell !== 'sea') {
      const q = (r < midR ? 0 : 2) + (c < midC ? 0 : 1);
      if (targetQuadrant === undefined || q === targetQuadrant) landCells.push({r,c});
    }
  }));
  if (landCells.length === 0) return;
  // Pick a central-ish cell
  const mid = landCells[Math.floor(landCells.length / 2)];
  const px = mid.c * CW, py = mid.r * CH;
  const cs = Math.max(2, Math.floor(CW * 0.7)); // cannon pixel size
  // Draw mini cannon pixel art on island
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(px, py + cs, cs * 3, cs);
  ctx.fillStyle = '#ffc107';
  ctx.fillRect(px + cs * 3, py + cs, cs, cs); // muzzle
  ctx.fillStyle = '#555';
  ctx.fillRect(px, py + cs * 2, cs, cs);
  ctx.fillRect(px + cs, py + cs * 2, cs, cs);
}

// ══ ISLAND RENDERING — HD ════════════════════════════
function renderIslandCanvas(canvas, grid, shields, pendingCannon, pendingQuadrant) {
  const sz = getIslandSize();
  canvas.width = sz.w; canvas.height = sz.h;
  const CW = sz.w / GW, CH = sz.h / GH;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, sz.w, sz.h);

  // Ocean base
  const seaGrad = ctx.createLinearGradient(0, 0, 0, sz.h);
  seaGrad.addColorStop(0, '#0d4a8a');
  seaGrad.addColorStop(0.5, '#1060a8');
  seaGrad.addColorStop(1, '#0a3570');
  ctx.fillStyle = seaGrad; ctx.fillRect(0, 0, sz.w, sz.h);

  // Wave shimmers
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  for (let i = 0; i < 6; i++) {
    ctx.fillRect((i * 67 + 14) % sz.w, (i * 41 + 8) % sz.h, sz.w * 0.18, 1);
  }

  // Land cells with 3D pixel detail
  grid.forEach((row, r) => row.forEach((cell, c) => {
    if (cell === 'sea') return;
    const color = CELL_COLORS[cell] || CELL_COLORS.grass;
    // Base
    ctx.fillStyle = color;
    ctx.fillRect(c * CW, r * CH, CW, CH);
    // Highlight top-left (3D effect)
    ctx.fillStyle = 'rgba(255,255,255,0.16)';
    ctx.fillRect(c * CW, r * CH, CW, 1.5);
    ctx.fillRect(c * CW, r * CH, 1.5, CH);
    // Shadow bottom-right
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.fillRect(c * CW + CW - 1.5, r * CH, 1.5, CH);
    ctx.fillRect(c * CW, r * CH + CH - 1.5, CW, 1.5);
  }));

  // Quadrant dividers
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 1.5; ctx.setLineDash([5, 6]);
  ctx.beginPath();
  ctx.moveTo(sz.w / 2, 0); ctx.lineTo(sz.w / 2, sz.h);
  ctx.moveTo(0, sz.h / 2); ctx.lineTo(sz.w, sz.h / 2);
  ctx.stroke(); ctx.setLineDash([]);

  // Quadrant labels
  const labelSz = Math.max(8, Math.floor(CW * 0.75));
  ctx.font = `bold ${labelSz}px monospace`;
  ctx.fillStyle = 'rgba(255,255,255,0.22)';
  ctx.fillText('1', 5, labelSz + 3);
  ctx.fillText('2', sz.w / 2 + 5, labelSz + 3);
  ctx.fillText('3', 5, sz.h / 2 + labelSz + 3);
  ctx.fillText('4', sz.w / 2 + 5, sz.h / 2 + labelSz + 3);

  // ── CANNON SPAWNS ON ISLAND if player has banked cannon ──
  if (pendingCannon) {
    drawCannonOnIsland(ctx, grid, CW, CH, pendingQuadrant);
  }

  // Shield rings
  if (shields > 0) {
    const shCols = [
      'rgba(0,180,255,0.95)',
      'rgba(0,240,255,0.7)',
      'rgba(200,250,255,0.55)'
    ];
    for (let s = 0; s < shields; s++) {
      const inset = (shields - s) * Math.max(5, Math.floor(CW * 0.45));
      ctx.strokeStyle = shCols[Math.min(s, 2)];
      ctx.lineWidth = Math.max(2.5, Math.floor(CW * 0.3));
      ctx.shadowColor = shCols[Math.min(s, 2)];
      ctx.shadowBlur = 18;
      ctx.strokeRect(inset + 1, inset + 1, sz.w - inset * 2 - 2, sz.h - inset * 2 - 2);
    }
    ctx.shadowBlur = 0;
  }
}

const params = new URLSearchParams(location.search);
const GAME_ID = params.get('gameId'), MY_NAME = params.get('username');
if (!GAME_ID || !MY_NAME) location.href = '/';
const API = '/api/game';
let gameState = null, myRPSSubmitted = false, pendingAction = null;
let pollInterval = null, gameOver = false, failCount = 0, logVisible = false;

async function post(action, body) {
  const r = await fetch(`${API}?action=${action}`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },

  });

}

// ══ RENDER ISLANDS ════════════════════════════════════
function renderIslands(state) {
  const row = document.getElementById('islands-row');
  const bots = state.bots || [];
  state.players.forEach(u => {
    const isAlive = state.islands[u] && state.islands[u].alive !== false;
    const isMe = u === MY_NAME;
    const isBot = bots.includes(u);
    const inv = state.islands[u]?.inventory || { cannons:0, slicers:0 };
    const coins = state.islands[u]?.coins || 0;
    const hasBankedCannon = inv.cannons > 0;

    let panel = document.getElementById('panel-' + u);
    if (!panel) {
      panel = document.createElement('div');
      panel.className = 'island-panel'; panel.id = 'panel-' + u;
      const sz = getIslandSize();
      panel.innerHTML = `
        <div class="island-name-tag" id="nametag-${u}">${isBot?'🤖':'🧑'} ${u}</div>
        <canvas class="island-canvas" id="canvas-${u}" width="${sz.w}" height="${sz.h}"></canvas>
        <div class="island-stats" id="stats-${u}">...</div>
        <div class="inv-badge" id="inv-${u}" style="display:none">📦 💣×0 ⚔×0</div>
        <div class="coin-badge" id="coins-${u}" style="display:none">🪙 0</div>`;
      row.appendChild(panel);
    }

    if (!isAlive) panel.classList.add('eliminated');
    else panel.classList.remove('eliminated');

    const tag = document.getElementById('nametag-' + u);
    if (tag) tag.className = isBot ? 'island-name-tag bot-tag' : ('island-name-tag' + (isMe ? ' my-tag' : ''));

    const canvas = document.getElementById('canvas-' + u);
    if (canvas && state.grids[u]) {
      // Pass cannon info so it renders on island
      renderIslandCanvas(canvas, state.grids[u], state.islands[u]?.shields || 0, hasBankedCannon && isMe, undefined);
    }

    const statsEl = document.getElementById('stats-' + u);
    if (statsEl && state.islands[u]) {
      if (!isAlive) statsEl.innerHTML = '<span class="elim-badge">💀 ELIMINATED</span>';
      else {
        const parts = 4 - (state.islands[u].quadrants?.length || 0);
        const sh = state.islands[u].shields || 0;
        statsEl.innerHTML = `❤ ${parts}/4 &nbsp;🛡 ${sh}/3 &nbsp;🏆 ${state.scores[u]}`;
      }
    }
    const invEl = document.getElementById('inv-' + u);
    if (invEl) {
      invEl.style.display = isMe ? 'block' : 'none';
      invEl.textContent = `📦 💣×${inv.cannons} ⚔×${inv.slicers}`;
    }
    const coinsEl = document.getElementById('coins-' + u);
    if (coinsEl) {
      coinsEl.style.display = isMe ? 'block' : 'none';
      coinsEl.textContent = `🪙 ${coins} coin${coins !== 1 ? 's' : ''}`;
    }
  });
}

// ══ UPDATE UI ═════════════════════════════════════════
function updateUI(state) {
  gameState = state;
  renderIslands(state);
  const ids = ['btn-rock','btn-paper','btn-scissors','btn-cannon','btn-slicer','btn-shield','btn-store','btn-inv-cannon','btn-inv-slicer','btn-buy-cannon','btn-buy-slicer','btn-buy-shield'];
  ids.forEach(id => { const b = document.getElementById(id); if (b) b.disabled = true; });
  document.getElementById('target-selector').classList.remove('visible');
  document.getElementById('action-label').style.display = 'none';
  document.getElementById('action-btns').style.display = 'none';
  document.getElementById('inv-label').style.display = 'none';
  document.getElementById('inv-btns').style.display = 'none';
  document.getElementById('shop-section').classList.remove('visible');
  pendingAction = null;

  const pt = document.getElementById('phase-text');
  const rpsWait = document.getElementById('rps-waiting-row');
  if (state.phase === 'rps' && state.alivePlayers?.length > 0) {
    rpsWait.innerHTML = state.alivePlayers.map(p =>
      `<span class="rps-pip ${state.pendingRPS[p]?'done':''}">${p}${state.pendingRPS[p]?' ✓':' ...'}</span>`
    ).join('');
  } else { rpsWait.innerHTML = ''; }

  const myAlive = state.alivePlayers?.includes(MY_NAME);
  if (!myAlive && !state.gameOver) { pt.textContent = '💀 ELIMINATED — SPECTATING...'; pt.className = 'text-red'; return; }

  if (state.phase === 'rps') {
    if (!myAlive) { pt.textContent = '👀 WATCHING RPS...'; pt.className = 'text-red'; }
    else if (state.pendingRPS[MY_NAME] || myRPSSubmitted) { pt.textContent = '⏳ WAITING FOR OTHERS...'; pt.className = 'text-yellow'; }
    else {
      pt.textContent = '⚔ YOUR TURN — PICK RPS!'; pt.className = 'text-green';
      ['btn-rock','btn-paper','btn-scissors'].forEach(id => { const b = document.getElementById(id); if (b) b.disabled = false; });
    }
    if (!state.pendingRPS[MY_NAME]) myRPSSubmitted = false;
  } else if (state.phase === 'action') {
    if (state.rpsWinner === MY_NAME) {
      pt.textContent = '✨ RPS WIN — CHOOSE ACTION!'; pt.className = 'text-cyan';
      document.getElementById('action-label').style.display = 'block';
      document.getElementById('action-btns').style.display = 'flex';
      ['btn-cannon','btn-slicer','btn-shield','btn-store'].forEach(id => { const b = document.getElementById(id); if (b) b.disabled = false; });
      const myInv = state.islands[MY_NAME]?.inventory || { cannons:0, slicers:0 };
      const myCoins = state.islands[MY_NAME]?.coins || 0;
      document.getElementById('inv-cannon-count').textContent = `×${myInv.cannons} stored`;
      document.getElementById('inv-slicer-count').textContent = `×${myInv.slicers} stored`;
      if (myInv.cannons > 0 || myInv.slicers > 0) {
        document.getElementById('inv-label').style.display = 'block';
        document.getElementById('inv-btns').style.display = 'flex';
        if (myInv.cannons > 0) { const b = document.getElementById('btn-inv-cannon'); if (b) b.disabled = false; }
        if (myInv.slicers > 0) { const b = document.getElementById('btn-inv-slicer'); if (b) b.disabled = false; }
      }
      if (myCoins >= 1) {
        document.getElementById('shop-section').classList.add('visible');
        ['btn-buy-cannon','btn-buy-slicer','btn-buy-shield'].forEach(id => { const b = document.getElementById(id); if (b) b.disabled = false; });
      }
    } else {
      pt.textContent = `⏳ ${state.rpsWinner||'?'} IS CHOOSING...`; pt.className = 'text-yellow';
    }
  }
  if (state.moves?.length > 0) {
    document.getElementById('move-log').innerHTML = state.moves.map(m => `<p>> ${m}</p>`).join('');
  }
}

function flash(msg) {
  const el = document.getElementById('flash-msg');
  el.textContent = msg; setTimeout(() => { el.textContent = ''; }, 2800);
}

function showGameOver(winner, state) {
  if (gameOver) return; gameOver = true; stopPolling();
  document.getElementById('gameover-title').innerHTML =
    winner === MY_NAME ? '<span class="win-text">🏆 YOU WIN!</span>' : `<span class="lose-text">${winner} WINS!</span>`;

      .map((p,i) => `<div>${i===0?'🥇':i===1?'🥈':'🥉'} ${p}: ${state.scores[p]} pts${p===winner?' 👑':''}</div>`).join('');

// ══ RPS ═══════════════════════════════════════════════
async function sendRPS(choice) {
  myRPSSubmitted = true;
  ['btn-rock','btn-paper','btn-scissors'].forEach(id => { const b = document.getElementById(id); if (b) b.disabled = true; });
  document.getElementById('phase-text').textContent = '⏳ WAITING FOR OTHERS...';
  document.getElementById('phase-text').className = 'text-yellow';
  const data = await post('rps_choice', { gameId: GAME_ID, username: MY_NAME, choice });
  if (data.error) { flash(data.error); myRPSSubmitted = false; return; }
  if (data.state) updateUI(data.state);
}

// ══ ACTIONS ════════════════════════════════════════════
function pickAction(act, fromInv) {
  if (!gameState) return;
  const opps = gameState.alivePlayers.filter(p => p !== MY_NAME);
  if (opps.length === 1) { sendAction(act, opps[0], fromInv); return; }
  pendingAction = act;
  document.getElementById('target-selector').classList.add('visible');
  document.getElementById('target-label').textContent = act === 'cannon' ? '🎯 CANNON TARGET:' : '⚔ SLICER TARGET:';
  document.getElementById('target-btn-row').innerHTML =
    opps.map(opp => `<button class="target-btn" onclick="sendAction('${act}','${opp}',${fromInv})">${opp}</button>`).join('');
}

async function sendAction(act, target, fromInv) {
  document.getElementById('target-selector').classList.remove('visible');
  ['btn-cannon','btn-slicer','btn-shield','btn-store','btn-inv-cannon','btn-inv-slicer'].forEach(id => {
    const b = document.getElementById(id); if (b) b.disabled = true;
  });
  const payload = { gameId: GAME_ID, username: MY_NAME, action: act };
  if (target) payload.targetPlayer = target;
  if (fromInv) payload.useInventory = true;
  const data = await post('action_choice', payload);
  if (data.error) { flash(data.error); if (gameState) updateUI(gameState); return; }
  if (data.state) updateUI(data.state);
  if (data.gameOver) showGameOver(data.winner, data.state);
}

function buyItem(act) {
  ['btn-buy-cannon','btn-buy-slicer','btn-buy-shield'].forEach(id => {
    const b = document.getElementById(id); if (b) b.disabled = true;
  });
  sendAction(act, null, false);
}

// ══ POLLING ════════════════════════════════════════════
function stopPolling() { if (pollInterval) { clearInterval(pollInterval); pollInterval = null; } }
let lastHash = '';
async function poll() {
  try {
    const data = await getState();
    if (data.error) { failCount++; return; }
    failCount = 0;
    const state = data.state;
    const hash = state.phase + (state.moves?.length||0) + JSON.stringify(state.pendingRPS) + JSON.stringify(state.islands);
    if (hash !== lastHash || !gameState) { lastHash = hash; updateUI(state); }
    if (state.gameOver && !gameOver) showGameOver(state.winner, state);
    const bar = document.getElementById('conn-text');
    bar.textContent = '⚡ LIVE'; bar.parentElement.className = 'ok';
  } catch(e) {
    failCount++;
    if (failCount >= 3) {
      const bar = document.getElementById('conn-text');
      bar.innerHTML = '<span class="spinner"></span>RECONNECTING...';
      bar.parentElement.className = '';
    }
    if (failCount >= 40) {
      document.getElementById('conn-text').textContent = '❌ CONNECTION LOST — REFRESH';
      document.getElementById('conn-bar').className = 'err';
      stopPolling();
    }
  }
}

    if (gameState) renderIslands(gameState);
    initIcons();
  }, 200);
});

async function init() {
  initIcons();
  const bar = document.getElementById('conn-text');
  try {
    const data = await getState();
    if (data.error) { bar.textContent = '❌ GAME NOT FOUND'; bar.parentElement.className = 'err'; return; }
    bar.textContent = '⚡ LIVE'; bar.parentElement.className = 'ok';
    updateUI(data.state);
    if (data.state.gameOver) { showGameOver(data.state.winner, data.state); return; }
    pollInterval = setInterval(poll, 1500);
  } catch(e) {
    bar.textContent = '❌ FAILED TO LOAD — REFRESH'; bar.parentElement.className = 'err';
  }
}
init();
</script>
</body>
</html>
