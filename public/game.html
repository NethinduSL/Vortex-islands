<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>VORTEX ISLANDS — BATTLE</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1260a8;--gold:#ffd700;--green:#39ff14;--red:#ff1744;
  --cyan:#00c8ff;--orange:#ff9800;--dark:#0a0a0a;--panel:rgba(8,8,8,0.95);
  --font:'Press Start 2P',monospace;
}
html,body{min-height:100%;width:100%;overflow:hidden;background:#0a1a2a;}
body{font-family:var(--font);display:flex;flex-direction:column;height:100vh;}

/* ── TOP BAR ── */
#conn-bar{
  background:#070707;border-bottom:3px solid var(--gold);padding:6px 12px;
  font-size:clamp(5px,1.5vw,7px);color:var(--gold);display:flex;
  align-items:center;justify-content:space-between;letter-spacing:2px;flex-shrink:0;z-index:50;
}
#conn-bar.ok{color:var(--green);text-shadow:0 0 6px var(--green);}
#conn-bar.err{color:var(--red);}
.spinner{display:inline-block;width:7px;height:7px;border:2px solid rgba(255,215,0,.25);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px;}
@keyframes spin{to{transform:rotate(360deg)}}
#settings-btn{font-family:var(--font);font-size:clamp(5px,1.4vw,6px);background:#1a1a1a;color:var(--gold);border:2px solid #333;padding:4px 8px;cursor:pointer;letter-spacing:1px;box-shadow:2px 2px 0 #000;}

/* ── SEA WORLD (zoomable canvas) ── */
#sea-world{
  flex:1;position:relative;overflow:hidden;cursor:grab;
  background:linear-gradient(180deg,#0d3a6e 0%,#1260a8 40%,#1a7ad4 100%);
  touch-action:none;
}
#sea-world:active{cursor:grabbing;}
#sea-canvas{position:absolute;top:0;left:0;image-rendering:pixelated;}

/* Zoom controls */
#zoom-btns{
  position:absolute;bottom:120px;right:10px;display:flex;flex-direction:column;gap:4px;z-index:20;
}
.zoom-btn{
  width:32px;height:32px;background:rgba(0,0,0,.7);border:2px solid var(--gold);
  color:var(--gold);font-family:var(--font);font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:2px 2px 0 #000;
}
.zoom-btn:hover{background:rgba(255,215,0,.15);}
#zoom-label{font-size:6px;color:var(--gold);text-align:center;font-family:var(--font);}

/* ── BOTTOM CONTROLS PANEL ── */
#controls{
  background:var(--panel);border-top:3px solid var(--gold);
  padding:clamp(6px,1.5vw,10px) clamp(8px,2vw,14px);
  display:flex;flex-direction:column;align-items:center;
  gap:clamp(5px,1.2vw,8px);flex-shrink:0;z-index:40;
  max-height:42vh;overflow-y:auto;
}

/* Phase/status line */
#phase-text{font-size:clamp(6px,1.8vw,9px);text-align:center;letter-spacing:1px;min-height:16px;}
.text-green{color:var(--green);text-shadow:0 0 8px rgba(57,255,20,0.4);}
.text-yellow{color:var(--gold);}
.text-cyan{color:var(--cyan);}
.text-red{color:var(--red);}
.text-orange{color:var(--orange);}

/* Slot indicator */
#slot-bar{
  display:none;align-items:center;gap:6px;flex-wrap:wrap;justify-content:center;
  font-size:clamp(5px,1.4vw,6px);
}
#slot-bar.visible{display:flex;}
.slot-pip{
  width:clamp(12px,3vw,18px);height:clamp(12px,3vw,18px);
  background:#ffd700;border:2px solid #000;box-shadow:2px 2px 0 #000;
}
.slot-pip.used{background:#333;}

/* RPS waiting pips */
.rps-waiting-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;font-size:clamp(4px,1.2vw,6px);color:#555;}
.rps-pip{padding:2px 6px;border:1px solid #2a2a2a;color:#444;}
.rps-pip.done{border-color:var(--green);color:var(--green);}

/* Sections row */
.sections-row{display:flex;gap:clamp(6px,1.5vw,10px);align-items:flex-start;flex-wrap:wrap;justify-content:center;width:100%;}

/* ── RPS BUTTONS (compact) ── */
.rps-section{display:flex;flex-direction:column;align-items:center;gap:4px;}
.section-label{font-size:clamp(4px,1.1vw,5px);color:#555;letter-spacing:2px;margin-bottom:2px;text-align:center;}
.rps-row{display:flex;gap:clamp(4px,1vw,6px);}
button.rps-btn{
  font-family:var(--font);cursor:pointer;border:none;
  width:clamp(44px,11vw,60px);height:clamp(44px,11vw,60px);
  background:#9a1818;box-shadow:3px 3px 0 #000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;transition:transform .05s,box-shadow .05s,filter .1s;
  padding:0;
}
button.rps-btn:hover:not(:disabled){filter:brightness(1.2);}
button.rps-btn:active:not(:disabled){transform:translate(2px,2px);box-shadow:1px 1px 0 #000;}
button.rps-btn:disabled{opacity:.25;cursor:not-allowed;box-shadow:none;}
.rps-icon{font-size:clamp(14px,4vw,20px);line-height:1;}
.rps-lbl{font-size:clamp(3px,.9vw,5px);color:#fff;letter-spacing:1px;}

/* ── ACTION PANEL ── */
.action-section{display:flex;flex-direction:column;align-items:center;gap:4px;}
.action-btns-row{display:flex;gap:clamp(4px,1vw,6px);flex-wrap:wrap;justify-content:center;}
button.act-btn{
  font-family:var(--font);cursor:pointer;border:none;
  padding:clamp(5px,1.2vw,8px) clamp(6px,1.5vw,10px);
  box-shadow:3px 3px 0 #000;font-size:clamp(5px,1.3vw,7px);
  text-transform:uppercase;letter-spacing:1px;
  transition:transform .05s,box-shadow .05s,filter .1s;
  display:flex;flex-direction:column;align-items:center;gap:3px;min-width:clamp(50px,12vw,72px);
}
button.act-btn:hover:not(:disabled){filter:brightness(1.2);}
button.act-btn:active:not(:disabled){transform:translate(2px,2px);box-shadow:1px 1px 0 #000;}
button.act-btn:disabled{opacity:.25;cursor:not-allowed;box-shadow:none;}
.act-icon{font-size:clamp(12px,3.5vw,18px);}
.act-lbl{font-size:clamp(3px,.9vw,5px);color:#fff;letter-spacing:1px;}
.act-sub{font-size:clamp(3px,.8vw,4px);color:rgba(255,255,255,0.55);white-space:normal;text-align:center;line-height:1.4;}
.btn-buy{background:#3a0e7a;}.btn-buy .act-lbl{color:var(--gold);}
.btn-use{background:#141a6e;}
.btn-shield-buy{background:#0d4a18;}

/* ── STORAGE PANEL ── */
.storage-section{
  background:#050505;border:2px solid #222;padding:clamp(5px,1.2vw,8px) clamp(7px,1.8vw,12px);
  display:flex;flex-direction:column;gap:4px;min-width:clamp(80px,20vw,120px);
}
.storage-title{font-size:clamp(4px,1.1vw,6px);color:var(--gold);letter-spacing:2px;margin-bottom:2px;}
.storage-row{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:clamp(5px,1.3vw,6px);}
.storage-item{color:#aaa;}
.storage-count{color:var(--cyan);font-size:clamp(7px,2vw,10px);}

/* ── TARGET SELECTOR ── */
#target-selector{display:none;flex-direction:column;align-items:center;gap:5px;width:100%;}
#target-selector.visible{display:flex;}
#target-label{font-size:clamp(5px,1.5vw,7px);color:var(--gold);letter-spacing:1px;}
#target-btn-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
.target-btn{
  font-family:var(--font);font-size:clamp(5px,1.4vw,6px);cursor:pointer;
  border:2px solid var(--gold);background:#111;color:var(--gold);
  padding:7px 12px;box-shadow:2px 2px 0 #000;letter-spacing:1px;
}
.target-btn:hover{background:#1e1a00;}

/* Flash */
#flash-msg{font-size:clamp(5px,1.5vw,7px);color:#ff4500;min-height:12px;text-align:center;letter-spacing:1px;}

/* Log */
#log-section{width:100%;max-width:860px;background:rgba(6,6,6,.88);border:1px solid #1a1a1a;padding:6px 10px;display:none;}
#log-section.visible{display:block;}
#move-log{max-height:60px;overflow-y:auto;font-size:clamp(4px,1.1vw,5px);color:#555;line-height:2.2;scrollbar-width:thin;scrollbar-color:#333 transparent;}
#move-log p{border-bottom:1px solid #0f0f0f;padding:1px 0;}

/* ── RPS RESULT POPUP ── */
#rps-popup{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.7);
  background:#0a0a0a;border:4px solid var(--gold);
  box-shadow:0 0 40px rgba(255,215,0,0.4),8px 8px 0 #000;
  padding:clamp(14px,3.5vw,24px) clamp(18px,4.5vw,36px);
  z-index:300;display:none;flex-direction:column;align-items:center;gap:8px;
  opacity:0;transition:transform .2s cubic-bezier(.175,.885,.32,1.4),opacity .2s ease;
  pointer-events:none;
}
#rps-popup.show{display:flex;opacity:1;transform:translate(-50%,-50%) scale(1);}
#rps-popup.hide{opacity:0;transform:translate(-50%,-50%) scale(0.8);}
#rps-popup-emoji{font-size:clamp(24px,7vw,44px);line-height:1;}
#rps-popup-title{font-size:clamp(9px,2.5vw,14px);color:var(--gold);letter-spacing:2px;text-align:center;text-shadow:3px 3px 0 #6b4c00,0 0 20px var(--gold);}
#rps-popup-sub{font-size:clamp(5px,1.5vw,8px);color:#888;letter-spacing:1px;text-align:center;}
#rps-popup-choices{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;font-size:clamp(4px,1.2vw,6px);}
.rps-popup-chip{padding:3px 9px;border:1px solid #333;color:#666;}
.rps-popup-chip.winner{border-color:var(--gold);color:var(--gold);}
.rps-popup-chip.loser{border-color:#333;color:#333;text-decoration:line-through;}

/* ── GAME OVER ── */
#gameover-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.96);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:clamp(10px,2.5vw,18px);z-index:400;padding:20px;
}
#gameover-overlay.visible{display:flex;}
#gameover-title{font-size:clamp(12px,4.5vw,24px);text-align:center;}
.win-text{color:var(--gold);text-shadow:5px 5px 0 #6b4c00,0 0 30px var(--gold);animation:gpulse 1.2s ease-in-out infinite alternate;}
.lose-text{color:var(--red);text-shadow:4px 4px 0 #5a0000;}
@keyframes gpulse{to{text-shadow:5px 5px 0 #6b4c00,0 0 50px var(--gold),0 0 80px rgba(255,215,0,0.3);}}
#gameover-scores{font-size:clamp(6px,1.8vw,9px);color:#ccc;text-align:center;line-height:2.8;}
button.ui-btn{font-family:var(--font);font-size:clamp(7px,2.2vw,10px);cursor:pointer;border:none;padding:clamp(10px,2.5vw,14px) clamp(14px,3.5vw,22px);box-shadow:4px 4px 0 #000;text-transform:uppercase;transition:transform .06s,box-shadow .06s;}
button.ui-btn:active{transform:translate(2px,2px);box-shadow:2px 2px 0 #000;}
.btn-yellow-ui{background:var(--gold);color:#1a1a1a;}.btn-yellow-ui:hover{filter:brightness(1.1);}

/* ── SETTINGS OVERLAY ── */
#settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:200;padding:20px;}
#settings-overlay.visible{display:flex;}
.settings-card{background:#0d0d0d;border:3px solid var(--gold);box-shadow:6px 6px 0 #000;padding:20px;width:100%;max-width:min(400px,calc(100vw - 32px));}
.settings-title{font-size:clamp(8px,2.3vw,11px);color:var(--gold);letter-spacing:2px;margin-bottom:16px;text-align:center;}
.settings-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;font-size:clamp(5px,1.5vw,7px);color:#aaa;}
.toggle-btn{font-family:var(--font);font-size:clamp(5px,1.3vw,6px);background:#1a1a1a;color:#888;border:2px solid #333;padding:5px 10px;cursor:pointer;letter-spacing:1px;}
.toggle-btn.on{background:#003a00;color:var(--green);border-color:#005a00;}
.settings-divider{border:none;border-top:1px solid #1e1e1e;margin:12px 0;}
</style>
</head>
<body>

<div id="conn-bar">
  <span id="conn-text"><span class="spinner"></span>LOADING...</span>
  <span style="font-size:clamp(4px,.9vw,5px);color:#555;opacity:0.6;">BY NETHINDU THAMINDA</span>
  <button id="settings-btn" onclick="openSettings()">⚙</button>
</div>

<!-- SEA WORLD -->
<div id="sea-world" id="sea-world">
  <canvas id="sea-canvas"></canvas>
  <div id="zoom-btns">
    <button class="zoom-btn" onclick="doZoom(1.25)">+</button>
    <div id="zoom-label">100%</div>
    <button class="zoom-btn" onclick="doZoom(0.8)">−</button>
    <button class="zoom-btn" onclick="resetView()" title="Reset view" style="font-size:10px;">⌂</button>
  </div>
</div>

<!-- BOTTOM CONTROLS -->
<div id="controls">
  <div id="phase-text" class="text-yellow">WAITING...</div>
  <div id="slot-bar">
    <span style="font-size:clamp(4px,1.1vw,6px);color:var(--gold);">SLOTS:</span>
  </div>
  <div class="rps-waiting-row" id="rps-waiting-row"></div>

  <div class="sections-row">
    <!-- RPS -->
    <div class="rps-section">
      <div class="section-label">▸ RPS</div>
      <div class="rps-row">
        <button class="rps-btn" id="btn-rock" disabled onclick="sendRPS('rock')">
          <span class="rps-icon">🪨</span><span class="rps-lbl">ROCK</span>
        </button>
        <button class="rps-btn" id="btn-paper" disabled onclick="sendRPS('paper')">
          <span class="rps-icon">📄</span><span class="rps-lbl">PAPER</span>
        </button>
        <button class="rps-btn" id="btn-scissors" disabled onclick="sendRPS('scissors')">
          <span class="rps-icon">✂</span><span class="rps-lbl">SCIS</span>
        </button>
      </div>
    </div>

    <!-- BUY (when it's your action turn) -->
    <div class="action-section" id="buy-section" style="display:none;">
      <div class="section-label">▸ BUY &amp; STORE</div>
      <div class="action-btns-row">
        <button class="act-btn btn-buy" id="btn-buy-cannon" disabled onclick="doAction('buy_cannon',false)">
          <span class="act-icon">💣</span>
          <span class="act-lbl">BUY CANNON</span>
          <span class="act-sub">Store, strip shield</span>
        </button>
        <button class="act-btn btn-buy" id="btn-buy-slicer" disabled onclick="doAction('buy_slicer',false)">
          <span class="act-icon">⚔</span>
          <span class="act-lbl">BUY SLICER</span>
          <span class="act-sub">Store, cut quadrant</span>
        </button>
        <button class="act-btn btn-shield-buy" id="btn-buy-shield" disabled onclick="doAction('buy_shield',false)">
          <span class="act-icon">🛡</span>
          <span class="act-lbl">BUY SHIELD</span>
          <span class="act-sub">Instant, blocks slicers</span>
        </button>
      </div>
    </div>

    <!-- USE (from storage) -->
    <div class="action-section" id="use-section" style="display:none;">
      <div class="section-label">▸ USE FROM STORAGE</div>
      <div class="action-btns-row">
        <button class="act-btn btn-use" id="btn-use-cannon" disabled onclick="pickTarget('cannon')">
          <span class="act-icon">💣</span>
          <span class="act-lbl">USE CANNON</span>
          <span class="act-sub" id="inv-cannon-lbl">×0 stored</span>
        </button>
        <button class="act-btn btn-use" id="btn-use-slicer" disabled onclick="pickTarget('slicer')">
          <span class="act-icon">⚔</span>
          <span class="act-lbl">USE SLICER</span>
          <span class="act-sub" id="inv-slicer-lbl">×0 stored</span>
        </button>
      </div>
    </div>

    <!-- STORAGE DISPLAY -->
    <div class="storage-section">
      <div class="storage-title">📦 STORAGE</div>
      <div class="storage-row">
        <span class="storage-item">💣 Cannons</span>
        <span class="storage-count" id="st-cannons">0</span>
      </div>
      <div class="storage-row">
        <span class="storage-item">⚔ Slicers</span>
        <span class="storage-count" id="st-slicers">0</span>
      </div>
      <div class="storage-row">
        <span class="storage-item">🛡 Shields</span>
        <span class="storage-count" id="st-shields">0</span>
      </div>
    </div>
  </div>

  <!-- Target selector -->
  <div id="target-selector">
    <div id="target-label">🎯 SELECT TARGET:</div>
    <div id="target-btn-row"></div>
    <button class="act-btn" style="background:#333;font-size:clamp(5px,1.3vw,6px);margin-top:2px;" onclick="cancelTarget()">✕ CANCEL</button>
  </div>

  <div id="flash-msg"></div>
  <div id="log-section"><div id="move-log"><p>▓ GAME STARTING...</p></div></div>
</div>

<!-- RPS POPUP -->
<div id="rps-popup">
  <div id="rps-popup-emoji">🏆</div>
  <div id="rps-popup-title">RPS RESULT</div>
  <div id="rps-popup-sub"></div>
  <div id="rps-popup-choices"></div>
</div>

<!-- GAME OVER -->
<div id="gameover-overlay">
  <div id="gameover-title">...</div>
  <div id="gameover-scores"></div>
  <button class="ui-btn btn-yellow-ui" onclick="location.href='/'">↩ PLAY AGAIN</button>
</div>

<!-- SETTINGS -->
<div id="settings-overlay">
  <div class="settings-card">
    <div class="settings-title">⚙ SETTINGS</div>
    <div class="settings-row">
      <span>📜 BATTLE LOG</span>
      <button class="toggle-btn" id="toggle-log-btn" onclick="toggleLog()">OFF</button>
    </div>
    <div class="settings-divider"></div>
    <button class="ui-btn" style="background:#1a1a1a;color:#888;border:2px solid #333;width:100%;font-size:clamp(5px,1.6vw,7px);" onclick="closeSettings()">✕ CLOSE</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// VORTEX ISLANDS — GAME CLIENT v4
// ═══════════════════════════════════════════════════════════════════════════

const CELL_COLORS = {
  sea:null, // transparent — shows the ocean beneath
  grass:'#5aad3e', dark_grass:'#3a8a28', stone:'#8a9aa0', dirt:'#9a6b3e', sand:'#d4b06a'
};

// ── URL params ──────────────────────────────────────────────────────────────
const params = new URLSearchParams(location.search);
const GAME_ID = params.get('gameId'), MY_NAME = params.get('username');
if (!GAME_ID || !MY_NAME) location.href = '/';
const API = '/api/game';

// ── State ───────────────────────────────────────────────────────────────────
let gameState = null, myRPSSubmitted = false, pendingActionType = null;
let pollInterval = null, gameOver = false, failCount = 0, logVisible = false;
let isPollRunning = false;

// ── Sea world pan/zoom state ─────────────────────────────────────────────────
let seaScale = 1.0;          // current zoom
let seaOffX = 0, seaOffY = 0; // pan offset
let isDragging = false, dragStartX = 0, dragStartY = 0, dragOffX = 0, dragOffY = 0;
let pinchDist = 0;

// Pre-rendered island canvases (cached)
const islandCache = {}; // player → offscreen canvas

// ── Network helpers ──────────────────────────────────────────────────────────
async function safeJson(resp) {
  const t = await resp.text();
  try { return JSON.parse(t); } catch(e) { return {error:'SERVER_ERROR'}; }
}
async function ft(url, opts, ms=10000) {
  const c = new AbortController();
  const tid = setTimeout(() => c.abort(), ms);
  try { const r = await fetch(url, {...opts, signal:c.signal}); clearTimeout(tid); return r; }
  catch(e) { clearTimeout(tid); throw e; }
}
async function post(act, body) {
  return safeJson(await ft(`${API}?action=${act}`, {
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)
  }));
}
async function getState() {
  return safeJson(await ft(`${API}?action=game&gameId=${GAME_ID}`));
}

// ── Settings ─────────────────────────────────────────────────────────────────
function openSettings() { document.getElementById('settings-overlay').classList.add('visible'); }
function closeSettings() { document.getElementById('settings-overlay').classList.remove('visible'); }
function toggleLog() {
  logVisible = !logVisible;
  document.getElementById('log-section').classList.toggle('visible', logVisible);
  const btn = document.getElementById('toggle-log-btn');
  btn.classList.toggle('on', logVisible);
  btn.textContent = logVisible ? 'ON' : 'OFF';
}

// ═══════════════════════════════════════════════════════════════════════════
// SEA WORLD RENDERING
// ═══════════════════════════════════════════════════════════════════════════

const seaWorld = document.getElementById('sea-world');
const seaCanvas = document.getElementById('sea-canvas');
const seaCtx = seaCanvas.getContext('2d');

// Island layout positions on the sea (normalised 0..1)
const ISLAND_POSITIONS = [
  {x:.5, y:.5},   // 1 player: center
  {x:.28,y:.5}, {x:.72,y:.5},  // 2 players
  {x:.5,y:.22}, {x:.22,y:.7}, {x:.78,y:.7},  // 3
  {x:.25,y:.28},{x:.75,y:.28},{x:.2,y:.72},{x:.8,y:.72},{x:.5,y:.5},{x:.5,y:.5}, // 4-6
];

function getIslandPos(idx, total) {
  const layouts = {
    1: [{x:.5,y:.5}],
    2: [{x:.28,y:.5},{x:.72,y:.5}],
    3: [{x:.5,y:.22},{x:.22,y:.72},{x:.78,y:.72}],
    4: [{x:.25,y:.28},{x:.75,y:.28},{x:.25,y:.72},{x:.75,y:.72}],
    5: [{x:.5,y:.2},{x:.2,y:.5},{x:.8,y:.5},{x:.3,y:.78},{x:.7,y:.78}],
    6: [{x:.25,y:.2},{x:.75,y:.2},{x:.15,y:.55},{x:.85,y:.55},{x:.35,y:.82},{x:.65,y:.82}],
  };
  const t = Math.min(6, Math.max(1, total));
  const arr = layouts[t] || layouts[6];
  return arr[idx % arr.length];
}

// Island display size on sea canvas (pixels at zoom=1)
function getIslandDrawSize() {
  const vw = seaWorld.clientWidth, vh = seaWorld.clientHeight;
  const base = Math.min(vw, vh);
  // Scales down with more players
  const pc = gameState ? Math.max(2, gameState.players.length) : 2;
  const factor = {2:.28, 3:.22, 4:.18, 5:.15, 6:.13}[pc] || .18;
  const w = Math.floor(base * factor);
  return { w, h: Math.floor(w * 0.5) }; // 2:1 ratio matching 64×32 grid
}

// Build island canvas from grid (cached)
function buildIslandCanvas(player, state) {
  const GRID_W = 64, GRID_H = 32;
  const sz = getIslandDrawSize();
  const cw = sz.w, ch = sz.h;
  const CW = cw / GRID_W, CH = ch / GRID_H;

  const oc = document.createElement('canvas');
  oc.width = cw; oc.height = ch;
  const ctx = oc.getContext('2d');

  const grid = state.grids[player];
  if (!grid) return oc;

  // Ocean base
  ctx.fillStyle = '#1a6fad';
  ctx.fillRect(0, 0, cw, ch);

  // Land cells
  grid.forEach((row, r) => row.forEach((cell, c) => {
    const col = CELL_COLORS[cell];
    if (!col) return;
    ctx.fillStyle = col;
    ctx.fillRect(Math.floor(c*CW), Math.floor(r*CH), Math.ceil(CW), Math.ceil(CH));
    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(Math.floor(c*CW), Math.floor(r*CH), Math.ceil(CW*.4), Math.ceil(CH*.4));
  }));

  // Wave shimmer
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  for (let r=0;r<GRID_H;r+=3) {
    grid[r] && grid[r].forEach((cell,c)=>{
      if(cell==='sea') ctx.fillRect(Math.floor(c*CW), Math.floor(r*CH+CH*.4), Math.ceil(CW), 1);
    });
  }

  // Quadrant dividers
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 1;
  ctx.setLineDash([3,4]);
  ctx.beginPath();
  ctx.moveTo(cw/2, 0); ctx.lineTo(cw/2, ch);
  ctx.moveTo(0, ch/2); ctx.lineTo(cw, ch/2);
  ctx.stroke();
  ctx.setLineDash([]);

  // Q labels
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  const ls = Math.max(5, Math.floor(CW));
  ctx.font = `bold ${ls}px monospace`;
  ctx.fillText('1', 3, ls+1); ctx.fillText('2', cw/2+3, ls+1);
  ctx.fillText('3', 3, ch/2+ls+1); ctx.fillText('4', cw/2+3, ch/2+ls+1);

  // Shields
  const shields = state.islands[player]?.shields || 0;
  if (shields > 0) {
    const shCols = ['rgba(0,168,255,0.9)','rgba(0,230,255,0.7)','rgba(180,245,255,0.55)'];
    ctx.shadowBlur = 12;
    for (let s=0;s<shields;s++) {
      const ins = (shields-s)*Math.max(3, Math.floor(CW*.3));
      ctx.strokeStyle = shCols[s]; ctx.lineWidth = 2; ctx.shadowColor = shCols[s];
      ctx.strokeRect(ins+1, ins+1, cw-ins*2-2, ch-ins*2-2);
    }
    ctx.shadowBlur = 0;
  }

  // Eliminated overlay
  if (state.islands[player]?.alive === false) {
    ctx.fillStyle = 'rgba(180,0,0,0.45)';
    ctx.fillRect(0,0,cw,ch);
  }

  return oc;
}

// Draw the full sea world
function drawSea() {
  const W = seaWorld.clientWidth, H = seaWorld.clientHeight;
  seaCanvas.width = W; seaCanvas.height = H;
  const ctx = seaCtx;

  // Ocean gradient
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#0d3a6e'); grad.addColorStop(.5,'#1260a8'); grad.addColorStop(1,'#1a7ad4');
  ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);

  // Wave lines
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let y=20;y<H;y+=40) {
    ctx.beginPath(); ctx.moveTo(0,y);
    for (let x=0;x<W;x+=60) ctx.bezierCurveTo(x+15,y-4,x+45,y+4,x+60,y);
    ctx.stroke();
  }

  if (!gameState) return;

  const players = gameState.players;
  const sz = getIslandDrawSize();

  players.forEach((p, i) => {
    const pos = getIslandPos(i, players.length);
    const worldX = pos.x * W * seaScale + seaOffX;
    const worldY = pos.y * H * seaScale + seaOffY;
    const islandW = sz.w * seaScale;
    const islandH = sz.h * seaScale;
    const drawX = worldX - islandW/2;
    const drawY = worldY - islandH/2;

    const isAlive = gameState.islands[p]?.alive !== false;
    const isMe = p === MY_NAME;
    const isBot = (gameState.bots||[]).includes(p);

    // Shadow
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 12 * seaScale;
    ctx.shadowOffsetY = 4 * seaScale;

    // Build/use cached island canvas
    const cacheKey = p + '|' + JSON.stringify(gameState.grids[p]) + '|' + (gameState.islands[p]?.shields||0) + '|' + isAlive;
    if (!islandCache[p] || islandCache[p].key !== cacheKey) {
      islandCache[p] = { canvas: buildIslandCanvas(p, gameState), key: cacheKey };
    }
    ctx.globalAlpha = isAlive ? 1.0 : 0.3;
    ctx.drawImage(islandCache[p].canvas, drawX, drawY, islandW, islandH);
    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
    ctx.globalAlpha = 1.0;

    // RPS overlay on island
    const rpsChoices = gameState.rpsChoices || {};
    const rpsWinners = gameState.rpsWinners || [];
    if (rpsChoices[p]) {
      const RPS_E = {rock:'🪨',paper:'📄',scissors:'✂️'};
      ctx.fillStyle = 'rgba(0,0,0,0.42)';
      ctx.fillRect(drawX, drawY, islandW, islandH);
      ctx.font = `${Math.max(14, islandH * 0.45)}px serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(RPS_E[rpsChoices[p]]||rpsChoices[p], drawX+islandW/2, drawY+islandH/2);
      ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
      // Win glow
      if (rpsWinners.includes(p)) {
        ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 3*seaScale;
        ctx.shadowColor='#ffd700'; ctx.shadowBlur=15;
        ctx.strokeRect(drawX+1, drawY+1, islandW-2, islandH-2);
        ctx.shadowBlur=0;
      }
    }

    // Name tag
    const tagH = Math.max(10, 14*seaScale);
    const tagFontSz = Math.max(5, 8*seaScale);
    ctx.fillStyle = isMe ? '#39ff14' : isBot ? '#00c8ff' : '#ffd700';
    ctx.font = `${tagFontSz}px 'Press Start 2P', monospace`;
    ctx.textAlign = 'center';
    const tagY = drawY - tagH * 0.3;
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(drawX, tagY - tagFontSz - 2, islandW, tagFontSz + 6);
    ctx.fillStyle = isMe ? '#39ff14' : isBot ? '#00c8ff' : '#ffd700';
    ctx.fillText((isBot?'🤖':'🧑')+' '+p, drawX+islandW/2, tagY);

    // HP bar
    const island = gameState.islands[p];
    const hp = island ? Math.max(0, 4 - (island.quadrants?.length||0)) : 4;
    const barW = islandW * 0.7;
    const barH = Math.max(4, 5*seaScale);
    const barX = drawX + (islandW - barW)/2;
    const barY = drawY + islandH + 4*seaScale;
    ctx.fillStyle = '#111';
    ctx.fillRect(barX, barY, barW, barH);
    ctx.fillStyle = hp >= 3 ? '#39ff14' : hp === 2 ? '#ffd700' : '#ff1744';
    ctx.fillRect(barX, barY, barW * (hp/4), barH);
    ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
    ctx.strokeRect(barX, barY, barW, barH);
    ctx.textAlign = 'left';

    // Stats badge
    const sh = island?.shields||0;
    const statsY = barY + barH + Math.max(8, 10*seaScale);
    ctx.font = `${Math.max(4, 6*seaScale)}px 'Press Start 2P', monospace`;
    ctx.fillStyle = '#ccc';
    ctx.textAlign = 'center';
    ctx.fillText(`❤${hp}/4 🛡${sh}`, drawX+islandW/2, statsY);
    ctx.textAlign = 'left';
  });
}

// ── Pan & Zoom ────────────────────────────────────────────────────────────────
function doZoom(factor) {
  const W = seaWorld.clientWidth, H = seaWorld.clientHeight;
  const prevScale = seaScale;
  seaScale = Math.max(0.3, Math.min(4.0, seaScale * factor));
  // Zoom toward center
  const cx = W/2, cy = H/2;
  seaOffX = cx - (cx - seaOffX) * (seaScale / prevScale);
  seaOffY = cy - (cy - seaOffY) * (seaScale / prevScale);
  document.getElementById('zoom-label').textContent = Math.round(seaScale*100)+'%';
  drawSea();
}
function resetView() {
  seaScale = 1.0; seaOffX = 0; seaOffY = 0;
  document.getElementById('zoom-label').textContent = '100%';
  drawSea();
}

// Mouse pan
seaWorld.addEventListener('mousedown', e => {
  if (e.target.classList.contains('zoom-btn')) return;
  isDragging = true;
  dragStartX = e.clientX; dragStartY = e.clientY;
  dragOffX = seaOffX; dragOffY = seaOffY;
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  seaOffX = dragOffX + (e.clientX - dragStartX);
  seaOffY = dragOffY + (e.clientY - dragStartY);
  drawSea();
});
window.addEventListener('mouseup', () => { isDragging = false; });

// Mouse wheel zoom
seaWorld.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.12 : 0.89;
  const rect = seaWorld.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const prevScale = seaScale;
  seaScale = Math.max(0.3, Math.min(4.0, seaScale * factor));
  seaOffX = mx - (mx - seaOffX) * (seaScale/prevScale);
  seaOffY = my - (my - seaOffY) * (seaScale/prevScale);
  document.getElementById('zoom-label').textContent = Math.round(seaScale*100)+'%';
  drawSea();
}, {passive:false});

// Touch pan & pinch zoom
seaWorld.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    isDragging = true;
    dragStartX = e.touches[0].clientX; dragStartY = e.touches[0].clientY;
    dragOffX = seaOffX; dragOffY = seaOffY;
  } else if (e.touches.length === 2) {
    isDragging = false;
    pinchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
}, {passive:true});
seaWorld.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && isDragging) {
    seaOffX = dragOffX + (e.touches[0].clientX - dragStartX);
    seaOffY = dragOffY + (e.touches[0].clientY - dragStartY);
    drawSea();
  } else if (e.touches.length === 2) {
    const d = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    if (pinchDist > 0) {
      const factor = d / pinchDist;
      seaScale = Math.max(0.3, Math.min(4.0, seaScale * factor));
      document.getElementById('zoom-label').textContent = Math.round(seaScale*100)+'%';
    }
    pinchDist = d;
    drawSea();
  }
}, {passive:false});
seaWorld.addEventListener('touchend', () => { isDragging = false; }, {passive:true});

// Resize
window.addEventListener('resize', () => { if (gameState) drawSea(); });

// ═══════════════════════════════════════════════════════════════════════════
// RPS POPUP (auto-closes in 1s)
// ═══════════════════════════════════════════════════════════════════════════
let rpsPopupTimer = null, lastRpsHash = '';
function showRpsPopup(state) {
  const choices = state.rpsChoices||{};
  if (!Object.keys(choices).length) return;
  const hash = JSON.stringify(choices);
  if (hash === lastRpsHash) return;
  lastRpsHash = hash;
  const winners = state.rpsWinners||(state.rpsWinner?[state.rpsWinner]:[]);
  const isTie = winners.length === state.alivePlayers.length;
  const popup = document.getElementById('rps-popup');
  const RPS_E = {rock:'🪨',paper:'📄',scissors:'✂️'};
  document.getElementById('rps-popup-emoji').textContent = isTie ? '🤝' : winners.includes(MY_NAME) ? '🏆' : '💀';
  document.getElementById('rps-popup-title').textContent = isTie ? 'TIE — RETRY!' : winners.includes(MY_NAME) ? 'YOU WIN RPS!' : `${winners.join(' & ')} WIN!`;
  document.getElementById('rps-popup-sub').textContent = isTie ? 'Everyone picks the same' : winners.includes(MY_NAME) ? `You have ${state.pendingActions[MY_NAME]||1} action slot(s)!` : 'Wait for winner to act';
  document.getElementById('rps-popup-choices').innerHTML = state.alivePlayers.map(p=>{
    const isW = winners.includes(p);
    const cls = isTie?'':(isW?'winner':'loser');
    return `<div class="rps-popup-chip ${cls}">${p}: ${RPS_E[choices[p]]||choices[p]||'?'}</div>`;
  }).join('');
  popup.classList.remove('hide'); popup.style.display='flex';
  requestAnimationFrame(()=>requestAnimationFrame(()=>popup.classList.add('show')));
  if (rpsPopupTimer) clearTimeout(rpsPopupTimer);
  rpsPopupTimer = setTimeout(()=>{
    popup.classList.remove('show'); popup.classList.add('hide');
    setTimeout(()=>{ popup.style.display='none'; popup.classList.remove('hide'); },200);
  }, 1000);
}

// ═══════════════════════════════════════════════════════════════════════════
// UI UPDATE
// ═══════════════════════════════════════════════════════════════════════════
function updateUI(state) {
  gameState = state;
  drawSea();

  if (state.rpsChoices && Object.keys(state.rpsChoices).length) showRpsPopup(state);

  // Storage display
  const myIsland = state.islands[MY_NAME];
  if (myIsland) {
    document.getElementById('st-cannons').textContent = myIsland.inventory?.cannons||0;
    document.getElementById('st-slicers').textContent = myIsland.inventory?.slicers||0;
    document.getElementById('st-shields').textContent = myIsland.shields||0;
    document.getElementById('inv-cannon-lbl').textContent = `×${myIsland.inventory?.cannons||0} stored`;
    document.getElementById('inv-slicer-lbl').textContent = `×${myIsland.inventory?.slicers||0} stored`;
  }

  // Hide action sections by default
  document.getElementById('buy-section').style.display = 'none';
  document.getElementById('use-section').style.display = 'none';
  document.getElementById('target-selector').classList.remove('visible');
  document.getElementById('slot-bar').classList.remove('visible');
  ['btn-rock','btn-paper','btn-scissors','btn-buy-cannon','btn-buy-slicer','btn-buy-shield','btn-use-cannon','btn-use-slicer'].forEach(id=>{
    const b=document.getElementById(id); if(b) b.disabled=true;
  });

  const pt = document.getElementById('phase-text');
  const rpsWait = document.getElementById('rps-waiting-row');

  // RPS waiting pips
  if (state.phase==='rps' && state.alivePlayers?.length>0) {
    rpsWait.innerHTML = state.alivePlayers.map(p=>
      `<span class="rps-pip ${state.pendingRPS[p]?'done':''}">${p}${state.pendingRPS[p]?' ✓':' ...'}</span>`
    ).join('');
  } else rpsWait.innerHTML='';

  const myAlive = state.alivePlayers?.includes(MY_NAME);

  if (!myAlive && !state.gameOver) {
    pt.textContent='💀 ELIMINATED — SPECTATING...'; pt.className='text-red'; return;
  }

  if (state.phase==='rps') {
    if (!myAlive) { pt.textContent='👀 WATCHING RPS...'; pt.className='text-red'; }
    else if (state.pendingRPS[MY_NAME]||myRPSSubmitted) { pt.textContent='⏳ WAITING FOR OTHERS...'; pt.className='text-yellow'; }
    else {
      pt.textContent='⚔ YOUR TURN — PICK RPS!'; pt.className='text-green';
      ['btn-rock','btn-paper','btn-scissors'].forEach(id=>{
        const b=document.getElementById(id); if(b) b.disabled=false;
      });
    }
    if (!state.pendingRPS[MY_NAME]) myRPSSubmitted=false;

  } else if (state.phase==='action') {
    const winners = state.rpsWinners||(state.rpsWinner?[state.rpsWinner]:[]);
    const slotsLeft = state.pendingActions[MY_NAME]||0;
    const myTurn = winners.includes(MY_NAME) && slotsLeft>0;

    if (myTurn) {
      pt.textContent=`✨ YOU WON RPS — ${slotsLeft} ACTION SLOT${slotsLeft>1?'S':''} LEFT!`; pt.className='text-cyan';
      // Slot pips
      const slotBar = document.getElementById('slot-bar');
      slotBar.innerHTML = `<span style="font-size:clamp(4px,1.1vw,6px);color:var(--gold);">SLOTS:</span>`;
      const totalSlots = myIsland?.winSlots||slotsLeft;
      for (let i=0;i<totalSlots;i++) {
        const pip=document.createElement('div'); pip.className='slot-pip'+(i>=slotsLeft?' used':'');
        slotBar.appendChild(pip);
      }
      slotBar.classList.add('visible');
      // Show buy & use sections
      document.getElementById('buy-section').style.display='flex';
      document.getElementById('use-section').style.display='flex';
      ['btn-buy-cannon','btn-buy-slicer','btn-buy-shield'].forEach(id=>{
        const b=document.getElementById(id); if(b) b.disabled=false;
      });
      // Use cannons/slicers only if in storage
      const inv = myIsland?.inventory||{cannons:0,slicers:0};
      if (inv.cannons>0) { const b=document.getElementById('btn-use-cannon'); if(b) b.disabled=false; }
      if (inv.slicers>0) { const b=document.getElementById('btn-use-slicer'); if(b) b.disabled=false; }
    } else {
      const stillPending = Object.keys(state.pendingActions);
      pt.textContent=`⏳ ${stillPending.length?stillPending.join(', '):'....'} IS CHOOSING...`; pt.className='text-yellow';
    }
  }

  if (state.moves?.length>0) {
    document.getElementById('move-log').innerHTML = state.moves.map(m=>`<p>> ${m}</p>`).join('');
  }
}

function flash(msg) {
  const el=document.getElementById('flash-msg');
  el.textContent=msg; setTimeout(()=>el.textContent='',3000);
}

function showGameOver(winner, state) {
  if (gameOver) return; gameOver=true; stopPolling();
  document.getElementById('gameover-title').innerHTML =
    winner===MY_NAME ? '<span class="win-text">🏆 YOU WIN!</span>' : `<span class="lose-text">${winner} WINS!</span>`;
  document.getElementById('gameover-scores').innerHTML =
    state.players.sort((a,b)=>state.scores[b]-state.scores[a])
      .map((p,i)=>`<div>${i+1}. ${p}: ${state.scores[p]} pts${p===winner?' 👑':''}</div>`).join('');
  document.getElementById('gameover-overlay').classList.add('visible');
}

// ═══════════════════════════════════════════════════════════════════════════
// GAME ACTIONS
// ═══════════════════════════════════════════════════════════════════════════
async function sendRPS(choice) {
  myRPSSubmitted=true;
  ['btn-rock','btn-paper','btn-scissors'].forEach(id=>{const b=document.getElementById(id);if(b)b.disabled=true;});
  document.getElementById('phase-text').textContent='⏳ WAITING FOR OTHERS...';
  document.getElementById('phase-text').className='text-yellow';
  const data=await post('rps_choice',{gameId:GAME_ID,username:MY_NAME,choice});
  if (data.error){flash(data.error);myRPSSubmitted=false;return;}
  if (data.state) updateUI(data.state);
}

function doAction(act, useInv) {
  if (act==='cannon'||act==='slicer') { pickTarget(act); return; }
  // No target needed
  sendAction(act, null, useInv);
}

function pickTarget(act) {
  if (!gameState) return;
  pendingActionType = act;
  const opps = gameState.alivePlayers.filter(p=>p!==MY_NAME);
  if (opps.length===1) { sendAction(act, opps[0], true); return; }
  document.getElementById('target-selector').classList.add('visible');
  document.getElementById('target-label').textContent = act==='cannon' ? '🎯 CANNON TARGET:' : '⚔ SLICER TARGET:';
  document.getElementById('target-btn-row').innerHTML =
    opps.map(opp=>`<button class="target-btn" onclick="sendAction('${act}','${opp}',true)">${opp}</button>`).join('');
}

function cancelTarget() {
  pendingActionType=null;
  document.getElementById('target-selector').classList.remove('visible');
}

async function sendAction(act, target, useInv) {
  document.getElementById('target-selector').classList.remove('visible');
  ['btn-buy-cannon','btn-buy-slicer','btn-buy-shield','btn-use-cannon','btn-use-slicer'].forEach(id=>{
    const b=document.getElementById(id); if(b) b.disabled=true;
  });
  const payload={gameId:GAME_ID,username:MY_NAME,action:act};
  if (target) payload.targetPlayer=target;
  if (useInv) payload.useInventory=true;
  const data=await post('action_choice',payload);
  if (data.error){flash(data.error);if(gameState)updateUI(gameState);return;}
  if (data.state) updateUI(data.state);
  if (data.gameOver) showGameOver(data.winner,data.state);
}

// ═══════════════════════════════════════════════════════════════════════════
// POLLING (resilient)
// ═══════════════════════════════════════════════════════════════════════════
function stopPolling(){if(pollInterval){clearInterval(pollInterval);pollInterval=null;}}
let lastHash='';

async function poll() {
  if (isPollRunning) return;
  isPollRunning=true;
  try {
    const data=await getState();
    if (data.error){
      failCount++;
      if (failCount>=4){ const b=document.getElementById('conn-text'); b.innerHTML='<span class="spinner"></span>RECONNECTING...'; b.parentElement.className=''; }
      if (failCount>=120){ const b=document.getElementById('conn-text'); b.textContent='⚠ WEAK CONNECTION...'; b.parentElement.className='err'; }
      return;
    }
    failCount=0;
    const state=data.state;
    const hash=state.phase+(state.moves?.length||0)+JSON.stringify(state.pendingRPS)+JSON.stringify(state.pendingActions)+JSON.stringify(state.rpsChoices);
    if (hash!==lastHash||!gameState){lastHash=hash;updateUI(state);}
    if (state.gameOver&&!gameOver) showGameOver(state.winner,state);
    const b=document.getElementById('conn-text'); b.textContent='⚡ LIVE'; b.parentElement.className='ok';
  } catch(e){
    failCount++;
    if (failCount>=3){ const b=document.getElementById('conn-text'); b.innerHTML='<span class="spinner"></span>RECONNECTING...'; b.parentElement.className=''; }
    if (failCount>=200){ stopPolling(); setTimeout(()=>{gameOver=false;failCount=0;init(1);},5000); }
  } finally { isPollRunning=false; }
}

async function init(attempt) {
  attempt=attempt||1; const MAX=8;
  const bar=document.getElementById('conn-text');
  bar.innerHTML=`<span class="spinner"></span>CONNECTING... (${attempt}/${MAX})`;
  try {
    const data=await getState();
    if (data.error){
      if (attempt<MAX){bar.innerHTML=`<span class="spinner"></span>RETRYING... (${attempt}/${MAX})`;setTimeout(()=>init(attempt+1),1200*attempt);return;}
      bar.textContent='❌ GAME NOT FOUND'; bar.parentElement.className='err'; return;
    }
    bar.textContent='⚡ LIVE'; bar.parentElement.className='ok';
    updateUI(data.state);
    if (data.state.gameOver){showGameOver(data.state.winner,data.state);return;}
    pollInterval=setInterval(poll,1800);
  } catch(e){
    if (attempt<MAX){bar.innerHTML=`<span class="spinner"></span>RETRYING... (${attempt}/${MAX})`;setTimeout(()=>init(attempt+1),1500*attempt);return;}
    bar.textContent='❌ FAILED TO LOAD'; bar.parentElement.className='err';
  }
}
init(1);
</script>
