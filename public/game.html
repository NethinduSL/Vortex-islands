<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Vortex Islands — Battle</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ocean:#0a2a4a;--ocean2:#0d3d6b;--sand:#e8c97a;
  --grass:#2d7a3a;--foam:#b8e0f7;
  --white:#f0f8ff;--gold:#f5c842;--red:#e63946;--green:#52b788;
  --cyan:#4fc3f7;--orange:#ff9a3c;
  --panel:rgba(6,18,32,0.95);--border:rgba(255,255,255,0.1);
}
html,body{min-height:100%;width:100%;overflow-x:hidden}
body{
  background:linear-gradient(160deg,#051525 0%,#0a2a4a 50%,#0d3d6b 100%);
  font-family:'Nunito',sans-serif;color:var(--white);
  min-height:100vh;display:flex;flex-direction:column;
}

/* ── TOP BAR ── */
#conn-bar{
  background:rgba(4,12,24,0.95);border-bottom:1px solid var(--border);
  padding:10px 16px;font-size:11px;font-weight:800;letter-spacing:2px;
  color:rgba(255,255,255,0.4);display:flex;align-items:center;
  justify-content:space-between;text-transform:uppercase;flex-shrink:0;
  backdrop-filter:blur(8px);
}
#conn-bar.ok #conn-text{color:var(--green);text-shadow:0 0 8px rgba(82,183,136,0.4);}
#conn-bar.err #conn-text{color:var(--red);}
.game-brand{font-family:'Cinzel Decorative',serif;font-size:13px;color:var(--gold);letter-spacing:1px;}
#settings-btn{
  font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;
  background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.5);
  border:1px solid rgba(255,255,255,0.1);padding:5px 12px;border-radius:8px;
  cursor:pointer;letter-spacing:1px;transition:all .15s;
}
#settings-btn:hover{background:rgba(255,255,255,0.12);color:var(--white);}

.spinner{display:inline-block;width:10px;height:10px;
  border:2px solid rgba(245,200,66,.2);border-top-color:var(--gold);
  border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── MAIN LAYOUT ── */
#main{
  display:flex;flex-direction:column;align-items:center;
  padding:14px 12px 24px;gap:14px;flex:1;
}

/* ── ISLANDS ROW ── */
#islands-row{display:flex;gap:clamp(8px,2vw,16px);flex-wrap:wrap;justify-content:center;width:100%;}
.island-panel{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  transition:opacity .4s,filter .4s;
}
.island-panel.eliminated{opacity:.2;filter:grayscale(1) brightness(.4);}
.island-name-tag{
  font-size:clamp(9px,2vw,11px);font-weight:800;
  background:rgba(4,12,24,0.8);border:1px solid rgba(255,255,255,0.15);
  border-radius:20px;padding:4px 12px;color:rgba(255,255,255,0.8);
  white-space:nowrap;backdrop-filter:blur(4px);letter-spacing:1px;
}
.island-name-tag.my-tag{border-color:rgba(82,183,136,0.5);color:var(--green);}
.island-name-tag.bot-tag{border-color:rgba(79,195,247,0.4);color:var(--cyan);}
.island-canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;border-radius:4px;}

.island-stats{
  font-size:clamp(9px,1.8vw,11px);font-weight:700;
  color:rgba(255,255,255,0.7);background:rgba(0,0,0,.6);
  border-radius:6px;padding:4px 10px;text-align:center;
  line-height:2;white-space:nowrap;
}
.elim-badge{font-size:10px;background:var(--red);color:#fff;border-radius:20px;padding:2px 8px;font-weight:800;}
.inv-badge{
  font-size:clamp(9px,1.8vw,10px);font-weight:700;
  background:rgba(245,200,66,0.1);border:1px solid rgba(245,200,66,0.25);
  border-radius:6px;padding:3px 10px;color:var(--gold);letter-spacing:1px;
}

/* ── CONTROLS ── */
#controls{
  width:100%;max-width:min(860px,calc(100vw - 16px));
  background:var(--panel);
  border:1px solid var(--border);border-radius:16px;
  box-shadow:0 8px 32px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.06);
  padding:clamp(12px,2.5vw,18px);
  display:flex;flex-direction:column;align-items:center;gap:12px;
  backdrop-filter:blur(12px);
}

/* ── PHASE TEXT ── */
#phase-text{font-size:clamp(12px,2.5vw,15px);font-weight:900;text-align:center;
  letter-spacing:1px;min-height:22px;}
.text-green{color:var(--green);text-shadow:0 0 12px rgba(82,183,136,0.4);}
.text-yellow{color:var(--gold);}
.text-cyan{color:var(--cyan);}
.text-red{color:var(--red);}

/* ── TASKS COUNTER ── */
#tasks-counter{
  font-size:12px;font-weight:800;letter-spacing:1px;
  color:var(--orange);background:rgba(255,154,60,0.12);
  border:1px solid rgba(255,154,60,0.3);border-radius:20px;
  padding:4px 16px;display:none;
}
#tasks-counter.visible{display:block;}

/* ── RPS WAITING ── */
#rps-waiting-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;font-size:11px;font-weight:700;}
.rps-pip{padding:4px 10px;border:1px solid rgba(255,255,255,0.1);border-radius:20px;
  color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.03);}
.rps-pip.done{border-color:rgba(82,183,136,0.5);color:var(--green);background:rgba(82,183,136,0.1);}

#flash-msg{font-size:11px;font-weight:800;color:var(--red);min-height:16px;
  text-align:center;letter-spacing:1px;}

/* ── SECTION LABELS ── */
.section-label{
  font-size:10px;font-weight:800;letter-spacing:3px;text-transform:uppercase;
  color:rgba(255,255,255,0.3);width:100%;text-align:center;
  display:flex;align-items:center;gap:8px;justify-content:center;
}
.section-label::before,.section-label::after{
  content:'';flex:1;max-width:60px;height:1px;
  background:rgba(255,255,255,0.08);
}

/* ── RPS BUTTONS ── */
.btn-row{display:flex;gap:clamp(6px,1.5vw,10px);flex-wrap:wrap;justify-content:center;}

button.rps-btn{
  font-family:'Nunito',sans-serif;font-weight:900;cursor:pointer;border:none;
  border-radius:12px;text-transform:uppercase;letter-spacing:1px;
  display:flex;flex-direction:column;align-items:center;overflow:hidden;
  transition:transform .1s,box-shadow .1s,filter .1s;
  min-width:clamp(72px,16vw,96px);
  background:rgba(139,57,57,0.3);border:1px solid rgba(180,60,60,0.4);
}
button.rps-btn:hover:not(:disabled){filter:brightness(1.2);transform:translateY(-2px);}
button.rps-btn:active:not(:disabled){transform:translateY(1px);}
button.rps-btn:disabled{opacity:.25;cursor:not-allowed;}
.rps-btn .btn-icon{font-size:clamp(22px,5vw,32px);padding:clamp(8px,2vw,12px) 8px 4px;}
.rps-btn .btn-label{
  font-size:clamp(9px,2vw,11px);padding:clamp(4px,1vw,6px) 6px clamp(6px,1.5vw,8px);
  width:100%;text-align:center;background:rgba(0,0,0,0.25);color:#fff;
}

/* ── ACTION / INVENTORY / BUY BUTTONS ── */
button.act-btn{
  font-family:'Nunito',sans-serif;font-weight:900;cursor:pointer;border:none;
  border-radius:12px;text-transform:uppercase;letter-spacing:1px;
  display:flex;flex-direction:column;align-items:center;overflow:hidden;
  transition:transform .1s,box-shadow .1s,filter .1s;
  min-width:clamp(80px,17vw,108px);
}
button.act-btn:hover:not(:disabled){filter:brightness(1.2);transform:translateY(-2px);}
button.act-btn:active:not(:disabled){transform:translateY(1px);}
button.act-btn:disabled{opacity:.25;cursor:not-allowed;}
.act-btn .btn-icon{font-size:clamp(22px,5vw,30px);padding:clamp(8px,1.8vw,11px) 8px 4px;}
.act-btn .btn-label{
  font-size:clamp(9px,1.8vw,10px);padding:clamp(3px,.8vw,5px) 4px clamp(5px,1.2vw,7px);
  width:100%;text-align:center;line-height:1.5;
}
.act-btn .btn-label small{display:block;font-size:clamp(7px,1.4vw,8px);opacity:.55;margin-top:2px;}

/* Color themes for act buttons */
.btn-use-cannon{background:rgba(30,40,130,0.5);border:1px solid rgba(60,80,220,0.4);}
.btn-use-cannon .btn-label{background:rgba(30,50,160,0.4);}
.btn-use-slicer{background:rgba(40,100,60,0.5);border:1px solid rgba(60,160,90,0.4);}
.btn-use-slicer .btn-label{background:rgba(30,100,50,0.4);}
.btn-use-shield{background:rgba(0,80,160,0.4);border:1px solid rgba(0,120,220,0.4);}
.btn-use-shield .btn-label{background:rgba(0,70,140,0.4);}
.btn-buy-cannon{background:rgba(80,50,10,0.5);border:1px solid rgba(200,140,30,0.35);}
.btn-buy-cannon .btn-label{background:rgba(80,60,0,0.4);color:var(--gold);}
.btn-buy-slicer{background:rgba(60,20,80,0.5);border:1px solid rgba(150,60,200,0.35);}
.btn-buy-slicer .btn-label{background:rgba(50,10,80,0.4);color:#c792ea;}

/* ── TARGET SELECTOR ── */
#target-selector{display:none;flex-direction:column;align-items:center;gap:8px;width:100%;}
#target-selector.visible{display:flex;}
#target-label{font-size:12px;font-weight:800;color:var(--gold);letter-spacing:1px;}
#target-btn-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.target-btn{
  font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;
  background:rgba(245,200,66,0.1);color:var(--gold);
  border:1px solid rgba(245,200,66,0.35);border-radius:10px;
  padding:9px 18px;letter-spacing:1px;transition:all .15s;
}
.target-btn:hover{background:rgba(245,200,66,0.2);}

/* ── LOG ── */
#log-section{
  width:100%;max-width:min(860px,calc(100vw - 16px));
  background:rgba(4,12,24,0.88);border:1px solid rgba(255,255,255,0.07);
  border-radius:12px;padding:14px;display:none;
}
#log-section.visible{display:block;}
#log-title{font-size:11px;font-weight:800;color:var(--gold);margin-bottom:8px;
  letter-spacing:2px;text-transform:uppercase;}
#move-log{max-height:clamp(80px,14vh,110px);overflow-y:auto;
  font-size:clamp(10px,2vw,11px);font-weight:600;color:rgba(255,255,255,0.4);
  line-height:2.2;scrollbar-width:thin;scrollbar-color:#333 transparent;}
#move-log p{border-bottom:1px solid rgba(255,255,255,0.04);padding:1px 0;}

/* ── GAME OVER ── */
#gameover-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.97);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:clamp(14px,3vw,24px);z-index:100;padding:20px;
  backdrop-filter:blur(12px);
}
#gameover-overlay.visible{display:flex;}
#gameover-title{font-size:clamp(20px,6vw,36px);text-align:center;font-family:'Cinzel Decorative',serif;}
.win-text{color:var(--gold);text-shadow:0 0 40px rgba(245,200,66,0.6),4px 4px 0 rgba(0,0,0,0.5);
  animation:goldenPulse 1.5s ease-in-out infinite alternate;}
@keyframes goldenPulse{to{text-shadow:0 0 60px rgba(245,200,66,0.8),0 0 100px rgba(245,200,66,0.3),4px 4px 0 rgba(0,0,0,0.5);}}
.lose-text{color:rgba(255,255,255,0.5);}
#gameover-scores{font-size:clamp(12px,2.5vw,15px);font-weight:700;color:rgba(255,255,255,0.7);
  text-align:center;line-height:3;}
.ui-btn{
  font-family:'Nunito',sans-serif;font-size:clamp(12px,2.5vw,14px);font-weight:800;
  cursor:pointer;border:none;padding:clamp(13px,2.5vw,16px) clamp(24px,5vw,32px);
  border-radius:12px;text-transform:uppercase;letter-spacing:1px;transition:all .15s;
}
.btn-gold-ui{background:linear-gradient(135deg,var(--gold),#d4a843);color:#0a2a4a;
  box-shadow:0 4px 20px rgba(245,200,66,0.3);}
.btn-gold-ui:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(245,200,66,0.45);}

/* ── SETTINGS ── */
#settings-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.93);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;z-index:200;padding:20px;backdrop-filter:blur(12px);
}
#settings-overlay.visible{display:flex;}
.settings-card{
  background:rgba(6,18,32,0.98);border:1px solid rgba(255,255,255,0.12);
  border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.5);
  padding:24px;width:100%;max-width:min(400px,calc(100vw - 32px));
}
.settings-title{font-family:'Cinzel Decorative',serif;font-size:clamp(13px,3vw,16px);
  color:var(--gold);margin-bottom:20px;text-align:center;}
.settings-row{display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;font-size:13px;font-weight:700;color:rgba(255,255,255,0.7);}
.toggle-btn{
  font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;
  background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.4);
  border:1px solid rgba(255,255,255,0.12);border-radius:8px;
  padding:6px 14px;cursor:pointer;letter-spacing:1px;transition:all .15s;
}
.toggle-btn.on{background:rgba(82,183,136,0.15);color:var(--green);border-color:rgba(82,183,136,0.35);}
hr.s-divider{border:none;border-top:1px solid rgba(255,255,255,0.08);margin:14px 0;}
.close-settings{
  font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;
  background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.4);
  border:1px solid rgba(255,255,255,0.1);border-radius:10px;
  padding:12px;width:100%;cursor:pointer;letter-spacing:1px;
  text-transform:uppercase;transition:all .15s;
}
.close-settings:hover{background:rgba(255,255,255,0.1);}
</style>
</head>
<body>

<div id="conn-bar">
  <span id="conn-text"><span class="spinner"></span>Loading...</span>
  <span class="game-brand">🏝 Vortex Islands</span>
  <button id="settings-btn" onclick="openSettings()"><i class="fa-solid fa-gear"></i> Settings</button>
</div>

<div id="main">
  <div id="islands-row"></div>

  <div id="controls">
    <div id="phase-text" class="text-yellow">Waiting...</div>
    <div id="tasks-counter"></div>
    <div id="rps-waiting-row" class="rps-waiting-row"></div>
    <div id="flash-msg"></div>

    <!-- RPS -->
    <div class="section-label" id="rps-label">Rock · Paper · Scissors</div>
    <div class="btn-row" id="rps-btns">
      <button class="rps-btn" id="btn-rock" disabled onclick="sendRPS('rock')">
        <span class="btn-icon">🪨</span>
        <span class="btn-label">Rock</span>
      </button>
      <button class="rps-btn" id="btn-paper" disabled onclick="sendRPS('paper')">
        <span class="btn-icon">📄</span>
        <span class="btn-label">Paper</span>
      </button>
      <button class="rps-btn" id="btn-scissors" disabled onclick="sendRPS('scissors')">
        <span class="btn-icon">✂️</span>
        <span class="btn-label">Scissors</span>
      </button>
    </div>

    <!-- Target selector -->
    <div id="target-selector">
      <div id="target-label"><i class="fa-solid fa-crosshairs"></i> Select Target:</div>
      <div id="target-btn-row"></div>
    </div>

    <!-- USE from inventory -->
    <div class="section-label" id="use-label" style="display:none;">
      <i class="fa-solid fa-bolt"></i> Use from Inventory
    </div>
    <div class="btn-row" id="use-btns" style="display:none;">
      <button class="act-btn btn-use-cannon" id="btn-use-cannon" disabled onclick="pickAction('cannon',true)">
        <span class="btn-icon">💣</span>
        <span class="btn-label">Use Cannon<small id="inv-cannon-count">×0 stored</small></span>
      </button>
      <button class="act-btn btn-use-slicer" id="btn-use-slicer" disabled onclick="pickAction('slicer',true)">
        <span class="btn-icon">⚔️</span>
        <span class="btn-label">Use Slicer<small id="inv-slicer-count">×0 stored</small></span>
      </button>
      <button class="act-btn btn-use-shield" id="btn-use-shield" disabled onclick="sendAction('shield',null,false)">
        <span class="btn-icon">🛡️</span>
        <span class="btn-label">Raise Shield<small>Blocks slicers</small></span>
      </button>
    </div>

    <!-- BUY new items -->
    <div class="section-label" id="buy-label" style="display:none;">
      <i class="fa-solid fa-cart-shopping"></i> Buy & Store for Next Win
    </div>
    <div class="btn-row" id="buy-btns" style="display:none;">
      <button class="act-btn btn-buy-cannon" id="btn-buy-cannon" disabled onclick="sendAction('buy_cannon',null,false)">
        <span class="btn-icon">💣</span>
        <span class="btn-label">Buy Cannon<small>Store for next win</small></span>
      </button>
      <button class="act-btn btn-buy-slicer" id="btn-buy-slicer" disabled onclick="sendAction('buy_slicer',null,false)">
        <span class="btn-icon">⚔️</span>
        <span class="btn-label">Buy Slicer<small>Store for next win</small></span>
      </button>
    </div>
  </div>

  <div id="log-section">
    <div id="log-title"><i class="fa-solid fa-scroll"></i> Battle Log</div>
    <div id="move-log"><p>▓ Game starting...</p></div>
  </div>
</div>

<div id="gameover-overlay">
  <div id="gameover-title">...</div>
  <div id="gameover-scores"></div>
  <button class="ui-btn btn-gold-ui" onclick="location.href='/'">
    <i class="fa-solid fa-rotate-left"></i> Play Again
  </button>
</div>

<div id="settings-overlay">
  <div class="settings-card">
    <div class="settings-title"><i class="fa-solid fa-gear"></i> Settings</div>
    <div class="settings-row">
      <span><i class="fa-solid fa-scroll" style="margin-right:8px;"></i>Battle Log</span>
      <button class="toggle-btn" id="toggle-log-btn" onclick="toggleLog()">Off</button>
    </div>
    <hr class="s-divider"/>
    <button class="close-settings" onclick="closeSettings()">
      <i class="fa-solid fa-xmark"></i> Close
    </button>
  </div>
</div>

<script>
// ══ Cell colours ══════════════════════════════════════
const CELL_COLORS={
  sea:'#1565a8',grass:'#4caf50',dark_grass:'#2e7d32',
  stone:'#78909c',dirt:'#8d6e63',sand:'#d4b06a'
};
const RPS_EMOJI={rock:'🪨',paper:'📄',scissors:'✂️'};

// ══ Island sizing ══════════════════════════════════════
let _playerCount=2;
function getIslandSize(pc){
  pc=pc||_playerCount||2;
  const vw=window.innerWidth;
  const tiers={
    2:[[1100,480,240,15,15],[800,400,200,12,12],[600,336,168,10,10],[420,272,136,8,8],[0,208,104,6,6]],
    3:[[1100,368,184,11,11],[800,304,152,9,9],[600,256,128,8,8],[420,208,104,6,6],[0,168,84,5,5]],
    4:[[1100,288,144,9,9],[800,240,120,7,7],[600,208,104,6,6],[420,176,88,5,5],[0,144,72,4,4]],
    5:[[1100,240,120,7,7],[800,208,104,6,6],[600,176,88,5,5],[420,144,72,4,4],[0,120,60,3,3]],
    6:[[1100,208,104,6,6],[800,176,88,5,5],[600,152,76,4,4],[420,128,64,4,4],[0,112,56,3,3]],
  };
  const tier=tiers[Math.min(6,Math.max(2,pc))];
  for(const[minVw,w,h,cw,ch]of tier){if(vw>=minVw)return{w,h,cw,ch};}
  return{w:168,h:84,cw:5,ch:5};
}
const GW=32,GH=16;

// ══ Render island canvas ══════════════════════════════
function renderIslandCanvas(canvas,grid,shields,rpsChoice,rpsState){
  const sz=getIslandSize(_playerCount);
  canvas.width=sz.w;canvas.height=sz.h;
  const CW=sz.w/GW,CH=sz.h/GH;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,sz.w,sz.h);

  // Ocean base
  const seaGrad=ctx.createLinearGradient(0,0,0,sz.h);
  seaGrad.addColorStop(0,'#1565a8');seaGrad.addColorStop(1,'#0d47a1');
  ctx.fillStyle=seaGrad;ctx.fillRect(0,0,sz.w,sz.h);

  // Land cells
  grid.forEach((row,r)=>row.forEach((cell,c)=>{
    if(cell==='sea')return;
    ctx.fillStyle=CELL_COLORS[cell]||CELL_COLORS.sea;
    ctx.fillRect(c*CW,r*CH,CW,CH);
    ctx.fillStyle='rgba(255,255,255,0.1)';
    ctx.fillRect(c*CW,r*CH,CW*.4,CH*.4);
    ctx.fillStyle='rgba(0,0,0,0.12)';
    ctx.fillRect(c*CW+CW*.6,r*CH+CH*.6,CW*.4,CH*.4);
  }));

  // Wave lines
  grid.forEach((row,r)=>row.forEach((cell,c)=>{
    if(cell==='sea'){ctx.fillStyle='rgba(255,255,255,0.04)';ctx.fillRect(c*CW,r*CH+CH*.4,CW,1);}
  }));

  // Quadrant dividers
  ctx.strokeStyle='rgba(255,255,255,0.18)';ctx.lineWidth=1;ctx.setLineDash([3,4]);
  ctx.beginPath();
  ctx.moveTo(sz.w/2,0);ctx.lineTo(sz.w/2,sz.h);
  ctx.moveTo(0,sz.h/2);ctx.lineTo(sz.w,sz.h/2);
  ctx.stroke();ctx.setLineDash([]);

  // Quadrant numbers
  ctx.fillStyle='rgba(255,255,255,0.15)';
  const lsz=Math.max(6,Math.floor(CW*.65));
  ctx.font=`bold ${lsz}px monospace`;
  ctx.fillText('1',3,lsz+2);ctx.fillText('2',sz.w/2+3,lsz+2);
  ctx.fillText('3',3,sz.h/2+lsz+2);ctx.fillText('4',sz.w/2+3,sz.h/2+lsz+2);

  // Shield rings
  if(shields>0){
    const shCols=['rgba(0,168,255,0.9)','rgba(0,230,255,0.7)','rgba(180,245,255,0.5)'];
    for(let s=0;s<shields;s++){
      const inset=(shields-s)*Math.max(3,Math.floor(CW*.35));
      ctx.strokeStyle=shCols[s];ctx.lineWidth=Math.max(1.5,CW*.2);
      ctx.shadowColor=shCols[s];ctx.shadowBlur=10;
      ctx.strokeRect(inset+1,inset+1,sz.w-inset*2-2,sz.h-inset*2-2);
    }
    ctx.shadowBlur=0;
  }

  // RPS overlay
  if(rpsChoice){
    const emoji=RPS_EMOJI[rpsChoice]||rpsChoice;
    const fsz=Math.max(16,Math.floor(sz.w*.26));
    ctx.fillStyle='rgba(0,0,0,0.42)';ctx.fillRect(0,0,sz.w,sz.h);
    ctx.font=`${fsz}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(emoji,sz.w/2,sz.h/2);
    ctx.textAlign='left';ctx.textBaseline='alphabetic';
    if(rpsState==='winner'){
      ctx.strokeStyle='#f5c842';ctx.lineWidth=3;ctx.shadowColor='#f5c842';ctx.shadowBlur=16;
      ctx.strokeRect(2,2,sz.w-4,sz.h-4);ctx.shadowBlur=0;
      ctx.fillStyle='#f5c842';ctx.font=`bold ${Math.max(7,sz.w*.075)}px monospace`;
      ctx.textAlign='center';ctx.fillText('WIN',sz.w/2,sz.h-Math.max(6,sz.h*.1));ctx.textAlign='left';
    } else if(rpsState==='loser'){
      ctx.strokeStyle='#e63946';ctx.lineWidth=2;ctx.shadowColor='#e63946';ctx.shadowBlur=8;
      ctx.strokeRect(2,2,sz.w-4,sz.h-4);ctx.shadowBlur=0;
      ctx.strokeStyle='rgba(230,57,70,0.5)';ctx.lineWidth=Math.max(1.5,sz.w/45);
      ctx.beginPath();ctx.moveTo(sz.w*.1,sz.h*.1);ctx.lineTo(sz.w*.9,sz.h*.9);
      ctx.moveTo(sz.w*.9,sz.h*.1);ctx.lineTo(sz.w*.1,sz.h*.9);ctx.stroke();
    }
  }
}

// ══ Setup ═════════════════════════════════════════════
const params=new URLSearchParams(location.search);
const GAME_ID=params.get('gameId'),MY_NAME=params.get('username');
if(!GAME_ID||!MY_NAME)location.href='/';
const API='/api/game';
let gameState=null,myRPSSubmitted=false,pendingAction=null,pendingFromInv=false;
let pollInterval=null,gameOver=false,failCount=0,logVisible=false;
let myTasksLeft=0;

async function fetchT(url,opts,ms=8000){
  const ctrl=new AbortController();const tid=setTimeout(()=>ctrl.abort(),ms);
  try{const r=await fetch(url,{...opts,signal:ctrl.signal});clearTimeout(tid);return r;}
  catch(e){clearTimeout(tid);throw e;}
}
async function post(action,body){
  const r=await fetchT(`${API}?action=${action}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  return r.json();
}
async function getState(){return(await fetchT(`${API}?action=game&gameId=${GAME_ID}`)).json();}

// ══ Settings ══════════════════════════════════════════
function openSettings(){document.getElementById('settings-overlay').classList.add('visible');}
function closeSettings(){document.getElementById('settings-overlay').classList.remove('visible');}
function toggleLog(){
  logVisible=!logVisible;
  document.getElementById('log-section').classList.toggle('visible',logVisible);
  const btn=document.getElementById('toggle-log-btn');
  btn.classList.toggle('on',logVisible);btn.textContent=logVisible?'On':'Off';
}

// ══ Render islands ═════════════════════════════════════
function renderIslands(state){
  _playerCount=(state.alivePlayers||state.players||[]).length||2;
  const row=document.getElementById('islands-row');
  const bots=state.bots||[];
  const rpsChoices=state.rpsChoices||{};
  const rpsWinners=state.rpsWinners||(state.rpsWinner?[state.rpsWinner]:[]);
  const showRPS=Object.keys(rpsChoices).length>0;

  state.players.forEach(u=>{
    const isAlive=state.islands[u]&&state.islands[u].alive!==false;
    const isMe=u===MY_NAME;const isBot=bots.includes(u);
    const inv=state.islands[u]?.inventory||{cannons:0,slicers:0};

    let panel=document.getElementById('panel-'+u);
    if(!panel){
      panel=document.createElement('div');
      panel.className='island-panel';panel.id='panel-'+u;
      const sz=getIslandSize();
      panel.innerHTML=`
        <div class="island-name-tag" id="nametag-${u}">${isBot?'🤖':'🧑'} ${u}</div>
        <canvas class="island-canvas" id="canvas-${u}" width="${sz.w}" height="${sz.h}"></canvas>
        <div class="island-stats" id="stats-${u}">...</div>
        <div class="inv-badge" id="inv-${u}" style="display:none;">📦 💣×0 ⚔×0</div>`;
      row.appendChild(panel);
    }
    if(!isAlive)panel.classList.add('eliminated');
    else panel.classList.remove('eliminated');

    const tag=document.getElementById('nametag-'+u);
    if(tag)tag.className=isBot?'island-name-tag bot-tag':'island-name-tag'+(isMe?' my-tag':'');

    const canvas=document.getElementById('canvas-'+u);
    if(canvas&&state.grids[u]){
      const choice=rpsChoices[u]||null;
      let rpsState=null;
      if(showRPS&&choice)rpsState=rpsWinners.includes(u)?'winner':'loser';
      renderIslandCanvas(canvas,state.grids[u],state.islands[u]?.shields||0,choice,rpsState);
    }

    const statsEl=document.getElementById('stats-'+u);
    if(statsEl&&state.islands[u]){
      if(!isAlive)statsEl.innerHTML='<span class="elim-badge">💀 Eliminated</span>';
      else{
        const parts=4-(state.islands[u].quadrants?.length||0);
        const sh=state.islands[u].shields||0;
        statsEl.innerHTML=`❤ ${parts}/4 &nbsp;🛡 ${sh}/3 &nbsp;🏆 ${state.scores[u]}`;
      }
    }
    const invEl=document.getElementById('inv-'+u);
    if(invEl){
      invEl.style.display=isMe?'block':'none';
      invEl.textContent=`📦 💣×${inv.cannons} ⚔×${inv.slicers}`;
    }
  });
}

// ══ Update UI ══════════════════════════════════════════
function updateUI(state){
  gameState=state;
  renderIslands(state);

  // Reset all buttons
  const allBtns=['btn-rock','btn-paper','btn-scissors','btn-use-cannon','btn-use-slicer','btn-use-shield','btn-buy-cannon','btn-buy-slicer'];
  allBtns.forEach(id=>{const b=document.getElementById(id);if(b)b.disabled=true;});
  document.getElementById('target-selector').classList.remove('visible');
  document.getElementById('use-label').style.display='none';
  document.getElementById('use-btns').style.display='none';
  document.getElementById('buy-label').style.display='none';
  document.getElementById('buy-btns').style.display='none';
  document.getElementById('tasks-counter').classList.remove('visible');
  pendingAction=null;

  const pt=document.getElementById('phase-text');
  const rpsWait=document.getElementById('rps-waiting-row');

  if(state.phase==='rps'&&state.alivePlayers?.length>0){
    rpsWait.innerHTML=state.alivePlayers
      .map(p=>`<span class="rps-pip ${state.pendingRPS[p]?'done':''}">${p}${state.pendingRPS[p]?' ✓':' ...'}</span>`)
      .join('');
  } else {rpsWait.innerHTML='';}

  const myAlive=state.alivePlayers?.includes(MY_NAME);
  if(!myAlive&&!state.gameOver){pt.innerHTML='<i class="fa-solid fa-skull"></i> Eliminated — Spectating';pt.className='text-red';return;}

  if(state.phase==='rps'){
    if(state.pendingRPS[MY_NAME]||myRPSSubmitted){
      pt.innerHTML='<i class="fa-solid fa-hourglass-half"></i> Waiting for others...';pt.className='text-yellow';
    } else {
      pt.innerHTML='<i class="fa-solid fa-hand-rock"></i> Your Turn — Pick RPS!';pt.className='text-green';
      ['btn-rock','btn-paper','btn-scissors'].forEach(id=>{const b=document.getElementById(id);if(b)b.disabled=false;});
    }
    if(!state.pendingRPS[MY_NAME])myRPSSubmitted=false;
  } else if(state.phase==='action'){
    const pendingTasks=state.pendingTasks||{};
    const myTasks=pendingTasks[MY_NAME]||0;
    myTasksLeft=myTasks;

    if(myTasks>0){
      pt.innerHTML=`<i class="fa-solid fa-star"></i> RPS Win! Choose your action`;pt.className='text-cyan';
      // Tasks counter
      const tc=document.getElementById('tasks-counter');
      tc.innerHTML=`<i class="fa-solid fa-layer-group"></i> ${myTasks} task${myTasks>1?'s':''} remaining`;
      tc.classList.add('visible');

      const myInv=state.islands[MY_NAME]?.inventory||{cannons:0,slicers:0};
      const myShields=state.islands[MY_NAME]?.shields||0;

      // Show USE section if inventory has items or can raise shield
      const hasInventory=myInv.cannons>0||myInv.slicers>0||myShields<3;
      if(hasInventory){
        document.getElementById('use-label').style.display='flex';
        document.getElementById('use-btns').style.display='flex';
        document.getElementById('inv-cannon-count').textContent=`×${myInv.cannons} stored`;
        document.getElementById('inv-slicer-count').textContent=`×${myInv.slicers} stored`;
        if(myInv.cannons>0){const b=document.getElementById('btn-use-cannon');if(b)b.disabled=false;}
        if(myInv.slicers>0){const b=document.getElementById('btn-use-slicer');if(b)b.disabled=false;}
        if(myShields<3){const b=document.getElementById('btn-use-shield');if(b)b.disabled=false;}
      }

      // Always show BUY section
      document.getElementById('buy-label').style.display='flex';
      document.getElementById('buy-btns').style.display='flex';
      ['btn-buy-cannon','btn-buy-slicer'].forEach(id=>{const b=document.getElementById(id);if(b)b.disabled=false;});

    } else {
      // Others are still acting
      const stillPending=Object.entries(pendingTasks).filter(([,n])=>n>0).map(([p])=>p);
      const whoMsg=stillPending.length>0?stillPending.join(', '):(state.rpsWinner||'?');
      pt.innerHTML=`<i class="fa-solid fa-hourglass-half"></i> ${whoMsg} is choosing...`;pt.className='text-yellow';
    }
  }

  // Update log
  if(state.moves?.length>0){
    document.getElementById('move-log').innerHTML=state.moves.map(m=>`<p>> ${m}</p>`).join('');
  }
}

function flash(msg){
  const el=document.getElementById('flash-msg');
  el.textContent=msg;setTimeout(()=>{el.textContent='';},3000);
}

function showGameOver(winner,state){
  if(gameOver)return;gameOver=true;stopPolling();
  document.getElementById('gameover-title').innerHTML=
    winner===MY_NAME?'<span class="win-text">🏆 You Win!</span>'
    :`<span class="lose-text">${winner} Wins! 👑</span>`;
  document.getElementById('gameover-scores').innerHTML=
    state.players.sort((a,b)=>state.scores[b]-state.scores[a])
      .map((p,i)=>`<div>${i===0?'🥇':i===1?'🥈':'🥉'} ${p}: ${state.scores[p]} pts${p===winner?' 👑':''}</div>`).join('');
  document.getElementById('gameover-overlay').classList.add('visible');
}

// ══ RPS ═══════════════════════════════════════════════
async function sendRPS(choice){
  myRPSSubmitted=true;
  ['btn-rock','btn-paper','btn-scissors'].forEach(id=>{const b=document.getElementById(id);if(b)b.disabled=true;});
  document.getElementById('phase-text').innerHTML='<i class="fa-solid fa-hourglass-half"></i> Waiting for others...';
  document.getElementById('phase-text').className='text-yellow';
  const data=await post('rps_choice',{gameId:GAME_ID,username:MY_NAME,choice});
  if(data.error){flash(data.error);myRPSSubmitted=false;return;}
  if(data.state)updateUI(data.state);
}

// ══ Actions ════════════════════════════════════════════
function pickAction(act,fromInv){
  if(!gameState)return;
  const opps=gameState.alivePlayers.filter(p=>p!==MY_NAME);
  if(opps.length===1){sendAction(act,opps[0],fromInv);return;}
  pendingAction=act;pendingFromInv=fromInv;
  document.getElementById('target-selector').classList.add('visible');
  document.getElementById('target-label').innerHTML=
    act==='cannon'?'<i class="fa-solid fa-crosshairs"></i> Cannon Target:'
    :'<i class="fa-solid fa-crosshairs"></i> Slicer Target:';
  document.getElementById('target-btn-row').innerHTML=
    opps.map(opp=>`<button class="target-btn" onclick="sendAction('${act}','${opp}',${fromInv})">${opp}</button>`).join('');
}

async function sendAction(act,target,fromInv){
  document.getElementById('target-selector').classList.remove('visible');
  // Disable all action buttons while processing
  ['btn-use-cannon','btn-use-slicer','btn-use-shield','btn-buy-cannon','btn-buy-slicer'].forEach(id=>{
    const b=document.getElementById(id);if(b)b.disabled=true;
  });
  const payload={gameId:GAME_ID,username:MY_NAME,action:act};
  if(target)payload.targetPlayer=target;
  if(fromInv)payload.useInventory=true;
  const data=await post('task_action',payload);
  if(data.error){flash(data.error);if(gameState)updateUI(gameState);return;}
  if(data.state)updateUI(data.state);
  if(data.gameOver)showGameOver(data.winner,data.state);
}

// ══ Polling ════════════════════════════════════════════
function stopPolling(){if(pollInterval){clearInterval(pollInterval);pollInterval=null;}}
let lastHash='';
async function poll(){
  try{
    const data=await getState();
    if(data.error){
      failCount++;
      if(failCount>=4){
        document.getElementById('conn-text').innerHTML='<span class="spinner"></span>Reconnecting...';
        document.getElementById('conn-bar').className='';
      }
      return;
    }
    failCount=0;
    const state=data.state;
    const hash=state.phase+(state.moves?.length||0)+JSON.stringify(state.pendingRPS)+JSON.stringify(state.islands)+JSON.stringify(state.pendingTasks);
    if(hash!==lastHash||!gameState){lastHash=hash;updateUI(state);}
    if(state.gameOver&&!gameOver)showGameOver(state.winner,state);
    document.getElementById('conn-text').innerHTML='<i class="fa-solid fa-signal" style="margin-right:6px;"></i>Live';
    document.getElementById('conn-bar').className='ok';
  } catch(e){
    failCount++;
    if(failCount>=3){
      document.getElementById('conn-text').innerHTML='<span class="spinner"></span>Reconnecting...';
      document.getElementById('conn-bar').className='';
    }
    if(failCount>=200){
      document.getElementById('conn-text').innerHTML='<i class="fa-solid fa-triangle-exclamation" style="margin-right:6px;"></i>Connection lost — Refresh to rejoin';
      document.getElementById('conn-bar').className='err';
      stopPolling();
      setTimeout(()=>{gameOver=false;failCount=0;init(1);},5000);
    }
  }
}

let resizeTimer;
window.addEventListener('resize',()=>{
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(()=>{if(gameState)renderIslands(gameState);},200);
});

async function init(attempt){
  attempt=attempt||1;const MAX=10;
  document.getElementById('conn-text').innerHTML=`<span class="spinner"></span>Connecting... (${attempt}/${MAX})`;
  try{
    const data=await getState();
    if(data.error){
      if(attempt<MAX){setTimeout(()=>init(attempt+1),1200*attempt);return;}
      document.getElementById('conn-text').innerHTML='<i class="fa-solid fa-triangle-exclamation" style="margin-right:6px;"></i>Game not found — check your link';
      document.getElementById('conn-bar').className='err';return;
    }
    document.getElementById('conn-text').innerHTML='<i class="fa-solid fa-signal" style="margin-right:6px;"></i>Live';
    document.getElementById('conn-bar').className='ok';
    // FIX: sync RPS submitted state from server so buttons are correct on rejoin
    myRPSSubmitted = !!(data.state.pendingRPS && data.state.pendingRPS[MY_NAME]);
    updateUI(data.state);
    if(data.state.gameOver){showGameOver(data.state.winner,data.state);return;}
    pollInterval=setInterval(poll,1800);
  } catch(e){
    if(attempt<MAX){setTimeout(()=>init(attempt+1),1500*attempt);return;}
    document.getElementById('conn-text').innerHTML='<i class="fa-solid fa-triangle-exclamation" style="margin-right:6px;"></i>Failed to load — Refresh';
    document.getElementById('conn-bar').className='err';
  }
}
init(1);
</script>
