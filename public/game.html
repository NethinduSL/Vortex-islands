<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>VORTEX ISLANDS — BATTLE</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#ffd700;--gold-dim:#a88800;
  --green:#00ff88;--red:#ff2d55;
  --cyan:#00cfff;--orange:#ff8c00;
  --bg:#08090d;--surface:#0e1117;--surface2:#161b26;
  --border:#1e2535;--border-gold:rgba(255,215,0,0.25);
  --text:#c8d0e0;--text-dim:#5a6478;
  --font:'Press Start 2P',monospace;
  --mono:'Share Tech Mono',monospace;
  --radius:6px;
  --panel-h-mobile: 44vh;
  --panel-h-desktop: 38vh;
}

html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);}
body{font-family:var(--font);display:flex;flex-direction:column;color:var(--text);}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#2a3045;border-radius:4px;}

/* ─── TOP BAR ─── */
#top-bar{
  flex-shrink:0;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 12px;
  height:38px;
  display:flex;align-items:center;justify-content:space-between;
  gap:8px;z-index:50;
}
#conn-badge{
  display:flex;align-items:center;gap:6px;
  font-family:var(--mono);font-size:10px;letter-spacing:1px;
  color:var(--text-dim);
}
#conn-dot{
  width:7px;height:7px;border-radius:50%;
  background:#333;flex-shrink:0;
  transition:background .3s;
}
#conn-dot.ok{background:var(--green);box-shadow:0 0 6px var(--green);}
#conn-dot.err{background:var(--red);box-shadow:0 0 6px var(--red);}
#conn-dot.loading{
  background:var(--gold);
  animation:pulse-dot 1s ease-in-out infinite alternate;
}
@keyframes pulse-dot{to{opacity:.3;}}

.top-center{
  font-family:var(--mono);font-size:9px;letter-spacing:3px;
  color:var(--gold-dim);text-transform:uppercase;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  flex:1;text-align:center;
}
#settings-btn{
  background:transparent;border:1px solid var(--border);
  color:var(--text-dim);font-size:14px;
  width:28px;height:28px;border-radius:var(--radius);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:border-color .15s,color .15s;
}
#settings-btn:hover{border-color:var(--gold);color:var(--gold);}

/* ─── SEA WORLD ─── */
#sea-world{
  flex:1;position:relative;overflow:hidden;
  cursor:grab;touch-action:none;
  background:radial-gradient(ellipse at 50% 30%,#0d2a5e 0%,#060c1a 70%);
  min-height:0;
}
#sea-world:active{cursor:grabbing;}
#sea-canvas{position:absolute;top:0;left:0;image-rendering:pixelated;}

/* Zoom strip */
#zoom-strip{
  position:absolute;bottom:10px;right:10px;
  display:flex;flex-direction:column;gap:3px;z-index:20;
}
.z-btn{
  width:28px;height:28px;border-radius:var(--radius);
  background:rgba(14,17,23,0.9);border:1px solid var(--border);
  color:var(--text);font-family:var(--font);font-size:11px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:border-color .15s,color .15s;
}
.z-btn:hover{border-color:var(--gold);color:var(--gold);}
#zoom-pct{
  font-family:var(--mono);font-size:8px;color:var(--text-dim);
  text-align:center;letter-spacing:1px;
}

/* ─── BOTTOM PANEL ─── */
#panel{
  flex-shrink:0;
  background:var(--surface);
  border-top:1px solid var(--border);
  display:flex;flex-direction:column;
  max-height:var(--panel-h-mobile);
  overflow-y:auto;z-index:40;
}
@media(min-width:600px){
  #panel{max-height:var(--panel-h-desktop);}
}

/* Phase banner */
#phase-banner{
  padding:8px 12px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
#phase-text{
  font-family:var(--mono);font-size:clamp(9px,2.5vw,13px);
  letter-spacing:1px;flex:1;
}
.pt-green{color:var(--green);}
.pt-yellow{color:var(--gold);}
.pt-cyan{color:var(--cyan);}
.pt-red{color:var(--red);}

/* Slot pips */
#slot-bar{display:none;align-items:center;gap:4px;flex-shrink:0;}
#slot-bar.on{display:flex;}
.s-pip{
  width:10px;height:10px;border-radius:2px;
  background:var(--gold);border:1px solid var(--gold-dim);
}
.s-pip.used{background:var(--surface2);border-color:var(--border);}

/* RPS waiting pips */
#rps-pips{
  padding:6px 12px;
  display:flex;gap:6px;flex-wrap:wrap;align-items:center;
  border-bottom:1px solid var(--border);
  flex-shrink:0;min-height:0;
}
#rps-pips:empty{display:none;}
.rp-chip{
  font-family:var(--mono);font-size:9px;
  padding:3px 7px;border-radius:4px;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text-dim);letter-spacing:1px;
}
.rp-chip.done{border-color:var(--green);color:var(--green);}

/* Main controls row */
#ctrl-body{
  padding:8px 10px;
  display:flex;gap:8px;flex-wrap:wrap;align-items:flex-start;
  flex:1;
}

/* ── SECTION CARD ── */
.ctrl-card{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:8px;
  display:flex;flex-direction:column;gap:6px;
  min-width:0;
}
.card-lbl{
  font-family:var(--mono);font-size:8px;
  color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;
}

/* ── RPS BUTTONS ── */
.rps-row{display:flex;gap:5px;}
.rps-btn{
  font-family:var(--font);cursor:pointer;border:none;
  width:clamp(48px,14vw,64px);height:clamp(48px,14vw,64px);
  border-radius:var(--radius);
  background:linear-gradient(160deg,#2a0a0a,#1a0505);
  border:2px solid #3a1010;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  transition:border-color .1s,transform .08s,filter .1s;
  position:relative;overflow:hidden;
}
.rps-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.05) 0%,transparent 60%);
}
.rps-btn:hover:not(:disabled){border-color:#ff4455;filter:brightness(1.25);}
.rps-btn:active:not(:disabled){transform:scale(0.94);}
.rps-btn:disabled{opacity:.3;cursor:not-allowed;}
.rps-ico{font-size:clamp(16px,5vw,22px);line-height:1;}
.rps-lbl{font-size:clamp(4px,1.2vw,5px);color:#888;letter-spacing:1px;}

/* ── ACTION BUTTONS ── */
.act-row{display:flex;gap:5px;flex-wrap:wrap;}
.act-btn{
  font-family:var(--font);cursor:pointer;border:none;
  border-radius:var(--radius);
  padding:clamp(7px,2vw,10px) clamp(8px,2.2vw,12px);
  display:flex;flex-direction:column;align-items:center;gap:3px;
  min-width:clamp(52px,14vw,72px);
  transition:border-color .1s,transform .08s,filter .1s;
  position:relative;overflow:hidden;
}
.act-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.06) 0%,transparent 60%);
}
.act-btn:hover:not(:disabled){filter:brightness(1.2);}
.act-btn:active:not(:disabled){transform:scale(0.94);}
.act-btn:disabled{opacity:.25;cursor:not-allowed;}
.act-ico{font-size:clamp(13px,4vw,18px);line-height:1;}
.act-lbl{font-size:clamp(4px,1.1vw,5px);color:#fff;letter-spacing:1px;text-align:center;}
.act-sub{font-size:clamp(3px,.9vw,4px);color:rgba(255,255,255,0.45);text-align:center;line-height:1.5;white-space:normal;}

.btn-buy{background:linear-gradient(160deg,#1a0c3a,#120828);border:2px solid #2e1460;}
.btn-buy .act-lbl{color:var(--gold);}
.btn-use{background:linear-gradient(160deg,#07114a,#050d35);border:2px solid #0e1e7a;}
.btn-shield{background:linear-gradient(160deg,#062a10,#041a0a);border:2px solid #0d4e1e;}

/* ── STORAGE STRIP ── */
.storage-strip{
  display:flex;gap:6px;align-items:center;flex-wrap:wrap;
}
.st-item{
  display:flex;align-items:center;gap:5px;
  background:var(--bg);border:1px solid var(--border);
  border-radius:var(--radius);padding:4px 8px;
}
.st-ico{font-size:12px;}
.st-val{font-family:var(--mono);font-size:12px;color:var(--cyan);}
.st-lbl{font-family:var(--mono);font-size:7px;color:var(--text-dim);}

/* ── TARGET SELECTOR ── */
#target-selector{display:none;width:100%;flex-direction:column;gap:6px;align-items:center;padding:8px 10px;border-top:1px solid var(--border);}
#target-selector.on{display:flex;}
#target-lbl{font-family:var(--mono);font-size:9px;color:var(--gold);letter-spacing:1px;}
#target-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
.target-btn{
  font-family:var(--font);font-size:clamp(5px,1.4vw,6px);cursor:pointer;
  border:1px solid var(--gold);background:rgba(255,215,0,0.07);color:var(--gold);
  padding:8px 14px;border-radius:var(--radius);letter-spacing:1px;
  transition:background .15s;
}
.target-btn:hover{background:rgba(255,215,0,0.18);}
.cancel-btn{
  font-family:var(--font);font-size:clamp(4px,1.2vw,5px);cursor:pointer;
  border:1px solid var(--border);background:transparent;color:var(--text-dim);
  padding:5px 10px;border-radius:var(--radius);letter-spacing:1px;
  transition:border-color .15s,color .15s;
}
.cancel-btn:hover{border-color:var(--red);color:var(--red);}

/* ── FLASH + LOG ── */
#flash{
  font-family:var(--mono);font-size:9px;color:var(--red);
  min-height:14px;text-align:center;padding:0 12px;letter-spacing:1px;
  flex-shrink:0;
}
#log-box{
  display:none;
  border-top:1px solid var(--border);
  padding:6px 10px;max-height:56px;overflow-y:auto;
}
#log-box.on{display:block;}
#move-log{font-family:var(--mono);font-size:8px;color:var(--text-dim);line-height:1.9;}
#move-log p{border-bottom:1px solid var(--bg);padding:1px 0;}
#move-log p:last-child{color:var(--text);}

/* ═══ RPS POPUP ═══ */
#rps-popup{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0.8);
  background:var(--surface);
  border:1px solid var(--border-gold);
  box-shadow:0 0 60px rgba(0,0,0,0.8),0 0 30px rgba(255,215,0,0.1);
  border-radius:10px;
  padding:clamp(16px,4vw,28px) clamp(20px,5vw,40px);
  z-index:300;display:none;flex-direction:column;align-items:center;gap:8px;
  opacity:0;transition:transform .25s cubic-bezier(.175,.885,.32,1.4),opacity .2s;
  pointer-events:none;min-width:min(280px,85vw);
}
#rps-popup.show{display:flex;opacity:1;transform:translate(-50%,-50%) scale(1);}
#rps-popup.hide{opacity:0;transform:translate(-50%,-50%) scale(0.85);}
#rp-emo{font-size:clamp(28px,8vw,48px);line-height:1;}
#rp-title{
  font-size:clamp(9px,3vw,14px);color:var(--gold);
  letter-spacing:2px;text-align:center;
  text-shadow:0 0 20px rgba(255,215,0,0.4);
}
#rp-sub{font-family:var(--mono);font-size:clamp(7px,2vw,9px);color:var(--text-dim);text-align:center;letter-spacing:1px;}
#rp-chips{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
.rp-chip2{
  font-family:var(--mono);font-size:8px;
  padding:4px 10px;border-radius:4px;
  border:1px solid var(--border);color:var(--text-dim);
  background:var(--surface2);
}
.rp-chip2.win{border-color:var(--gold);color:var(--gold);background:rgba(255,215,0,0.08);}
.rp-chip2.lose{opacity:.4;}

/* ═══ GAME OVER ═══ */
#gameover{
  position:fixed;inset:0;
  background:rgba(8,9,13,0.97);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:clamp(12px,3vw,20px);z-index:400;padding:20px;
}
#gameover.on{display:flex;}
#go-title{font-size:clamp(14px,5vw,26px);text-align:center;letter-spacing:2px;}
.go-win{color:var(--gold);text-shadow:0 0 40px rgba(255,215,0,0.5);animation:gold-pulse 1.4s ease-in-out infinite alternate;}
.go-lose{color:var(--red);text-shadow:0 0 20px rgba(255,45,85,0.4);}
@keyframes gold-pulse{to{text-shadow:0 0 60px rgba(255,215,0,0.7),0 0 100px rgba(255,215,0,0.2);}}
#go-scores{
  font-family:var(--mono);font-size:clamp(9px,2.5vw,12px);
  color:var(--text);line-height:2.5;text-align:center;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px 20px;
  min-width:min(240px,80vw);
}
.go-btn{
  font-family:var(--font);font-size:clamp(7px,2.2vw,10px);cursor:pointer;border:none;
  padding:clamp(11px,3vw,15px) clamp(16px,4vw,24px);
  border-radius:var(--radius);
  background:var(--gold);color:#0a0800;
  letter-spacing:1px;text-transform:uppercase;
  box-shadow:0 4px 20px rgba(255,215,0,0.25);
  transition:filter .15s,transform .08s;
}
.go-btn:hover{filter:brightness(1.1);}
.go-btn:active{transform:scale(0.96);}

/* ═══ SETTINGS ═══ */
#settings-overlay{
  position:fixed;inset:0;background:rgba(8,9,13,0.92);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  z-index:200;padding:20px;
}
#settings-overlay.on{display:flex;}
.settings-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;padding:20px;
  width:100%;max-width:min(360px,calc(100vw - 32px));
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}
.settings-ttl{
  font-family:var(--mono);font-size:11px;color:var(--gold);
  letter-spacing:2px;margin-bottom:16px;
}
.srow{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;font-family:var(--mono);font-size:9px;color:var(--text-dim);
}
.tog-btn{
  font-family:var(--mono);font-size:8px;
  background:var(--surface2);color:var(--text-dim);
  border:1px solid var(--border);padding:5px 10px;
  border-radius:4px;cursor:pointer;letter-spacing:1px;
  transition:background .15s,color .15s,border-color .15s;
}
.tog-btn.on{background:rgba(0,255,136,0.1);color:var(--green);border-color:rgba(0,255,136,0.3);}
.s-div{border:none;border-top:1px solid var(--border);margin:12px 0;}
.s-close{
  font-family:var(--font);font-size:8px;cursor:pointer;border:none;
  padding:10px;border-radius:var(--radius);width:100%;
  background:var(--surface2);color:var(--text-dim);
  border:1px solid var(--border);letter-spacing:1px;
  transition:border-color .15s,color .15s;
}
.s-close:hover{border-color:var(--red);color:var(--red);}

/* ─── RESPONSIVE LAYOUT TWEAKS ─── */
@media(max-width:480px){
  #ctrl-body{gap:6px;padding:6px 8px;}
  .ctrl-card{padding:6px;}
  .rps-btn{width:52px;height:52px;}
  .rps-ico{font-size:20px;}
}
@media(min-width:768px){
  #panel{max-height:var(--panel-h-desktop);}
  .rps-btn{width:70px;height:70px;}
  .rps-ico{font-size:26px;}
}

/* ─── SPINNER ─── */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:8px;height:8px;border:2px solid rgba(255,215,0,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:4px;}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="top-bar">
  <div id="conn-badge">
    <div id="conn-dot" class="loading"></div>
    <span id="conn-text" style="font-family:var(--mono);font-size:9px;letter-spacing:1px;">CONNECTING</span>
  </div>
  <div class="top-center">VORTEX ISLANDS</div>
  <button id="settings-btn" onclick="openSettings()">⚙</button>
</div>

<!-- SEA WORLD -->
<div id="sea-world">
  <canvas id="sea-canvas"></canvas>
  <div id="zoom-strip">
    <button class="z-btn" onclick="doZoom(1.25)">+</button>
    <div id="zoom-pct">100%</div>
    <button class="z-btn" onclick="doZoom(0.8)">−</button>
    <button class="z-btn" onclick="resetView()" title="Reset" style="font-size:10px;">⌂</button>
  </div>
</div>

<!-- BOTTOM PANEL -->
<div id="panel">

  <!-- Phase banner -->
  <div id="phase-banner">
    <span id="phase-text" class="pt-yellow">WAITING...</span>
    <div id="slot-bar"></div>
  </div>

  <!-- RPS waiting pips -->
  <div id="rps-pips"></div>

  <!-- Main controls -->
  <div id="ctrl-body">

    <!-- RPS Card -->
    <div class="ctrl-card">
      <div class="card-lbl">⚔ RPS</div>
      <div class="rps-row">
        <button class="rps-btn" id="btn-rock" disabled onclick="sendRPS('rock')">
          <span class="rps-ico">🪨</span><span class="rps-lbl">ROCK</span>
        </button>
        <button class="rps-btn" id="btn-paper" disabled onclick="sendRPS('paper')">
          <span class="rps-ico">📄</span><span class="rps-lbl">PAPER</span>
        </button>
        <button class="rps-btn" id="btn-scissors" disabled onclick="sendRPS('scissors')">
          <span class="rps-ico">✂</span><span class="rps-lbl">SCIS</span>
        </button>
      </div>
    </div>

    <!-- Buy Card -->
    <div class="ctrl-card" id="buy-section" style="display:none;">
      <div class="card-lbl">💰 BUY</div>
      <div class="act-row">
        <button class="act-btn btn-buy" id="btn-buy-cannon" disabled onclick="doAction('buy_cannon',false)">
          <span class="act-ico">💣</span>
          <span class="act-lbl">CANNON</span>
          <span class="act-sub">Store · strip shield</span>
        </button>
        <button class="act-btn btn-buy" id="btn-buy-slicer" disabled onclick="doAction('buy_slicer',false)">
          <span class="act-ico">⚔</span>
          <span class="act-lbl">SLICER</span>
          <span class="act-sub">Store · cut quad</span>
        </button>
        <button class="act-btn btn-shield" id="btn-buy-shield" disabled onclick="doAction('buy_shield',false)">
          <span class="act-ico">🛡</span>
          <span class="act-lbl">SHIELD</span>
          <span class="act-sub">Instant · block slicers</span>
        </button>
      </div>
    </div>

    <!-- Use Card -->
    <div class="ctrl-card" id="use-section" style="display:none;">
      <div class="card-lbl">🎯 USE</div>
      <div class="act-row">
        <button class="act-btn btn-use" id="btn-use-cannon" disabled onclick="pickTarget('cannon')">
          <span class="act-ico">💣</span>
          <span class="act-lbl">CANNON</span>
          <span class="act-sub" id="inv-cannon-lbl">×0</span>
        </button>
        <button class="act-btn btn-use" id="btn-use-slicer" disabled onclick="pickTarget('slicer')">
          <span class="act-ico">⚔</span>
          <span class="act-lbl">SLICER</span>
          <span class="act-sub" id="inv-slicer-lbl">×0</span>
        </button>
      </div>
    </div>

    <!-- Storage Card -->
    <div class="ctrl-card">
      <div class="card-lbl">📦 STORAGE</div>
      <div class="storage-strip">
        <div class="st-item">
          <span class="st-ico">💣</span>
          <span class="st-val" id="st-cannons">0</span>
          <span class="st-lbl">CANNON</span>
        </div>
        <div class="st-item">
          <span class="st-ico">⚔</span>
          <span class="st-val" id="st-slicers">0</span>
          <span class="st-lbl">SLICER</span>
        </div>
        <div class="st-item">
          <span class="st-ico">🛡</span>
          <span class="st-val" id="st-shields">0</span>
          <span class="st-lbl">SHIELD</span>
        </div>
      </div>
    </div>

  </div><!-- /ctrl-body -->

  <!-- Target Selector -->
  <div id="target-selector">
    <div id="target-lbl">🎯 SELECT TARGET</div>
    <div id="target-row"></div>
    <button class="cancel-btn" onclick="cancelTarget()">✕ CANCEL</button>
  </div>

  <!-- Flash + Log -->
  <div id="flash"></div>
  <div id="log-box"><div id="move-log"><p>▸ GAME STARTING...</p></div></div>

</div><!-- /panel -->

<!-- RPS POPUP -->
<div id="rps-popup">
  <div id="rp-emo">🏆</div>
  <div id="rp-title">RPS RESULT</div>
  <div id="rp-sub"></div>
  <div id="rp-chips"></div>
</div>

<!-- GAME OVER -->
<div id="gameover">
  <div id="go-title">...</div>
  <div id="go-scores"></div>
  <button class="go-btn" onclick="location.href='/'">↩ PLAY AGAIN</button>
</div>

<!-- SETTINGS -->
<div id="settings-overlay">
  <div class="settings-card">
    <div class="settings-ttl">⚙ SETTINGS</div>
    <div class="srow">
      <span>📜 BATTLE LOG</span>
      <button class="tog-btn" id="log-tog" onclick="toggleLog()">OFF</button>
    </div>
    <hr class="s-div"/>
    <button class="s-close" onclick="closeSettings()">✕ CLOSE</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// VORTEX ISLANDS — GAME CLIENT (redesigned UI)
// ═══════════════════════════════════════════════════════════════════

const CELL_COLORS = {
  grass:'#4a9e32', dark_grass:'#337322', stone:'#6e7d85',
  dirt:'#7e5530', sand:'#c4a25a'
};

const params = new URLSearchParams(location.search);
const GAME_ID = params.get('gameId'), MY_NAME = params.get('username');
if (!GAME_ID || !MY_NAME) location.href = '/';
const API = '/api/game';

let gameState = null, myRPSSubmitted = false, pendingActionType = null;
let pollInterval = null, gameOver = false, failCount = 0, logVisible = false;
let isPollRunning = false;

// Pan/zoom
let seaScale = 1.0, seaOffX = 0, seaOffY = 0;
let isDragging = false, dragStartX = 0, dragStartY = 0, dragOffX = 0, dragOffY = 0;
let pinchDist = 0;
const islandCache = {};

// ── Network ──────────────────────────────────────────────────────
async function safeJson(r){const t=await r.text();try{return JSON.parse(t);}catch{return{error:'SERVER_ERROR'};}}
async function ft(url,opts,ms=10000){const c=new AbortController();const tid=setTimeout(()=>c.abort(),ms);try{const r=await fetch(url,{...opts,signal:c.signal});clearTimeout(tid);return r;}catch(e){clearTimeout(tid);throw e;}}
async function post(act,body){return safeJson(await ft(`${API}?action=${act}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}));}
async function getState(){return safeJson(await ft(`${API}?action=game&gameId=${GAME_ID}`));}

// ── Settings ─────────────────────────────────────────────────────
function openSettings(){document.getElementById('settings-overlay').classList.add('on');}
function closeSettings(){document.getElementById('settings-overlay').classList.remove('on');}
function toggleLog(){
  logVisible=!logVisible;
  document.getElementById('log-box').classList.toggle('on',logVisible);
  const btn=document.getElementById('log-tog');
  btn.classList.toggle('on',logVisible);
  btn.textContent=logVisible?'ON':'OFF';
}

// ── Conn badge ────────────────────────────────────────────────────
function setConn(state,msg){
  const dot=document.getElementById('conn-dot');
  const txt=document.getElementById('conn-text');
  dot.className=state;
  txt.textContent=msg;
}

// ═══════════════════════════════════════════════════════════════════
// SEA / ISLAND RENDERING
// ═══════════════════════════════════════════════════════════════════

const seaWorld = document.getElementById('sea-world');
const seaCanvas = document.getElementById('sea-canvas');
const seaCtx = seaCanvas.getContext('2d');

function getIslandPos(idx, total) {
  const layouts = {
    1:[{x:.5,y:.5}],
    2:[{x:.28,y:.5},{x:.72,y:.5}],
    3:[{x:.5,y:.22},{x:.22,y:.72},{x:.78,y:.72}],
    4:[{x:.25,y:.28},{x:.75,y:.28},{x:.25,y:.72},{x:.75,y:.72}],
    5:[{x:.5,y:.2},{x:.2,y:.5},{x:.8,y:.5},{x:.3,y:.78},{x:.7,y:.78}],
    6:[{x:.25,y:.2},{x:.75,y:.2},{x:.15,y:.55},{x:.85,y:.55},{x:.35,y:.82},{x:.65,y:.82}],
  };
  const t=Math.min(6,Math.max(1,total));
  return (layouts[t]||layouts[6])[idx%(layouts[t]||layouts[6]).length];
}

function getIslandDrawSize() {
  const vw=seaWorld.clientWidth, vh=seaWorld.clientHeight;
  const base=Math.min(vw,vh);
  const pc=gameState?Math.max(2,gameState.players.length):2;
  const factor={2:.28,3:.22,4:.18,5:.15,6:.13}[pc]||.18;
  const w=Math.floor(base*factor);
  return {w, h:Math.floor(w*0.5)};
}

function buildIslandCanvas(player, state) {
  const GW=64, GH=32;
  const sz=getIslandDrawSize();
  const cw=sz.w, ch=sz.h;
  const CW=cw/GW, CH=ch/GH;
  const oc=document.createElement('canvas');
  oc.width=cw; oc.height=ch;
  const ctx=oc.getContext('2d');
  const grid=state.grids[player];
  if(!grid) return oc;

  // Ocean base
  ctx.fillStyle='#0e3d6e';
  ctx.fillRect(0,0,cw,ch);

  // Land cells
  grid.forEach((row,r)=>row.forEach((cell,c)=>{
    const col=CELL_COLORS[cell];
    if(!col) return;
    ctx.fillStyle=col;
    ctx.fillRect(Math.floor(c*CW),Math.floor(r*CH),Math.ceil(CW),Math.ceil(CH));
    ctx.fillStyle='rgba(255,255,255,0.08)';
    ctx.fillRect(Math.floor(c*CW),Math.floor(r*CH),Math.ceil(CW*.4),Math.ceil(CH*.4));
  }));

  // Wave shimmer
  ctx.fillStyle='rgba(255,255,255,0.04)';
  for(let r=0;r<GH;r+=3){
    grid[r]&&grid[r].forEach((cell,c)=>{
      if(cell==='sea') ctx.fillRect(Math.floor(c*CW),Math.floor(r*CH+CH*.4),Math.ceil(CW),1);
    });
  }

  // Quadrant dividers
  ctx.strokeStyle='rgba(255,255,255,0.12)';
  ctx.lineWidth=1; ctx.setLineDash([3,5]);
  ctx.beginPath();
  ctx.moveTo(cw/2,0); ctx.lineTo(cw/2,ch);
  ctx.moveTo(0,ch/2); ctx.lineTo(cw,ch/2);
  ctx.stroke(); ctx.setLineDash([]);

  // Q labels
  const ls=Math.max(5,Math.floor(CW));
  ctx.fillStyle='rgba(255,255,255,0.12)';
  ctx.font=`bold ${ls}px monospace`;
  ctx.fillText('1',3,ls+1); ctx.fillText('2',cw/2+3,ls+1);
  ctx.fillText('3',3,ch/2+ls+1); ctx.fillText('4',cw/2+3,ch/2+ls+1);

  // Shields
  const shields=state.islands[player]?.shields||0;
  if(shields>0){
    const shCols=['rgba(0,180,255,0.85)','rgba(0,230,255,0.6)','rgba(180,245,255,0.45)'];
    ctx.shadowBlur=14;
    for(let s=0;s<shields;s++){
      const ins=(shields-s)*Math.max(3,Math.floor(CW*.3));
      ctx.strokeStyle=shCols[s]; ctx.lineWidth=2; ctx.shadowColor=shCols[s];
      ctx.strokeRect(ins+1,ins+1,cw-ins*2-2,ch-ins*2-2);
    }
    ctx.shadowBlur=0;
  }

  // Eliminated
  if(state.islands[player]?.alive===false){
    ctx.fillStyle='rgba(160,0,0,0.5)';
    ctx.fillRect(0,0,cw,ch);
    ctx.fillStyle='rgba(255,45,85,0.6)';
    ctx.font=`bold ${Math.max(10,ch*.3)}px monospace`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('✕',cw/2,ch/2);
    ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  }

  return oc;
}

function drawSea() {
  const W=seaWorld.clientWidth, H=seaWorld.clientHeight;
  seaCanvas.width=W; seaCanvas.height=H;
  const ctx=seaCtx;

  // Ocean bg
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#060f28'); grad.addColorStop(.5,'#0a1e4a'); grad.addColorStop(1,'#0d2860');
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);

  // Star field
  ctx.fillStyle='rgba(255,255,255,0.3)';
  for(let i=0;i<60;i++){
    const sx=(i*73+17)%W, sy=(i*41+11)%H;
    ctx.fillRect(sx,sy,1,1);
  }

  // Wave lines
  ctx.strokeStyle='rgba(255,255,255,0.03)';
  ctx.lineWidth=1;
  for(let y=30;y<H;y+=50){
    ctx.beginPath(); ctx.moveTo(0,y);
    for(let x=0;x<W;x+=70) ctx.bezierCurveTo(x+17,y-5,x+53,y+5,x+70,y);
    ctx.stroke();
  }

  if(!gameState) return;
  const players=gameState.players;
  const sz=getIslandDrawSize();

  players.forEach((p,i)=>{
    const pos=getIslandPos(i,players.length);
    const worldX=pos.x*W*seaScale+seaOffX;
    const worldY=pos.y*H*seaScale+seaOffY;
    const islandW=sz.w*seaScale;
    const islandH=sz.h*seaScale;
    const drawX=worldX-islandW/2;
    const drawY=worldY-islandH/2;

    const isAlive=gameState.islands[p]?.alive!==false;
    const isMe=p===MY_NAME;
    const isBot=(gameState.bots||[]).includes(p);

    // Drop shadow
    ctx.shadowColor='rgba(0,0,0,0.6)';
    ctx.shadowBlur=16*seaScale;
    ctx.shadowOffsetY=5*seaScale;

    const cacheKey=p+'|'+JSON.stringify(gameState.grids[p])+'|'+(gameState.islands[p]?.shields||0)+'|'+isAlive;
    if(!islandCache[p]||islandCache[p].key!==cacheKey)
      islandCache[p]={canvas:buildIslandCanvas(p,gameState),key:cacheKey};

    ctx.globalAlpha=isAlive?1.0:0.35;
    ctx.drawImage(islandCache[p].canvas,drawX,drawY,islandW,islandH);
    ctx.shadowColor='transparent'; ctx.shadowBlur=0; ctx.shadowOffsetY=0;
    ctx.globalAlpha=1.0;

    // RPS overlay
    const rpsChoices=gameState.rpsChoices||{};
    const rpsWinners=gameState.rpsWinners||[];
    if(rpsChoices[p]){
      const RPS_E={rock:'🪨',paper:'📄',scissors:'✂️'};
      ctx.fillStyle='rgba(0,0,0,0.45)';
      ctx.fillRect(drawX,drawY,islandW,islandH);
      ctx.font=`${Math.max(14,islandH*.45)}px serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(RPS_E[rpsChoices[p]]||rpsChoices[p],drawX+islandW/2,drawY+islandH/2);
      ctx.textAlign='left'; ctx.textBaseline='alphabetic';
      if(rpsWinners.includes(p)){
        ctx.strokeStyle='#ffd700'; ctx.lineWidth=2.5*seaScale;
        ctx.shadowColor='#ffd700'; ctx.shadowBlur=16;
        ctx.strokeRect(drawX+1,drawY+1,islandW-2,islandH-2);
        ctx.shadowBlur=0;
      }
    }

    // Me highlight
    if(isMe){
      ctx.strokeStyle='rgba(0,255,136,0.35)';
      ctx.lineWidth=2*seaScale;
      ctx.strokeRect(drawX-2,drawY-2,islandW+4,islandH+4);
    }

    // Name tag bg
    const tagFsz=Math.max(5,8*seaScale);
    const tagPad=tagFsz*0.5;
    const tagY=drawY-tagFsz-tagPad*1.5;
    ctx.font=`${tagFsz}px 'Press Start 2P',monospace`;
    ctx.textAlign='center';
    const nameStr=(isBot?'🤖':'👤')+' '+p;
    const textW=ctx.measureText(nameStr).width;
    ctx.fillStyle='rgba(8,9,13,0.75)';
    ctx.fillRect(drawX+islandW/2-textW/2-tagPad,tagY-tagFsz,textW+tagPad*2,tagFsz+tagPad);
    ctx.fillStyle=isMe?'#00ff88':isBot?'#00cfff':'#ffd700';
    ctx.fillText(nameStr,drawX+islandW/2,tagY);

    // HP bar
    const island=gameState.islands[p];
    const hp=island?Math.max(0,4-(island.quadrants?.length||0)):4;
    const barW=islandW*.72;
    const barH=Math.max(4,5*seaScale);
    const barX=drawX+(islandW-barW)/2;
    const barY=drawY+islandH+4*seaScale;
    ctx.fillStyle='rgba(8,9,13,0.7)';
    ctx.fillRect(barX,barY,barW,barH);
    ctx.fillStyle=hp>=3?'#00ff88':hp===2?'#ffd700':'#ff2d55';
    ctx.fillRect(barX,barY,barW*(hp/4),barH);
    ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=1;
    ctx.strokeRect(barX,barY,barW,barH);

    // Stats
    const sh=island?.shields||0;
    const statsY=barY+barH+Math.max(8,10*seaScale);
    ctx.font=`${Math.max(4,6*seaScale)}px 'Share Tech Mono',monospace`;
    ctx.fillStyle='rgba(200,208,224,0.7)';
    ctx.textAlign='center';
    ctx.fillText(`HP:${hp}/4  🛡${sh}`,drawX+islandW/2,statsY);
    ctx.textAlign='left';
  });
}

// ── Pan/Zoom ───────────────────────────────────────────────────────
function doZoom(factor){
  const W=seaWorld.clientWidth, H=seaWorld.clientHeight;
  const prev=seaScale;
  seaScale=Math.max(0.3,Math.min(4.0,seaScale*factor));
  const cx=W/2, cy=H/2;
  seaOffX=cx-(cx-seaOffX)*(seaScale/prev);
  seaOffY=cy-(cy-seaOffY)*(seaScale/prev);
  document.getElementById('zoom-pct').textContent=Math.round(seaScale*100)+'%';
  drawSea();
}
function resetView(){
  seaScale=1; seaOffX=0; seaOffY=0;
  document.getElementById('zoom-pct').textContent='100%';
  drawSea();
}

seaWorld.addEventListener('mousedown',e=>{
  if(e.target.classList.contains('z-btn')) return;
  isDragging=true;
  dragStartX=e.clientX; dragStartY=e.clientY;
  dragOffX=seaOffX; dragOffY=seaOffY;
});
window.addEventListener('mousemove',e=>{
  if(!isDragging) return;
  seaOffX=dragOffX+(e.clientX-dragStartX);
  seaOffY=dragOffY+(e.clientY-dragStartY);
  drawSea();
});
window.addEventListener('mouseup',()=>{isDragging=false;});
seaWorld.addEventListener('wheel',e=>{
  e.preventDefault();
  const factor=e.deltaY<0?1.12:0.89;
  const rect=seaWorld.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const prev=seaScale;
  seaScale=Math.max(0.3,Math.min(4.0,seaScale*factor));
  seaOffX=mx-(mx-seaOffX)*(seaScale/prev);
  seaOffY=my-(my-seaOffY)*(seaScale/prev);
  document.getElementById('zoom-pct').textContent=Math.round(seaScale*100)+'%';
  drawSea();
},{passive:false});

seaWorld.addEventListener('touchstart',e=>{
  if(e.touches.length===1){isDragging=true;dragStartX=e.touches[0].clientX;dragStartY=e.touches[0].clientY;dragOffX=seaOffX;dragOffY=seaOffY;}
  else if(e.touches.length===2){isDragging=false;pinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
},{passive:true});
seaWorld.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&isDragging){seaOffX=dragOffX+(e.touches[0].clientX-dragStartX);seaOffY=dragOffY+(e.touches[0].clientY-dragStartY);drawSea();}
  else if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);if(pinchDist>0){seaScale=Math.max(0.3,Math.min(4.0,seaScale*(d/pinchDist)));document.getElementById('zoom-pct').textContent=Math.round(seaScale*100)+'%';}pinchDist=d;drawSea();}
},{passive:false});
seaWorld.addEventListener('touchend',()=>{isDragging=false;},{passive:true});
window.addEventListener('resize',()=>{if(gameState) drawSea();});

// ═══════════════════════════════════════════════════════════════════
// RPS POPUP
// ═══════════════════════════════════════════════════════════════════
let rpsPopupTimer=null, lastRpsHash='';
function showRpsPopup(state){
  const choices=state.rpsChoices||{};
  if(!Object.keys(choices).length) return;
  const hash=JSON.stringify(choices);
  if(hash===lastRpsHash) return;
  lastRpsHash=hash;
  const winners=state.rpsWinners||(state.rpsWinner?[state.rpsWinner]:[]);
  const isTie=winners.length===state.alivePlayers.length;
  const RPS_E={rock:'🪨',paper:'📄',scissors:'✂️'};
  document.getElementById('rp-emo').textContent=isTie?'🤝':winners.includes(MY_NAME)?'🏆':'💀';
  document.getElementById('rp-title').textContent=isTie?'TIE — RETRY!':winners.includes(MY_NAME)?'YOU WIN RPS!':`${winners.join(' & ')} WIN`;
  document.getElementById('rp-sub').textContent=isTie?'Everyone chose the same':winners.includes(MY_NAME)?`You have ${state.pendingActions[MY_NAME]||1} action slot(s)!`:'Wait for winner to act';
  document.getElementById('rp-chips').innerHTML=state.alivePlayers.map(p=>{
    const isW=winners.includes(p);
    const cls=isTie?'':(isW?'win':'lose');
    return `<div class="rp-chip2 ${cls}">${p}: ${RPS_E[choices[p]]||choices[p]||'?'}</div>`;
  }).join('');
  const popup=document.getElementById('rps-popup');
  popup.classList.remove('hide'); popup.style.display='flex';
  requestAnimationFrame(()=>requestAnimationFrame(()=>popup.classList.add('show')));
  if(rpsPopupTimer) clearTimeout(rpsPopupTimer);
  rpsPopupTimer=setTimeout(()=>{
    popup.classList.remove('show'); popup.classList.add('hide');
    setTimeout(()=>{popup.style.display='none';popup.classList.remove('hide');},220);
  },1200);
}

// ═══════════════════════════════════════════════════════════════════
// UI UPDATE
// ═══════════════════════════════════════════════════════════════════
function updateUI(state){
  gameState=state;
  drawSea();

  if(state.rpsChoices&&Object.keys(state.rpsChoices).length) showRpsPopup(state);

  // Storage
  const myIsland=state.islands[MY_NAME];
  if(myIsland){
    document.getElementById('st-cannons').textContent=myIsland.inventory?.cannons||0;
    document.getElementById('st-slicers').textContent=myIsland.inventory?.slicers||0;
    document.getElementById('st-shields').textContent=myIsland.shields||0;
    document.getElementById('inv-cannon-lbl').textContent=`×${myIsland.inventory?.cannons||0}`;
    document.getElementById('inv-slicer-lbl').textContent=`×${myIsland.inventory?.slicers||0}`;
  }

  // Reset buttons
  document.getElementById('buy-section').style.display='none';
  document.getElementById('use-section').style.display='none';
  document.getElementById('target-selector').classList.remove('on');
  document.getElementById('slot-bar').classList.remove('on');
  ['btn-rock','btn-paper','btn-scissors','btn-buy-cannon','btn-buy-slicer','btn-buy-shield','btn-use-cannon','btn-use-slicer']
    .forEach(id=>{const b=document.getElementById(id);if(b) b.disabled=true;});

  const pt=document.getElementById('phase-text');
  const pips=document.getElementById('rps-pips');

  // RPS waiting pips
  if(state.phase==='rps'&&state.alivePlayers?.length>0){
    pips.innerHTML=state.alivePlayers.map(p=>
      `<span class="rp-chip ${state.pendingRPS[p]?'done':''}">${p}${state.pendingRPS[p]?' ✓':' …'}</span>`
    ).join('');
  } else pips.innerHTML='';

  const myAlive=state.alivePlayers?.includes(MY_NAME);

  if(!myAlive&&!state.gameOver){
    pt.textContent='💀 ELIMINATED — SPECTATING'; pt.className='pt-red'; return;
  }

  if(state.phase==='rps'){
    if(!myAlive){pt.textContent='👀 WATCHING RPS...';pt.className='pt-red';}
    else if(state.pendingRPS[MY_NAME]||myRPSSubmitted){pt.textContent='⏳ WAITING FOR OTHERS...';pt.className='pt-yellow';}
    else{
      pt.textContent='⚔ YOUR TURN — PICK RPS!';pt.className='pt-green';
      ['btn-rock','btn-paper','btn-scissors'].forEach(id=>{const b=document.getElementById(id);if(b) b.disabled=false;});
    }
    if(!state.pendingRPS[MY_NAME]) myRPSSubmitted=false;

  } else if(state.phase==='action'){
    const winners=state.rpsWinners||(state.rpsWinner?[state.rpsWinner]:[]);
    const slotsLeft=state.pendingActions[MY_NAME]||0;
    const myTurn=winners.includes(MY_NAME)&&slotsLeft>0;

    if(myTurn){
      pt.textContent=`✨ YOU WON — ${slotsLeft} SLOT${slotsLeft>1?'S':''} LEFT`;pt.className='pt-cyan';

      // Slot pips
      const slotBar=document.getElementById('slot-bar');
      slotBar.innerHTML='';
      const totalSlots=myIsland?.winSlots||slotsLeft;
      for(let i=0;i<totalSlots;i++){
        const pip=document.createElement('div');
        pip.className='s-pip'+(i>=slotsLeft?' used':'');
        slotBar.appendChild(pip);
      }
      slotBar.classList.add('on');

      document.getElementById('buy-section').style.display='flex';
      document.getElementById('use-section').style.display='flex';
      ['btn-buy-cannon','btn-buy-slicer','btn-buy-shield'].forEach(id=>{const b=document.getElementById(id);if(b) b.disabled=false;});
      const inv=myIsland?.inventory||{cannons:0,slicers:0};
      if(inv.cannons>0){const b=document.getElementById('btn-use-cannon');if(b) b.disabled=false;}
      if(inv.slicers>0){const b=document.getElementById('btn-use-slicer');if(b) b.disabled=false;}
    } else {
      const stillPending=Object.keys(state.pendingActions);
      pt.textContent=`⏳ ${stillPending.length?stillPending.join(', '):'...'} CHOOSING...`;pt.className='pt-yellow';
    }
  }

  if(state.moves?.length>0){
    document.getElementById('move-log').innerHTML=state.moves.map(m=>`<p>▸ ${m}</p>`).join('');
  }
}

function flash(msg){
  const el=document.getElementById('flash');
  el.textContent=msg;setTimeout(()=>el.textContent='',3000);
}

function showGameOver(winner,state){
  if(gameOver) return; gameOver=true; stopPolling();
  document.getElementById('go-title').innerHTML=
    winner===MY_NAME?'<span class="go-win">🏆 YOU WIN!</span>':`<span class="go-lose">${winner} WINS</span>`;
  document.getElementById('go-scores').innerHTML=
    state.players.sort((a,b)=>state.scores[b]-state.scores[a])
      .map((p,i)=>`${i+1}. ${p} — ${state.scores[p]} pts${p===winner?' 👑':''}`).join('<br>');
  document.getElementById('gameover').classList.add('on');
}

// ═══════════════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════════════
async function sendRPS(choice){
  myRPSSubmitted=true;
  ['btn-rock','btn-paper','btn-scissors'].forEach(id=>{const b=document.getElementById(id);if(b) b.disabled=true;});
  document.getElementById('phase-text').textContent='⏳ WAITING FOR OTHERS...';
  document.getElementById('phase-text').className='pt-yellow';
  const data=await post('rps_choice',{gameId:GAME_ID,username:MY_NAME,choice});
  if(data.error){flash(data.error);myRPSSubmitted=false;return;}
  if(data.state) updateUI(data.state);
}

function doAction(act,useInv){
  if(act==='cannon'||act==='slicer'){pickTarget(act);return;}
  sendAction(act,null,useInv);
}

function pickTarget(act){
  if(!gameState) return;
  pendingActionType=act;
  const opps=gameState.alivePlayers.filter(p=>p!==MY_NAME);
  if(opps.length===1){sendAction(act,opps[0],true);return;}
  document.getElementById('target-selector').classList.add('on');
  document.getElementById('target-lbl').textContent=act==='cannon'?'🎯 CANNON TARGET':'⚔ SLICER TARGET';
  document.getElementById('target-row').innerHTML=
    opps.map(opp=>`<button class="target-btn" onclick="sendAction('${act}','${opp}',true)">${opp}</button>`).join('');
}

function cancelTarget(){
  pendingActionType=null;
  document.getElementById('target-selector').classList.remove('on');
}

async function sendAction(act,target,useInv){
  document.getElementById('target-selector').classList.remove('on');
  ['btn-buy-cannon','btn-buy-slicer','btn-buy-shield','btn-use-cannon','btn-use-slicer']
    .forEach(id=>{const b=document.getElementById(id);if(b) b.disabled=true;});
  const payload={gameId:GAME_ID,username:MY_NAME,action:act};
  if(target) payload.targetPlayer=target;
  if(useInv) payload.useInventory=true;
  const data=await post('action_choice',payload);
  if(data.error){flash(data.error);if(gameState) updateUI(gameState);return;}
  if(data.state) updateUI(data.state);
  if(data.gameOver) showGameOver(data.winner,data.state);
}

// ═══════════════════════════════════════════════════════════════════
// POLLING
// ═══════════════════════════════════════════════════════════════════
function stopPolling(){if(pollInterval){clearInterval(pollInterval);pollInterval=null;}}
let lastHash='';

async function poll(){
  if(isPollRunning) return;
  isPollRunning=true;
  try{
    const data=await getState();
    if(data.error){
      failCount++;
      if(failCount>=4) setConn('loading','RECONNECTING...');
      if(failCount>=120) setConn('err','WEAK CONNECTION');
      return;
    }
    failCount=0;
    const state=data.state;
    const hash=state.phase+(state.moves?.length||0)+JSON.stringify(state.pendingRPS)+JSON.stringify(state.pendingActions)+JSON.stringify(state.rpsChoices);
    if(hash!==lastHash||!gameState){lastHash=hash;updateUI(state);}
    if(state.gameOver&&!gameOver) showGameOver(state.winner,state);
    setConn('ok','LIVE');
  }catch(e){
    failCount++;
    if(failCount>=3) setConn('loading','RECONNECTING...');
    if(failCount>=200){stopPolling();setTimeout(()=>{gameOver=false;failCount=0;init(1);},5000);}
  }finally{isPollRunning=false;}
}

async function init(attempt){
  attempt=attempt||1; const MAX=8;
  setConn('loading',`CONNECTING ${attempt}/${MAX}`);
  try{
    const data=await getState();
    if(data.error){
      if(attempt<MAX){setTimeout(()=>init(attempt+1),1200*attempt);return;}
      setConn('err','GAME NOT FOUND'); return;
    }
    setConn('ok','LIVE');
    updateUI(data.state);
    if(data.state.gameOver){showGameOver(data.state.winner,data.state);return;}
    pollInterval=setInterval(poll,1800);
  }catch(e){
    if(attempt<MAX){setTimeout(()=>init(attempt+1),1500*attempt);return;}
    setConn('err','FAILED TO LOAD');
  }
}
init(1);
</script>
