<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>VORTEX ISLANDS — BATTLE</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ocean1:#3a9ef5;--ocean2:#1e78d4;--ocean3:#0f5aaa;
  --sand:#e8d88a;--grass:#5db84a;--grass2:#4aa038;
  --dirt:#8b5e3c;--wood:#8b6914;
  --panel-bg:#1a3a1a;--panel-top:#2a5a2a;--panel-border:#5db84a;
  --gold:#ffd700;--gold2:#c8a800;
  --green:#43d615;--red:#e53935;--cyan:#00e5ff;
  --font:'Press Start 2P',monospace;
  --ts:2px 2px 0 #000;
}
html,body{height:100%;width:100%;overflow:hidden;background:var(--ocean1);}
body{font-family:var(--font);display:flex;flex-direction:column;position:relative;}

/* ── OCEAN CANVAS BG ── */
#sea-world{flex:1;position:relative;overflow:hidden;cursor:grab;touch-action:none;min-height:0;z-index:1;}
#sea-world.dragging{cursor:grabbing;}
#sea-canvas{position:absolute;top:0;left:0;image-rendering:pixelated;}

/* ── TOP HUD ── */
#hud{
  position:relative;z-index:50;flex-shrink:0;height:44px;
  display:flex;align-items:center;justify-content:space-between;gap:4px;
  padding:0 8px;
  background:linear-gradient(180deg,#0a2a0a 0%,#142814 100%);
  border-bottom:3px solid #5db84a;
  box-shadow:0 3px 0 #2a5a2a,0 6px 12px rgba(0,0,0,.5);
}
.hb{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hl{font-size:clamp(4px,1vw,5px);color:#8dc870;letter-spacing:1px;text-shadow:var(--ts);}
.hv{font-size:clamp(6px,1.6vw,8px);color:var(--gold);text-shadow:2px 2px 0 #000,0 0 10px rgba(255,215,0,.5);letter-spacing:1px;}
.hv.gn{color:var(--green);}
.hv.rd{color:var(--red);}
.hv.cy{color:var(--cyan);}
.hsep{width:1px;height:28px;background:rgba(93,184,74,.3);flex-shrink:0;}
.coin-anim{width:clamp(9px,2.5vw,12px);height:clamp(9px,2.5vw,12px);
  background:radial-gradient(circle at 35% 35%,#ffe98f,var(--gold) 55%,#c8a800);
  border-radius:50%;border:1px solid #7a5a00;animation:coinSpin 1.2s linear infinite;flex-shrink:0;}
@keyframes coinSpin{0%{transform:scaleX(1);}25%{transform:scaleX(.15);}50%{transform:scaleX(1);}75%{transform:scaleX(.15);}100%{transform:scaleX(1);}}
#settings-btn{
  background:linear-gradient(180deg,#3a7a1a,#2a5a0a);
  border:2px solid #5db84a;color:#fff;font-size:clamp(7px,2vw,10px);
  width:clamp(28px,7vw,34px);height:clamp(28px,7vw,34px);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 0 #1a3a0a,inset 0 1px 0 rgba(255,255,255,.15);
  font-family:var(--font);transition:filter .1s,transform .06s;border-radius:3px;flex-shrink:0;
}
#settings-btn:hover{filter:brightness(1.2);}
#settings-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #1a3a0a;}

/* ── ZOOM CONTROLS ── */
#zoom-strip{position:absolute;bottom:14px;right:8px;z-index:20;display:flex;flex-direction:column;align-items:center;gap:3px;}
.zb{
  width:clamp(28px,7vw,36px);height:clamp(28px,7vw,36px);
  background:linear-gradient(180deg,rgba(30,60,20,.9),rgba(10,30,10,.9));
  border:2px solid rgba(93,184,74,.6);
  box-shadow:0 3px 0 rgba(0,0,0,.5);color:#fff;font-family:var(--font);font-size:12px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:filter .1s,transform .06s;border-radius:3px;backdrop-filter:blur(4px);
}
.zb:hover{filter:brightness(1.3);border-color:rgba(93,184,74,1);}
.zb:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,.5);}
#zoom-pct{font-size:5px;color:rgba(255,255,255,.7);text-align:center;background:rgba(0,0,0,.5);padding:2px 4px;border-radius:2px;letter-spacing:1px;}

/* ── BOTTOM PANEL ── */
#panel{
  flex-shrink:0;z-index:40;
  background:linear-gradient(180deg,#0d2610 0%,#0a1e0a 100%);
  border-top:3px solid #5db84a;
  box-shadow:0 -4px 0 #2a5a2a,0 -8px 20px rgba(0,0,0,.4);
  display:flex;flex-direction:column;
  max-height:48vh;overflow-y:auto;
}
@media(min-width:600px){#panel{max-height:40vh;}}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:rgba(0,0,0,.3);}::-webkit-scrollbar-thumb{background:#3a7a1a;border-radius:2px;}

/* phase banner */
#pb{
  padding:6px 10px;display:flex;align-items:center;justify-content:space-between;gap:6px;
  background:rgba(0,0,0,.4);border-bottom:2px solid rgba(93,184,74,.2);flex-shrink:0;
}
#pt{font-size:clamp(6px,1.8vw,8px);letter-spacing:1px;flex:1;text-shadow:var(--ts);}
.pt-g{color:var(--green);} .pt-y{color:var(--gold);} .pt-c{color:var(--cyan);} .pt-r{color:#ff6655;}

/* slot stars */
#sb{display:none;align-items:center;gap:3px;flex-shrink:0;}
#sb.on{display:flex;}
.sp{font-size:10px;filter:drop-shadow(0 0 4px gold);}
.sp.u{filter:grayscale(1) opacity(.25);}

/* rps pips */
#rp{padding:4px 10px;display:flex;gap:5px;flex-wrap:wrap;align-items:center;border-bottom:1px solid rgba(93,184,74,.15);flex-shrink:0;}
#rp:empty{display:none;padding:0;}
.rc{font-size:6px;padding:2px 7px;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.4);letter-spacing:1px;}
.rc.done{border-color:var(--green);color:var(--green);}

/* ctrl body */
#cb{padding:8px;display:flex;gap:7px;flex-wrap:wrap;align-items:flex-start;}

/* ── ITEM CARDS ── */
.qc{
  position:relative;
  background:linear-gradient(180deg,rgba(20,50,15,.95),rgba(10,30,8,.95));
  border:2px solid rgba(93,184,74,.4);
  box-shadow:0 4px 0 rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.06);
  padding:8px;display:flex;flex-direction:column;gap:6px;border-radius:4px;
}
.qc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,rgba(93,184,74,.4),transparent);border-radius:4px 4px 0 0;}
.cl{font-size:clamp(4px,1.1vw,6px);color:rgba(93,184,74,.8);letter-spacing:2px;}

/* ── RPS BUTTONS ── */
.rr{display:flex;gap:6px;}
.rb{
  font-family:var(--font);cursor:pointer;
  width:clamp(54px,14vw,70px);height:clamp(54px,14vw,70px);
  background:linear-gradient(180deg,#1e4a18,#0f2a0a);
  border:2px solid rgba(93,184,74,.5);
  box-shadow:0 4px 0 rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.1);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  transition:transform .06s,box-shadow .06s,filter .1s,border-color .1s;
  position:relative;overflow:hidden;border-radius:4px;
}
.rb::after{content:'';position:absolute;top:0;left:0;right:0;height:40%;
  background:linear-gradient(rgba(255,255,255,.08),transparent);pointer-events:none;}
.rb:hover:not(:disabled){filter:brightness(1.25);border-color:var(--green);}
.rb:active:not(:disabled){transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.6);}
.rb:disabled{opacity:.25;cursor:not-allowed;box-shadow:none;}
.ri{line-height:1;}
.ri img,.ai img{display:block;margin:0 auto;image-rendering:pixelated;}
.rl{font-size:clamp(3px,.9vw,5px);color:#8dc870;letter-spacing:1px;text-shadow:var(--ts);}

/* ── ACTION BUTTONS ── */
.ar{display:flex;gap:6px;flex-wrap:wrap;}
.ab{
  font-family:var(--font);cursor:pointer;
  border:2px solid rgba(93,184,74,.4);
  box-shadow:0 4px 0 rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.08);
  padding:clamp(7px,2vw,10px) clamp(7px,2vw,11px);
  display:flex;flex-direction:column;align-items:center;gap:3px;
  min-width:clamp(54px,14vw,72px);
  transition:transform .06s,box-shadow .06s,filter .1s,border-color .1s;
  position:relative;overflow:hidden;border-radius:4px;
  background:linear-gradient(180deg,#1e4a18,#0f2a0a);
}
.ab::after{content:'';position:absolute;top:0;left:0;right:0;height:40%;
  background:linear-gradient(rgba(255,255,255,.07),transparent);pointer-events:none;}
.ab:hover:not(:disabled){filter:brightness(1.25);border-color:var(--green);}
.ab:active:not(:disabled){transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.6);}
.ab:disabled{opacity:.2;cursor:not-allowed;box-shadow:none;}
.ai{line-height:1;}
.al{font-size:clamp(3px,.9vw,5px);color:#8dc870;letter-spacing:1px;text-shadow:var(--ts);text-align:center;}
.as{font-size:clamp(3px,.8vw,4px);color:rgba(141,200,112,.5);text-align:center;line-height:1.5;}
.b-buy{background:linear-gradient(180deg,#1a4a10,#0a2808);}
.b-use{background:linear-gradient(180deg,#0e2e5c,#071a38);}
.b-shld{background:linear-gradient(180deg,#0a3a3a,#051e1e);}

/* storage */
.ss{display:flex;gap:5px;flex-wrap:wrap;}
.si{display:flex;flex-direction:column;align-items:center;gap:2px;
  background:rgba(0,0,0,.35);border:1px solid rgba(93,184,74,.2);padding:5px 8px;min-width:46px;border-radius:3px;}
.si img{display:block;image-rendering:pixelated;}
.si-v{font-size:clamp(8px,2.5vw,13px);color:var(--gold);text-shadow:1px 1px 0 #000,0 0 8px rgba(255,200,0,.4);}
.si-l{font-size:5px;color:rgba(141,200,112,.6);letter-spacing:1px;}

/* target selector */
#ts{display:none;width:100%;flex-direction:column;gap:6px;align-items:center;padding:6px 8px;border-top:1px solid rgba(93,184,74,.2);}
#ts.on{display:flex;}
#tl{font-size:clamp(5px,1.4vw,7px);color:var(--gold);letter-spacing:1px;text-shadow:var(--ts);}
#tr{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
.tbtn{
  font-family:var(--font);font-size:clamp(4px,1.2vw,6px);cursor:pointer;
  background:linear-gradient(180deg,#1a4a10,#0a2808);
  border:2px solid rgba(93,184,74,.5);color:#8dc870;
  padding:7px 13px;box-shadow:0 3px 0 rgba(0,0,0,.5);
  letter-spacing:1px;transition:filter .1s,transform .06s;border-radius:3px;
}
.tbtn:hover{filter:brightness(1.3);border-color:var(--green);}
.tbtn:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,.5);}
.cbtn{
  font-family:var(--font);font-size:clamp(4px,1.1vw,5px);cursor:pointer;
  border:1px solid rgba(255,100,85,.3);background:rgba(0,0,0,.3);
  color:rgba(255,100,85,.6);padding:5px 10px;letter-spacing:1px;
  transition:border-color .15s,color .15s;border-radius:2px;
}
.cbtn:hover{border-color:#ff6655;color:#ff6655;}

#flash{font-size:7px;color:#ff6655;min-height:10px;text-align:center;padding:0 10px;letter-spacing:1px;text-shadow:var(--ts);}
#log-box{display:none;border-top:1px solid rgba(93,184,74,.15);padding:5px 8px;max-height:55px;overflow-y:auto;}
#log-box.on{display:block;}
#ml{font-size:6px;color:rgba(141,200,112,.5);line-height:2.2;}
#ml p{border-bottom:1px solid rgba(0,0,0,.2);padding:1px 0;}
#ml p:last-child{color:var(--gold);}

/* ── COIN POP ── */
.cpop{position:fixed;pointer-events:none;z-index:500;font-family:var(--font);font-size:9px;color:var(--gold);text-shadow:var(--ts);animation:cpfloat .8s ease-out forwards;}
@keyframes cpfloat{0%{transform:translateY(0) scale(1);opacity:1;}100%{transform:translateY(-50px) scale(1.4);opacity:0;}}

/* ── RPS POPUP ── */
#rps-popup{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(.7);
  background:linear-gradient(180deg,#0d2610,#091a08);
  border:3px solid rgba(93,184,74,.6);
  box-shadow:0 8px 0 rgba(0,0,0,.6),0 0 40px rgba(93,184,74,.2);
  padding:clamp(14px,4vw,24px) clamp(18px,5vw,36px);
  z-index:300;display:none;flex-direction:column;align-items:center;gap:8px;
  opacity:0;transition:transform .25s cubic-bezier(.175,.885,.32,1.4),opacity .2s;
  pointer-events:none;min-width:min(260px,84vw);border-radius:6px;
}
#rps-popup::before{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;
  background:linear-gradient(90deg,transparent,rgba(93,184,74,.8),transparent);}
#rps-popup.show{display:flex;opacity:1;transform:translate(-50%,-50%) scale(1);}
#rps-popup.hide{opacity:0;transform:translate(-50%,-50%) scale(.85);}
#rp-emo{font-size:clamp(28px,8vw,44px);line-height:1;}
#rp-title{font-size:clamp(8px,2.5vw,12px);color:var(--gold);letter-spacing:1px;text-align:center;text-shadow:var(--ts);}
#rp-sub{font-size:clamp(5px,1.4vw,7px);color:rgba(141,200,112,.7);text-align:center;letter-spacing:1px;}
#rp-chips{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;}
.rpc2{font-size:6px;padding:3px 8px;border:1px solid rgba(93,184,74,.3);color:rgba(141,200,112,.6);background:rgba(0,0,0,.3);border-radius:2px;}
.rpc2.win{background:rgba(67,214,21,.15);border-color:var(--green);color:var(--green);}
.rpc2.lose{opacity:.3;}

/* ── GAME OVER ── */
#gameover{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;flex-direction:column;align-items:center;justify-content:center;gap:clamp(12px,3vw,20px);z-index:400;padding:20px;}
#gameover.on{display:flex;}
#go-banner{
  background:linear-gradient(180deg,#0d2610,#091a08);
  border:3px solid rgba(93,184,74,.5);
  box-shadow:0 8px 0 rgba(0,0,0,.5),0 0 40px rgba(93,184,74,.15);
  padding:18px 28px;text-align:center;position:relative;border-radius:6px;
}
#go-banner::before{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;
  background:linear-gradient(90deg,transparent,rgba(93,184,74,.7),transparent);}
#go-title{font-size:clamp(12px,4vw,22px);letter-spacing:2px;color:var(--gold);text-shadow:var(--ts);}
#go-sub{font-size:clamp(6px,1.6vw,8px);color:rgba(141,200,112,.7);margin-top:8px;letter-spacing:1px;}
.go-lose-t{color:var(--red);}
#go-scores{
  background:rgba(0,0,0,.5);border:2px solid rgba(93,184,74,.3);
  box-shadow:0 4px 0 rgba(0,0,0,.4);
  padding:14px 22px;min-width:min(240px,80vw);
  font-size:clamp(7px,2vw,9px);color:#8dc870;line-height:2.8;text-align:center;text-shadow:var(--ts);border-radius:4px;
}
.go-btn{
  font-family:var(--font);font-size:clamp(7px,2vw,10px);cursor:pointer;
  background:linear-gradient(180deg,#2a7a10,#1a4a08);color:#fff;
  border:2px solid rgba(93,184,74,.6);
  box-shadow:0 5px 0 rgba(0,0,0,.5),0 0 20px rgba(93,184,74,.2);
  padding:clamp(10px,2.5vw,14px) clamp(18px,4vw,26px);
  letter-spacing:1px;text-transform:uppercase;transition:filter .1s,transform .08s;border-radius:4px;
}
.go-btn:hover{filter:brightness(1.2);}
.go-btn:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.5);}
.wc{position:fixed;pointer-events:none;z-index:450;font-size:16px;animation:wcf linear forwards;}
@keyframes wcf{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}

/* ── SETTINGS ── */
#settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;padding:20px;}
#settings-overlay.on{display:flex;}
.scard{
  background:linear-gradient(180deg,#0d2610,#091a08);
  border:3px solid rgba(93,184,74,.5);
  box-shadow:0 8px 0 rgba(0,0,0,.5),0 0 40px rgba(93,184,74,.1);
  padding:22px;width:100%;max-width:min(360px,calc(100vw - 32px));
  position:relative;border-radius:6px;
}
.scard::before{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;
  background:linear-gradient(90deg,transparent,rgba(93,184,74,.7),transparent);}
.sttl{font-size:clamp(8px,2.2vw,10px);color:var(--gold);letter-spacing:2px;margin-bottom:18px;margin-top:4px;text-shadow:var(--ts);}
.srow{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;font-size:clamp(5px,1.4vw,7px);color:#8dc870;}
.tgb{
  font-family:var(--font);font-size:clamp(5px,1.2vw,6px);
  background:linear-gradient(180deg,#1a3a10,#0a1e08);color:#8dc870;
  border:2px solid rgba(93,184,74,.3);padding:5px 10px;cursor:pointer;
  box-shadow:0 2px 0 rgba(0,0,0,.4);transition:background .15s;letter-spacing:1px;border-radius:2px;
}
.tgb:active{transform:translateY(2px);box-shadow:0 0 0;}
.tgb.on{background:linear-gradient(180deg,#2a6a18,#1a4a08);border-color:var(--green);color:#fff;}
.sdiv{border:none;border-top:1px solid rgba(93,184,74,.2);margin:14px 0;}
.sclose{
  font-family:var(--font);font-size:7px;cursor:pointer;padding:10px;width:100%;text-align:center;
  background:linear-gradient(180deg,#4a0808,#2a0404);color:#ff6655;
  border:2px solid rgba(229,57,53,.3);
  box-shadow:0 3px 0 rgba(0,0,0,.4);letter-spacing:1px;
  transition:filter .1s,transform .08s;border-radius:3px;
}
.sclose:hover{filter:brightness(1.2);}
.sclose:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,.4);}
</style>
</head>
<body>

<!-- HUD -->
<div id="hud">
  <div class="hb">
    <div class="hl">STATUS</div>
    <div class="hv" id="hud-conn" style="color:#888;font-size:clamp(5px,1.3vw,7px);">...</div>
  </div>
  <div class="hsep"></div>
  <div style="display:flex;align-items:center;gap:4px;">
    <div class="coin-anim"></div>
    <span id="hud-phase" style="font-size:clamp(5px,1.3vw,7px);color:#8dc870;text-shadow:1px 1px 0 #000;">LOADING</span>
  </div>
  <div class="hsep"></div>
  <div class="hb">
    <div class="hl">GAME</div>
    <div class="hv" style="font-size:clamp(4px,1vw,6px);color:rgba(141,200,112,.35);">VORTEX</div>
  </div>
  <button id="settings-btn" onclick="openSettings()">⚙</button>
</div>

<!-- SEA WORLD -->
<div id="sea-world">
  <canvas id="sea-canvas"></canvas>
  <div id="zoom-strip">
    <button class="zb" onclick="doZoom(1.25)">+</button>
    <div id="zoom-pct">100%</div>
    <button class="zb" onclick="doZoom(0.8)">−</button>
    <button class="zb" onclick="resetView()" style="font-size:9px;">⌂</button>
  </div>
</div>

<!-- BOTTOM PANEL -->
<div id="panel">
  <div id="pb">
    <span id="pt" class="pt-y">🌴 WAITING FOR PLAYERS...</span>
    <div id="sb"></div>
  </div>
  <div id="rp"></div>
  <div id="cb">
    <!-- RPS -->
    <div class="qc">
      <div class="cl">⚔ RPS BATTLE</div>
      <div class="rr">
        <button class="rb" id="btn-rock" disabled onclick="sendRPS('rock')">
          <span class="ri"><img src="/img/rock.png" width="28" height="28" alt="🪨" onerror="this.replaceWith(document.createTextNode('🪨'))"></span>
          <span class="rl">ROCK</span>
        </button>
        <button class="rb" id="btn-paper" disabled onclick="sendRPS('paper')">
          <span class="ri"><img src="/img/paper.png" width="28" height="28" alt="📄" onerror="this.replaceWith(document.createTextNode('📄'))"></span>
          <span class="rl">PAPER</span>
        </button>
        <button class="rb" id="btn-scissors" disabled onclick="sendRPS('scissors')">
          <span class="ri"><img src="/img/scissors.png" width="28" height="28" alt="✂" onerror="this.replaceWith(document.createTextNode('✂'))"></span>
          <span class="rl">SCIS</span>
        </button>
      </div>
    </div>

    <!-- Buy -->
    <div class="qc" id="buy-section" style="display:none;">
      <div class="cl">🪙 BUY ITEMS</div>
      <div class="ar">
        <button class="ab b-buy" id="btn-buy-cannon" disabled onclick="doAction('buy_cannon',false)">

<script>
// ═══════════════════════════════════════════════════════════════════
// VORTEX ISLANDS — Tropical Pixel-Art Client
// ═══════════════════════════════════════════════════════════════════
const params=new URLSearchParams(location.search);
const GAME_ID=params.get('gameId'),MY_NAME=params.get('username');
if(!GAME_ID||!MY_NAME) location.href='/';
const API='/api/game';
let gameState=null,myRPSSubmitted=false,pendingActionType=null;

// ── State ──
let seaScale=1,seaOffX=0,seaOffY=0;
let isDragging=false,dragStartX=0,dragStartY=0,dragOffX=0,dragOffY=0,pinchDist=0;
let pollInterval=null,isPollRunning=false,failCount=0,gameOver=false;
let rafId=null,needsRedraw=true;
const islandCache={};

// ── RAF render loop (smooth, no jank) ──
function scheduleRedraw(){needsRedraw=true;}
function renderLoop(){
  if(needsRedraw){needsRedraw=false;drawSea();}
  rafId=requestAnimationFrame(renderLoop);
}
renderLoop();

// ── Helpers ──
async function post(action,body){
  try{const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action,...body})});return await r.json();}
  catch(e){return{error:'Network error'};}
}
async function getState(){
  try{const r=await fetch(`${API}?gameId=${GAME_ID}&username=${MY_NAME}`);return await r.json();}
  catch(e){return{error:'Network error'};}
}
function setConn(type,txt){
  const el=document.getElementById('hud-conn');
  el.textContent=txt;
  el.style.color=type==='ok'?'#43d615':type==='warn'?'#ffd700':'#e53935';
}
function spawnCoinRain(){for(let i=0;i<18;i++){const d=document.createElement('div');d.className='wc';d.textContent='🪙';d.style.cssText=`left:${Math.random()*100}vw;animation-duration:${1.5+Math.random()*1.5}s;animation-delay:${Math.random()*1}s;`;document.body.appendChild(d);setTimeout(()=>d.remove(),3500);}}
function coinPop(x,y){const d=document.createElement('div');d.className='cpop';d.textContent='+★';d.style.cssText=`left:${x-10}px;top:${y-10}px;`;document.body.appendChild(d);setTimeout(()=>d.remove(),900);}
function toggleLog(){const lb=document.getElementById('log-box'),btn=document.getElementById('log-tog');lb.classList.toggle('on');btn.textContent=lb.classList.contains('on')?'ON':'OFF';btn.classList.toggle('on',lb.classList.contains('on'));}
function openSettings(){document.getElementById('settings-overlay').classList.add('on');}
function closeSettings(){document.getElementById('settings-overlay').classList.remove('on');}

// ── Island size ──
const seaWorld=document.getElementById('sea-world');
const seaCanvas=document.getElementById('sea-canvas');
const seaCtx=seaCanvas.getContext('2d');

function getIslandPos(idx,total){
  const L={1:[{x:.5,y:.5}],2:[{x:.28,y:.5},{x:.72,y:.5}],3:[{x:.5,y:.22},{x:.22,y:.72},{x:.78,y:.72}],4:[{x:.25,y:.28},{x:.75,y:.28},{x:.25,y:.72},{x:.75,y:.72}],5:[{x:.5,y:.2},{x:.2,y:.5},{x:.8,y:.5},{x:.3,y:.78},{x:.7,y:.78}],6:[{x:.25,y:.2},{x:.75,y:.2},{x:.15,y:.55},{x:.85,y:.55},{x:.35,y:.82},{x:.65,y:.82}]};
  const t=Math.min(6,Math.max(1,total));return (L[t]||L[6])[idx%(L[t]||L[6]).length];
}
function getIslandDrawSize(){
  const vw=seaWorld.clientWidth,vh=seaWorld.clientHeight;
  const base=Math.min(vw,vh);
  const pc=gameState?Math.max(2,gameState.players.length):2;
  const f={2:.28,3:.22,4:.18,5:.15,6:.13}[pc]||.18;
  const w=Math.floor(base*f);return{w,h:Math.floor(w*.5)};
}

// ── Pixel-art island builder ──
function buildPixelIslandCanvas(player,state){
  const sz=getIslandDrawSize();
  const cw=Math.floor(sz.w*1.7);
  const ch=Math.floor(sz.h*2.4);
  const oc=document.createElement('canvas');oc.width=cw;oc.height=ch;
  const ctx=oc.getContext('2d');
  ctx.imageSmoothingEnabled=false;

  const island=state.islands[player];
  const isAlive=island?.alive!==false;
  const shields=island?.shields||0;
  const deadQuads=island?.quadrants||[];
  const hp=Math.max(0,4-deadQuads.length);

  const pw=cw,ph=ch;
  const bx1=Math.floor(pw*0.03);
  const bx2=Math.floor(pw*0.52);
  const iw=Math.floor(pw*0.44);
  const ih=Math.floor(ph*0.36);
  const iy=Math.floor(ph*0.30);
  const dh=Math.floor(ih*0.42);

  function pr(x,y,w,h){ctx.fillRect(Math.floor(x),Math.floor(y),Math.max(1,Math.floor(w)),Math.max(1,Math.floor(h)));}

  function drawChunk(x,y,w,h,dead){
    // Sand halo
    const sg=ctx.createRadialGradient(x+w/2,y+h/2+dh*.5,w*.1,x+w/2,y+h/2+dh*.5,w*.72);
    sg.addColorStop(0,'rgba(232,216,138,.9)');sg.addColorStop(.65,'rgba(232,216,138,.7)');sg.addColorStop(1,'rgba(232,216,138,0)');
    ctx.fillStyle=sg;ctx.beginPath();ctx.ellipse(x+w/2,y+h/2+dh*.5,w*.72,h*.8,0,0,Math.PI*2);ctx.fill();

    if(dead){
      ctx.fillStyle='#555';pr(x,y,w,h);
      ctx.fillStyle='#3a3a3a';pr(x,y+h,w,dh);
      ctx.fillStyle='rgba(200,0,0,.3)';pr(x,y,w,h+dh);
      // rubble pixels
      ctx.fillStyle='#888';
      for(let rx=x+4;rx<x+w-4;rx+=8){for(let ry=y+4;ry<y+h-4;ry+=8){pr(rx,ry,4,3);}}
      return;
    }
    // Dirt extrusion
    ctx.fillStyle='#5a3318';pr(x+2,y+h+2,w-2,dh);
    ctx.fillStyle='#8b5e3c';pr(x,y+h,w,dh);
    ctx.fillStyle='rgba(255,170,90,.15)';pr(x,y+h,w,3);
    // Dirt row lines
    ctx.fillStyle='rgba(0,0,0,.12)';
    for(let dy=y+h+5;dy<y+h+dh-2;dy+=5){pr(x+2,dy,w-4,2);}
    // Grass
    ctx.fillStyle='#3a8a20';pr(x+1,y+1,w-1,h-1);
    ctx.fillStyle='#5db84a';pr(x,y,w,h);
    // Grass highlights
    ctx.fillStyle='rgba(255,255,255,.11)';pr(x+3,y+2,Math.floor(w*.22),Math.floor(h*.28));
    pr(x+Math.floor(w*.55),y+Math.floor(h*.58),Math.floor(w*.18),Math.floor(h*.2));
    // Grass texture dots
    ctx.fillStyle='rgba(0,0,0,.09)';
    for(let gx=x+5;gx<x+w-5;gx+=Math.floor(w/4)){pr(gx,y+Math.floor(h*.65),3,2);}
    // Top/right edge shadow
    ctx.fillStyle='rgba(0,0,0,.2)';pr(x,y+h-2,w,2);pr(x+w-3,y+2,3,h-2);
    // Water reflection ripple at base
    ctx.fillStyle='rgba(100,180,255,.2)';pr(x+4,y+h+dh-3,w-8,3);
  }

  function drawPalm(tx,ty,size){
    const s=Math.max(2,Math.floor(size));
    ctx.fillStyle='#5a3010';
    for(let i=0;i<s*4;i++){const ox=Math.floor(Math.sin(i*.7)*1.5);pr(tx+ox,ty-i,s,1);}
    ctx.fillStyle='#7a4a20';
    for(let i=1;i<s*4-1;i++){const ox=Math.floor(Math.sin(i*.7)*1.5);pr(tx+ox,ty-i,1,1);}
    const lx=tx+Math.floor(s/2),ly=ty-s*4;
    const lc=['#1a5c10','#2a7a18','#3a9a22','#4ab82e'];
    [[-s*3,-s*1],[s*1,-s*1],[-s*2,-s*2],[s*2,-s*2],[-s*1,-s*3],[s*1,-s*3],[0,-s*3.5]].forEach(([ox,oy],i)=>{
      ctx.fillStyle=lc[i%lc.length];pr(lx+ox,ly+oy,s*2,s);pr(lx+ox+s*.4,ly+oy-s,s,s);
    });
    ctx.fillStyle='#c8a820';pr(lx-1,ly,s+1,s+1);
    ctx.fillStyle='#e8c040';pr(lx,ly,1,1);
  }

  // Water glow shadows
  ctx.save();ctx.globalAlpha=.45;
  const wg=ctx.createRadialGradient(pw/2,iy+ih+dh+10,4,pw/2,iy+ih+dh+10,pw*.48);
  wg.addColorStop(0,'rgba(80,170,255,.5)');wg.addColorStop(1,'rgba(80,170,255,0)');
  ctx.fillStyle=wg;ctx.beginPath();ctx.ellipse(pw/2,iy+ih+dh+10,pw*.48,pw*.14,0,0,Math.PI*2);ctx.fill();
  ctx.restore();

  drawChunk(bx1,iy,iw,ih,hp<=1);
  drawChunk(bx2,iy,iw,ih,hp<=2);

  // Bridge
  const bry=iy+Math.floor(ih*.52),brh=Math.floor(ih*.22),brx=bx1+iw-2,brw=bx2-bx1-iw+4;
  ctx.fillStyle='#5a3808';ctx.fillRect(brx,bry+3,brw,brh);
  ctx.fillStyle='#8b6914';ctx.fillRect(brx,bry,brw,brh);
  ctx.fillStyle='rgba(0,0,0,.2)';
  for(let bp=brx+4;bp<brx+brw-4;bp+=6){ctx.fillRect(bp,bry+1,2,brh-2);}
  ctx.fillStyle='#5a3808';ctx.fillRect(brx,bry-2,brw,2);ctx.fillRect(brx,bry+brh,brw,2);

  // Palms
  const ps=Math.max(2,Math.floor(iw*.058));
  if(hp>1){drawPalm(bx1+Math.floor(iw*.2),iy+Math.floor(ih*.16),ps*1.35);drawPalm(bx1+Math.floor(iw*.68),iy+Math.floor(ih*.72),ps);}
  if(hp>2){drawPalm(bx2+Math.floor(iw*.22),iy+Math.floor(ih*.2),ps*1.2);drawPalm(bx2+Math.floor(iw*.72),iy+Math.floor(ih*.65),ps*.9);}

  // Shield glow
  if(shields>0){
    ctx.save();ctx.globalAlpha=.75;ctx.shadowBlur=22;ctx.shadowColor='rgba(0,220,255,.9)';
    ctx.strokeStyle='rgba(0,230,255,.8)';ctx.lineWidth=2.5;
    ctx.strokeRect(4,iy-6,cw-8,ih+dh+12);ctx.shadowBlur=0;ctx.restore();
  }

  // Dead overlay
  if(!isAlive){
    ctx.fillStyle='rgba(150,0,0,.4)';ctx.fillRect(0,0,cw,ch);
    ctx.font=`bold ${Math.floor(ch*.28)}px monospace`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='rgba(255,70,70,.95)';ctx.fillText('✕',cw/2,ch/2);
    ctx.textAlign='left';ctx.textBaseline='alphabetic';
  }
  return oc;
}

function buildIslandCanvas(player,state){return buildPixelIslandCanvas(player,state);}

// ── Cloud ──
function drawCloud(ctx,cx,cy,s){
  ctx.fillStyle='rgba(255,255,255,.85)';
  ctx.fillRect(cx,cy+s*2,s*8,s*2);ctx.fillRect(cx+s,cy+s,s*2,s*2);ctx.fillRect(cx+s*4,cy,s*3,s*3);
  ctx.fillStyle='rgba(255,255,255,.4)';ctx.fillRect(cx+s,cy+s,s,s);
}

// ── Animated wave offset ──
let waveT=0;

// ── Draw Sea (runs every RAF frame) ──
function drawSea(){
  const W=seaWorld.clientWidth,H=seaWorld.clientHeight;
  if(seaCanvas.width!==W||seaCanvas.height!==H){seaCanvas.width=W;seaCanvas.height=H;}
  const ctx=seaCtx;
  waveT+=0.012;

  // Sky
  const sg=ctx.createLinearGradient(0,0,0,H*.38);
  sg.addColorStop(0,'#3a78d4');sg.addColorStop(1,'#6ab2ff');
  ctx.fillStyle=sg;ctx.fillRect(0,0,W,H*.38);

  // Pixel clouds
  const cs=Math.max(3,Math.floor(W/90));
  drawCloud(ctx,W*.06+Math.sin(waveT*.3)*8,H*.06,cs);
  drawCloud(ctx,W*.38+Math.sin(waveT*.2+1)*6,H*.03,cs*1.2);
  drawCloud(ctx,W*.7+Math.sin(waveT*.25+2)*7,H*.08,cs*.85);

  // Water base
  const wg=ctx.createLinearGradient(0,H*.33,0,H-.5);
  wg.addColorStop(0,'#3a9ef5');wg.addColorStop(.4,'#2280d8');wg.addColorStop(1,'#1060b8');
  ctx.fillStyle=wg;ctx.fillRect(0,H*.33,W,H*.67);

  // Animated shimmer lines
  ctx.fillStyle='rgba(255,255,255,.055)';
  for(let y=H*.38;y<H-.5;y+=16){
    const shift=Math.sin(waveT+y*.03)*6;
    ctx.fillRect(shift,y,W,2);
  }

  // Sparkle dots
  ctx.fillStyle='rgba(255,255,255,.35)';
  const sparks=[[.1,.45],[.22,.6],[.38,.38],[.5,.7],[.64,.42],[.77,.58],[.88,.35],[.33,.78],[.72,.72]];
  sparks.forEach(([sx,sy],i)=>{
    const wx=sx*W,wy=H*.38+sy*(H*.62-.5);
    const pulse=Math.abs(Math.sin(waveT*1.3+i*.9));
    ctx.globalAlpha=.15+pulse*.25;
    ctx.fillRect(wx,wy,3,1);ctx.fillRect(wx+1,wy-1,1,1);
  });
  ctx.globalAlpha=1;

  // Whale emoji hidden far out
  ctx.font=`${Math.max(10,Math.floor(W*.014))}px serif`;
  ctx.globalAlpha=.3;
  ctx.fillText('🐳',W*.82+Math.sin(waveT*.4)*10,H*.44);
  ctx.globalAlpha=1;

  // Grass strip at bottom
  ctx.fillStyle='#4a8a20';ctx.fillRect(0,H-5,W,3);ctx.fillStyle='#38700e';ctx.fillRect(0,H-2,W,2);

  if(!gameState)return;
  const players=gameState.players,sz=getIslandDrawSize();
  const waterTop=H*.33,waterH=H*.67-.5;
  const islandW=sz.w*1.7*seaScale,islandH=sz.h*2.4*seaScale;

  players.forEach((p,i)=>{
    const pos=getIslandPos(i,players.length);
    const worldX=pos.x*W*seaScale+seaOffX;
    const worldY=waterTop+pos.y*waterH*seaScale+seaOffY;
    const drawX=worldX-islandW/2,drawY=worldY-islandH/2;
    const isAlive=gameState.islands[p]?.alive!==false;
    const isMe=p===MY_NAME,isBot=(gameState.bots||[]).includes(p);

    // Island water shadow
    ctx.save();ctx.globalAlpha=.3;
    const shg=ctx.createRadialGradient(drawX+islandW/2,drawY+islandH+8,4,drawX+islandW/2,drawY+islandH+8,islandW*.4);
    shg.addColorStop(0,'rgba(0,40,100,.6)');shg.addColorStop(1,'rgba(0,40,100,0)');
    ctx.fillStyle=shg;ctx.beginPath();ctx.ellipse(drawX+islandW/2,drawY+islandH+8,islandW*.38,islandH*.1,0,0,Math.PI*2);ctx.fill();
    ctx.restore();

    // Draw island
    const ck=p+'|'+(gameState.islands[p]?.quadrants||[]).join(',')+'|'+(gameState.islands[p]?.shields||0)+'|'+isAlive;
    if(!islandCache[p]||islandCache[p].key!==ck) islandCache[p]={canvas:buildIslandCanvas(p,gameState),key:ck};
    ctx.globalAlpha=isAlive?1:.38;
    ctx.drawImage(islandCache[p].canvas,drawX,drawY,islandW,islandH);
    ctx.globalAlpha=1;

    // RPS choice overlay
    const rc=gameState.rpsChoices||{},rw=gameState.rpsWinners||[];
    if(rc[p]){
      const E={rock:'🪨',paper:'📄',scissors:'✂️'};
      ctx.fillStyle='rgba(0,0,0,.45)';ctx.fillRect(drawX,drawY,islandW,islandH);
      ctx.font=`${Math.max(14,islandH*.28)}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(E[rc[p]]||rc[p],drawX+islandW/2,drawY+islandH/2);ctx.textAlign='left';ctx.textBaseline='alphabetic';
      if(rw.includes(p)){ctx.strokeStyle='#ffd700';ctx.lineWidth=3*seaScale;ctx.shadowColor='#ffd700';ctx.shadowBlur=22;ctx.strokeRect(drawX+1,drawY+1,islandW-2,islandH-2);ctx.shadowBlur=0;}
    }

    // My island highlight ring
    if(isMe){
      ctx.strokeStyle='rgba(67,214,21,.65)';ctx.lineWidth=2.5*seaScale;
      ctx.shadowColor='rgba(67,214,21,.4)';ctx.shadowBlur=10;
      ctx.strokeRect(drawX-3,drawY-3,islandW+6,islandH+6);ctx.shadowBlur=0;
    }

    // Name tag — rounded pill style
    const tfsz=Math.max(5,Math.round(7*seaScale));
    ctx.font=`${tfsz}px 'Press Start 2P',monospace`;ctx.textAlign='center';
    const ns=(isBot?'🤖':'🌴')+' '+p;
    const tw=ctx.measureText(ns).width;
    const tx=drawX+islandW/2,ty=drawY-tfsz*1.6;
    const tagBg=isMe?'rgba(30,90,15,.9)':isBot?'rgba(0,20,80,.9)':'rgba(10,30,8,.88)';
    const tagBorder=isMe?'rgba(67,214,21,.7)':isBot?'rgba(0,180,255,.7)':'rgba(93,184,74,.4)';
    ctx.fillStyle=tagBg;roundRect(ctx,tx-tw/2-7,ty-tfsz-3,tw+14,tfsz+9,3);ctx.fill();
    ctx.strokeStyle=tagBorder;ctx.lineWidth=1.5;roundRect(ctx,tx-tw/2-7,ty-tfsz-3,tw+14,tfsz+9,3);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.9)';ctx.fillText(ns,tx,ty);

    // HP bar
    const island=gameState.islands[p];
    const hp=island?Math.max(0,4-(island.quadrants?.length||0)):4;
    const bw=islandW*.62,bh=Math.max(5,6*seaScale);
    const bx=drawX+(islandW-bw)/2,by=drawY+islandH+5*seaScale;
    ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(bx-1,by-1,bw+2,bh+2);
    ctx.fillStyle='#1a1a1a';ctx.fillRect(bx,by,bw,bh);
    const hpColor=hp>=3?'#43d615':hp===2?'#ffd700':'#e53935';
    ctx.fillStyle=hpColor;ctx.fillRect(bx,by,bw*(hp/4),bh);
    ctx.fillStyle='rgba(255,255,255,.18)';ctx.fillRect(bx,by,bw*(hp/4),Math.max(2,bh*.4));

    // Hearts row
    const sy=by+bh+Math.max(7,10*seaScale);
    const hsz=Math.max(4,Math.round(5.5*seaScale));
    ctx.font=`${hsz}px 'Press Start 2P',monospace`;ctx.fillStyle='rgba(255,255,255,.8)';ctx.textAlign='center';
    ctx.fillText('❤'.repeat(hp)+'🖤'.repeat(4-hp),drawX+islandW/2,sy);
    const sh=island?.shields||0;
    if(sh>0){ctx.fillStyle='rgba(0,220,255,.9)';ctx.fillText('🛡×'+sh,drawX+islandW/2,sy+Math.max(8,10*seaScale));}
    ctx.textAlign='left';
  });
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

// ── Pan/Zoom ──
function doZoom(factor){
  const W=seaWorld.clientWidth,H=seaWorld.clientHeight;
  const prev=seaScale;seaScale=Math.max(.3,Math.min(4,seaScale*factor));
  const cx=W/2,cy=H/2;seaOffX=cx-(cx-seaOffX)*(seaScale/prev);seaOffY=cy-(cy-seaOffY)*(seaScale/prev);
  document.getElementById('zoom-pct').textContent=Math.round(seaScale*100)+'%';scheduleRedraw();
}
function resetView(){seaScale=1;seaOffX=0;seaOffY=0;document.getElementById('zoom-pct').textContent='100%';scheduleRedraw();}
seaWorld.addEventListener('mousedown',e=>{if(e.target.classList.contains('zb'))return;isDragging=true;seaWorld.classList.add('dragging');dragStartX=e.clientX;dragStartY=e.clientY;dragOffX=seaOffX;dragOffY=seaOffY;});
window.addEventListener('mousemove',e=>{if(!isDragging)return;seaOffX=dragOffX+(e.clientX-dragStartX);seaOffY=dragOffY+(e.clientY-dragStartY);scheduleRedraw();});
window.addEventListener('mouseup',()=>{isDragging=false;seaWorld.classList.remove('dragging');});
seaWorld.addEventListener('wheel',e=>{e.preventDefault();const f=e.deltaY<0?1.12:.89;const rect=seaWorld.getBoundingClientRect();const mx=e.clientX-rect.left,my=e.clientY-rect.top;const prev=seaScale;seaScale=Math.max(.3,Math.min(4,seaScale*f));seaOffX=mx-(mx-seaOffX)*(seaScale/prev);seaOffY=my-(my-seaOffY)*(seaScale/prev);document.getElementById('zoom-pct').textContent=Math.round(seaScale*100)+'%';scheduleRedraw();},{passive:false});
seaWorld.addEventListener('touchstart',e=>{if(e.touches.length===1){isDragging=true;dragStartX=e.touches[0].clientX;dragStartY=e.touches[0].clientY;dragOffX=seaOffX;dragOffY=seaOffY;}else if(e.touches.length===2){isDragging=false;pinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}},{passive:true});
seaWorld.addEventListener('touchmove',e=>{e.preventDefault();if(e.touches.length===1&&isDragging){seaOffX=dragOffX+(e.touches[0].clientX-dragStartX);seaOffY=dragOffY+(e.touches[0].clientY-dragStartY);scheduleRedraw();}else if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);if(pinchDist>0){seaScale=Math.max(.3,Math.min(4,seaScale*(d/pinchDist)));document.getElementById('zoom-pct').textContent=Math.round(seaScale*100)+'%';}pinchDist=d;scheduleRedraw();}},{passive:false});
seaWorld.addEventListener('touchend',()=>{isDragging=false;},{passive:true});
window.addEventListener('resize',()=>{seaCanvas.width=0;scheduleRedraw();});

// ── RPS Popup ──
let rpsPopupTimer=null,lastRpsHash='';
function showRpsPopup(state){
  const choices=state.rpsChoices||{};if(!Object.keys(choices).length)return;
  const hash=JSON.stringify(choices);if(hash===lastRpsHash)return;lastRpsHash=hash;
  const winners=state.rpsWinners||(state.rpsWinner?[state.rpsWinner]:[]);
  const isTie=winners.length===state.alivePlayers.length;
  const E={rock:'🪨',paper:'📄',scissors:'✂️'};
  document.getElementById('rp-emo').textContent=isTie?'🤝':winners.includes(MY_NAME)?'⭐':'💀';
  document.getElementById('rp-title').textContent=isTie?'TIE! GO AGAIN!':winners.includes(MY_NAME)?'YOU WIN! GET A STAR!':winners.join(' & ')+' WIN!';
  document.getElementById('rp-sub').textContent=isTie?'Same choice! Retry!':winners.includes(MY_NAME)?`${state.pendingActions[MY_NAME]||1} action slot(s)!`:'Wait for winner to act';
  document.getElementById('rp-chips').innerHTML=state.alivePlayers.map(p=>{const w=winners.includes(p);const c=isTie?'':(w?'win':'lose');return`<div class="rpc2 ${c}">${p}: ${E[choices[p]]||choices[p]||'?'}</div>`;}).join('');
  const popup=document.getElementById('rps-popup');popup.classList.remove('hide');popup.style.display='flex';
  requestAnimationFrame(()=>requestAnimationFrame(()=>popup.classList.add('show')));
  if(rpsPopupTimer)clearTimeout(rpsPopupTimer);
  rpsPopupTimer=setTimeout(()=>{popup.classList.remove('show');popup.classList.add('hide');setTimeout(()=>{popup.style.display='none';popup.classList.remove('hide');},220);},1400);
}

// ── UI Update ──
function updateUI(state){
  gameState=state;scheduleRedraw();
  if(state.rpsChoices&&Object.keys(state.rpsChoices).length)showRpsPopup(state);
  const myIsland=state.islands[MY_NAME];
  if(myIsland){
    document.getElementById('st-cannons').textContent=myIsland.inventory?.cannons||0;
    document.getElementById('st-slicers').textContent=myIsland.inventory?.slicers||0;
    document.getElementById('st-shields').textContent=myIsland.shields||0;
    document.getElementById('inv-cannon-lbl').textContent=`×${myIsland.inventory?.cannons||0}`;
    document.getElementById('inv-slicer-lbl').textContent=`×${myIsland.inventory?.slicers||0}`;
  }
  document.getElementById('buy-section').style.display='none';
  document.getElementById('use-section').style.display='none';
  document.getElementById('ts').classList.remove('on');
  document.getElementById('sb').classList.remove('on');
  ['btn-rock','btn-paper','btn-scissors','btn-buy-cannon','btn-buy-slicer','btn-buy-shield','btn-use-cannon','btn-use-slicer'].forEach(id=>{const b=document.getElementById(id);if(b)b.disabled=true;});
  const pt=document.getElementById('pt'),ph=document.getElementById('hud-phase'),pips=document.getElementById('rp');
  if(state.phase==='rps'&&state.alivePlayers?.length>0){
    pips.innerHTML=state.alivePlayers.map(p=>`<span class="rc ${state.pendingRPS[p]?'done':''}">${p}${state.pendingRPS[p]?' ✓':' ...'}</span>`).join('');
  }else pips.innerHTML='';
  const myAlive=state.alivePlayers?.includes(MY_NAME);
  if(!myAlive&&!state.gameOver){pt.textContent='💀 ELIMINATED — WATCHING...';pt.className='pt-r';ph.textContent='SPECTATE';return;}
  if(state.phase==='rps'){
    if(!myAlive){pt.textContent='👀 WATCHING RPS...';pt.className='pt-r';ph.textContent='SPECTATE';}
    else if(state.pendingRPS[MY_NAME]||myRPSSubmitted){pt.textContent='⏳ WAITING FOR OTHERS...';pt.className='pt-y';ph.textContent='WAITING';}
    else{pt.textContent='🪨 PICK YOUR MOVE! (RPS)';pt.className='pt-g';ph.textContent='YOUR TURN!';['btn-rock','btn-paper','btn-scissors'].forEach(id=>{const b=document.getElementById(id);if(b)b.disabled=false;});}
    if(!state.pendingRPS[MY_NAME])myRPSSubmitted=false;
  }else if(state.phase==='action'){
    const winners=state.rpsWinners||(state.rpsWinner?[state.rpsWinner]:[]);
    const slotsLeft=state.pendingActions[MY_NAME]||0;
    const myTurn=winners.includes(MY_NAME)&&slotsLeft>0;
    if(myTurn){
      pt.textContent=`⭐ YOU WIN RPS! ${slotsLeft} MOVE${slotsLeft>1?'S':''} LEFT!`;pt.className='pt-c';ph.textContent='ACT NOW!';
      const sb=document.getElementById('sb');sb.innerHTML='';
      const tot=myIsland?.winSlots||slotsLeft;
      for(let i=0;i<tot;i++){const s=document.createElement('span');s.className='sp'+(i>=slotsLeft?' u':'');s.textContent='⭐';sb.appendChild(s);}
      sb.classList.add('on');
      document.getElementById('buy-section').style.display='flex';
      document.getElementById('use-section').style.display='flex';
      ['btn-buy-cannon','btn-buy-slicer','btn-buy-shield'].forEach(id=>{const b=document.getElementById(id);if(b)b.disabled=false;});
      const inv=myIsland?.inventory||{cannons:0,slicers:0};
      if(inv.cannons>0){const b=document.getElementById('btn-use-cannon');if(b)b.disabled=false;}
      if(inv.slicers>0){const b=document.getElementById('btn-use-slicer');if(b)b.disabled=false;}
    }else{const sp=Object.keys(state.pendingActions);pt.textContent=`⏳ ${sp.length?sp.join(', '):'...'} IS CHOOSING...`;pt.className='pt-y';ph.textContent='WAITING';}
  }
  if(state.moves?.length>0) document.getElementById('ml').innerHTML=state.moves.map(m=>`<p>▸ ${m}</p>`).join('');
}

function flash(msg){const el=document.getElementById('flash');el.textContent=msg;setTimeout(()=>el.textContent='',3000);}

function showGameOver(winner,state){
  if(gameOver)return;gameOver=true;stopPolling();
  const isWin=winner===MY_NAME;
  document.getElementById('go-title').innerHTML=isWin?'🏆 YOU WIN!':`<span class="go-lose-t">💀 ${winner} WINS</span>`;
  document.getElementById('go-sub').textContent=isWin?'ISLAND CHAMPION!':'BETTER LUCK NEXT TIME!';
  document.getElementById('go-scores').innerHTML=state.players.sort((a,b)=>state.scores[b]-state.scores[a]).map((p,i)=>`${['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣'][i]||i+1} ${p} — ${state.scores[p]}pts${p===winner?' 👑':''}`).join('<br>');
  document.getElementById('gameover').classList.add('on');
  if(isWin)spawnCoinRain();
}

// ── Actions ──
async function sendRPS(choice){
  myRPSSubmitted=true;
  ['btn-rock','btn-paper','btn-scissors'].forEach(id=>{const b=document.getElementById(id);if(b)b.disabled=true;});
  document.getElementById('pt').textContent='⏳ WAITING FOR OTHERS...';document.getElementById('pt').className='pt-y';
  const data=await post('rps_choice',{gameId:GAME_ID,username:MY_NAME,choice});
  if(data.error){flash(data.error);myRPSSubmitted=false;return;}
  if(data.state)updateUI(data.state);
}
function doAction(act,useInv){if(act==='cannon'||act==='slicer'){pickTarget(act);return;}sendAction(act,null,useInv);}
function pickTarget(act){
  if(!gameState)return;pendingActionType=act;
  const opps=gameState.alivePlayers.filter(p=>p!==MY_NAME);
  if(opps.length===1){sendAction(act,opps[0],true);return;}
  document.getElementById('ts').classList.add('on');
  document.getElementById('tl').textContent=act==='cannon'?'💣 CANNON TARGET!':'⚔ SLICER TARGET!';
  document.getElementById('tr').innerHTML=opps.map(opp=>`<button class="tbtn" onclick="sendAction('${act}','${opp}',true)">${opp}</button>`).join('');
}
function cancelTarget(){pendingActionType=null;document.getElementById('ts').classList.remove('on');}
async function sendAction(act,target,useInv){
  document.getElementById('ts').classList.remove('on');
  ['btn-buy-cannon','btn-buy-slicer','btn-buy-shield','btn-use-cannon','btn-use-slicer'].forEach(id=>{const b=document.getElementById(id);if(b)b.disabled=true;});
  const payload={gameId:GAME_ID,username:MY_NAME,action:act};
  if(target)payload.targetPlayer=target;if(useInv)payload.useInventory=true;
  const data=await post('action_choice',payload);
  if(data.error){flash(data.error);if(gameState)updateUI(gameState);return;}
  if(data.state)updateUI(data.state);if(data.gameOver)showGameOver(data.winner,data.state);
}

// ── Polling ──
function stopPolling(){if(pollInterval){clearInterval(pollInterval);pollInterval=null;}}
let lastHash='';
async function poll(){
  if(isPollRunning)return;isPollRunning=true;
  try{
    const data=await getState();
    if(data.error){failCount++;if(failCount>=4)setConn('warn','RETRY...');if(failCount>=120)setConn('err','WEAK!');return;}
    failCount=0;
    const s=data.state;
    const hash=s.phase+(s.moves?.length||0)+JSON.stringify(s.pendingRPS)+JSON.stringify(s.pendingActions)+JSON.stringify(s.rpsChoices);
    if(hash!==lastHash||!gameState){lastHash=hash;updateUI(s);}
    if(s.gameOver&&!gameOver)showGameOver(s.winner,s);
    setConn('ok','LIVE!');
  }catch(e){failCount++;if(failCount>=3)setConn('warn','RETRY...');if(failCount>=200){stopPolling();setTimeout(()=>{gameOver=false;failCount=0;init(1);},5000);}}
  finally{isPollRunning=false;}
}
async function init(attempt){
  attempt=attempt||1;const MAX=8;setConn('warn',`...${attempt}/${MAX}`);
  try{
    const data=await getState();
    if(data.error){if(attempt<MAX){setTimeout(()=>init(attempt+1),1200*attempt);return;}setConn('err','ERR!');return;}
    setConn('ok','LIVE!');updateUI(data.state);
    if(data.state.gameOver){showGameOver(data.state.winner,data.state);return;}
    pollInterval=setInterval(poll,1800);
  }catch(e){if(attempt<MAX){setTimeout(()=>init(attempt+1),1500*attempt);return;}setConn('err','FAIL!');}
}
init(1);
</script>
